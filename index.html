  {name:"beta-blockers",system:"Cardiovascular",moa:"Competitive antagonists at beta-1 (cardiac) receptors; reduce HR, contractility, myocardial oxygen demand; antiarrhythmic (decrease AV conduction); carvedilol also blocks alpha-1 (additional vasodilation)",use:"Heart failure with reduced EF (mortality reduction - carvedilol, metoprolol succinate, bisoprolol ONLY); post-MI mortality reduction; rate control in AF; hypertension; angina; arrhythmias",side:"Bradycardia; AV block; fatigue; sexual dysfunction; bronchospasm (non-selective); hypotension; masking hypoglycemia symptoms (diabetics); depression",contra:"Acute decompensated heart failure/cardiogenic shock (START once compensated); asthma/COPD (non-selective beta-blockers); significant bradycardia/AV block; hypotension",pearl:"Only THREE beta-blockers proven to reduce mortality in HFrEF: carvedilol, metoprolol SUCCINATE (not tartrate), bisoprolol; START AFTER acute decompensation is treated (do NOT give in acute decompensated HF); cardioselective (metoprolol, bisoprolol) safer in COPD/asthma at low doses; carvedilol = alpha+beta (additional vasodilation); DO NOT abruptly stop (rebound tachycardia, angina, MI)"},
  {name:"sacubitril",system:"Cardiovascular",moa:"Sacubitril: prodrug converted to LBQ657 which inhibits neprilysin (breaks down natriuretic peptides, bradykinin, angiotensin II); increases BNP, bradykinin levels; vasodilation, natriuresis. Valsartan: ARB blocking AT1 receptor. Dual mechanism: reduces vasoconstriction and promotes natriuresis",use:"Heart failure with reduced EF (HFrEF - replaces ACEi/ARB; superior mortality reduction vs enalapril in PARADIGM-HF trial); hypertension (less common)",side:"Hypotension; hyperkalemia; angioedema (increased risk vs ARB alone - due to bradykinin); renal impairment; dizziness",contra:"Concurrent ACEi (must wait 36 hours after stopping ACEi before starting - angioedema risk); pregnancy; severe hepatic impairment; prior angioedema with ACEi/ARB; bilateral renal artery stenosis",pearl:"MUST wait 36 hours after stopping ACEi before starting (overlap causes severe angioedema); superior to ACEi (enalapril) for reducing mortality in HFrEF (PARADIGM-HF); preferred over ACEi/ARB in HFrEF per current guidelines; angioedema risk higher than ARB alone (neprilysin inhibition increases bradykinin); expensive (brand only)"},
  {name:"digoxin",system:"Cardiovascular",moa:"Inhibits Na+/K+-ATPase pump; increases intracellular Na+ → increases intracellular Ca2+ via Na+/Ca2+ exchanger; increased Ca2+ → positive inotropic effect; also enhances vagal tone → negative chronotropy (slows AV conduction)",use:"Heart failure with reduced EF (add-on therapy - reduces hospitalizations, does NOT reduce mortality); rate control in atrial fibrillation (especially with HF)",side:"NARROW THERAPEUTIC INDEX: GI (nausea, vomiting, anorexia); visual disturbances (yellow-green halos - classic toxicity sign); arrhythmias (virtually any type); bradycardia; AV block; confusion; hypokalemia worsens toxicity",contra:"Hypokalemia (increases toxicity - K+ competes with digoxin for Na+/K+-ATPase); hypomagnesemia; WPW with AF (can increase ventricular rate); ventricular fibrillation; second/third degree AV block; hypersensitivity; concurrent amiodarone (doubles digoxin levels)",pearl:"NARROW THERAPEUTIC INDEX (0.5-0.9 ng/mL therapeutic - lower end now preferred); yellow/green visual halos = toxicity; hypokalemia INCREASES toxicity (thiazides and loops can precipitate digitalis toxicity); antidote = digoxin immune Fab (DigiFab); renally excreted (dose adjust in renal failure); amiodarone and quinidine significantly increase digoxin levels (reduce dose 50%)"},
  {name:"milrinone",system:"Cardiovascular",moa:"Selective phosphodiesterase-3 (PDE-3) inhibitor; increases cAMP in cardiac muscle (positive inotropy) and vascular smooth muscle (vasodilation); 'inodilator' - both inotropic and vasodilating properties",use:"Acute decompensated heart failure (short-term IV inotropic support); severe HF refractory to standard therapy; bridge to transplant",side:"Arrhythmias (significant - atrial and ventricular); hypotension; thrombocytopenia; headache; hypokalemia",contra:"Severe obstructive valvular disease; renal impairment (dose adjust - renally excreted); long-term oral use (increases mortality - PROMISE trial); hypersensitivity",pearl:"IV ONLY for short-term use (chronic oral use increases mortality); 'inodilator' reduces both preload and afterload while increasing contractility; useful in low-output states; CAUTION: can worsen arrhythmias; careful electrolyte monitoring required; used as bridge to transplant or cardiac device"},
  {name:"dobutamine",system:"Cardiovascular",moa:"Selective beta-1 adrenergic receptor agonist (also mild beta-2 and alpha-1); increases cardiac contractility and heart rate; mild vasodilation (beta-2 and alpha-1 offset); increases cardiac output with less increase in heart rate than dopamine",use:"Acute decompensated heart failure with cardiogenic shock; pharmacologic stress testing (dobutamine stress echo); septic cardiomyopathy",side:"Tachyarrhythmias; ischemia (increased myocardial oxygen demand); headache; nausea; hypertension; hypotension",contra:"Idiopathic hypertrophic subaortic stenosis (increases outflow obstruction); uncorrected hypovolemia; concurrent beta-blockers (reduce efficacy); hypersensitivity",pearl:"SYNTHETIC catecholamine (not a natural catecholamine); primarily beta-1 agonist with mild vasodilatory effects; increases cardiac output without significant vasoconstriction; preferred over dopamine in acute HF; used for pharmacologic stress testing (increases HR and contractility - mimics exercise); short half-life (2-3 min) - continuous infusion required"},
  {name:"ivabradine",system:"Cardiovascular",moa:"Selectively blocks HCN channels (Ih/If - 'funny current') in SA node pacemaker cells; reduces spontaneous depolarization rate; slows heart rate without affecting contractility, conduction, or blood pressure",use:"Heart failure with reduced EF (HFrEF) with HR ≥70 bpm despite maximum beta-blocker therapy; stable angina (reduce symptoms)",side:"Visual disturbances (phosphenes - transient luminous phenomena, especially at night); bradycardia; AF; hypertension; headache",contra:"Resting HR <60 bpm; AV block; severe hepatic impairment; concurrent strong CYP3A4 inhibitors (significantly increase ivabradine levels); AF (ineffective); sick sinus syndrome; hypotension",pearl:"ONLY heart rate-reducing drug that does NOT affect contractility (contrast with beta-blockers); visual disturbances (phosphenes) are common but usually transient; used as add-on when HR remains ≥70 despite max beta-blocker; for sinus rhythm ONLY (not effective in AF - SA node must be driving rhythm); FDA approved add-on in HFrEF"},
  {name:"dapagliflozin",system:"Cardiovascular",moa:"Inhibit sodium-glucose cotransporter 2 (SGLT2) in proximal tubule; block renal glucose reabsorption; cause glucosuria and natriuresis; reduce preload and afterload; osmotic diuresis; cardioprotective mechanisms (multiple hypothesized pathways)",use:"Heart failure with reduced EF (HFrEF) and preserved EF (HFpEF) - mortality/hospitalization reduction; Type 2 DM; CKD (renoprotective); cardiovascular risk reduction in ASCVD",side:"Genital mycotic infections (most common - Candida); urinary tract infections; DKA (diabetic ketoacidosis - even with normal glucose = euglycemic DKA); hypotension; Fournier's gangrene (rare but serious necrotizing fasciitis of genitalia); bone fractures",contra:"Type 1 DM (increased DKA risk); eGFR <20-30 mL/min (use for HF acceptable; do not start for glucose lowering); hypersensitivity; ketoacidosis; recurrent UTI/genital infections",pearl:"Class effect for HF and CKD benefit (both dapagliflozin and empagliflozin); EUGLYCEMIC DKA (glucose may be normal or only mildly elevated - can be missed); counsel to hold drug 3-4 days before surgery; genital mycotic infections (counsel on hygiene); Fournier's gangrene is rare but fatal if missed; cardio-renal protective effects independent of glucose lowering"},
  {name:"statins",system:"Cardiovascular",moa:"Competitive inhibition of HMG-CoA reductase (rate-limiting enzyme in cholesterol biosynthesis); reduces hepatic cholesterol synthesis; upregulates LDL receptors; increases LDL clearance from blood; also reduces VLDL production",use:"First-line for LDL-C lowering; primary and secondary ASCVD prevention; familial hypercholesterolemia; cardiovascular risk reduction (MI, stroke, CV death)",side:"Myopathy / Rhabdomyolysis (dose-dependent - monitor CK, check for myalgias); hepatotoxicity (elevated LFTs - routine monitoring not required); new-onset diabetes; cognitive effects (rare); teratogenic",contra:"Pregnancy (teratogenic - Category X); active liver disease; concurrent strong CYP3A4 inhibitors (with simvastatin/lovastatin - myopathy risk); concurrent gemfibrozil (rhabdomyolysis risk); hypersensitivity",pearl:"HIGH-intensity statins: atorvastatin 40-80mg, rosuvastatin 20-40mg; rosuvastatin and atorvastatin most potent; myopathy risk: simvastatin + amiodarone or verapamil = significant drug interactions; gemfibrozil + any statin = increased rhabdomyolysis risk; pravastatin and rosuvastatin have least drug interactions (not primarily CYP3A4 metabolized); DO NOT use two statins; baseline LFTs and CK recommended before starting"},
  {name:"ezetimibe",system:"Cardiovascular",moa:"Inhibits NPC1L1 (Niemann-Pick C1-Like 1) transporter on intestinal epithelium; blocks intestinal absorption of dietary and biliary cholesterol; reduces LDL-C by 15-25%",use:"Elevated LDL-C (add-on to statin for additional lowering); familial hypercholesterolemia (add-on); statin-intolerant patients (alternative); heterozygous/homozygous FH",side:"GI upset (diarrhea); myopathy (rare, mainly when combined with statin); hepatotoxicity (rare); headache",contra:"Active liver disease; pregnancy; concurrent fibrate use (increased myopathy risk - especially with fenofibrate less than gemfibrozil); hypersensitivity",pearl:"Second-line add-on to statin; reduces LDL-C ~15-25% (modest effect); Vytorin = simvastatin + ezetimibe (combination); well tolerated; blocks ABSORPTION not synthesis (complement to statins which block synthesis); combined with statin shown to reduce CV events (IMPROVE-IT trial)"},
  {name:"bile acid sequestrants",system:"Cardiovascular",moa:"Bind bile acids in intestinal lumen; prevent enterohepatic recirculation of bile acids; liver must synthesize new bile acids from cholesterol; increases hepatic LDL receptor expression; lowers LDL-C",use:"Elevated LDL-C (adjunct to diet/statins); pruritis from cholestasis; diarrhea from bile acid malabsorption; colesevelam also approved for Type 2 DM (modest glucose lowering)",side:"GI: constipation (most common), bloating, nausea, flatulence; impaired absorption of fat-soluble vitamins (A, D, E, K); drug interactions (bind and reduce absorption of many medications)",contra:"TG >400 mg/dL (increases triglycerides); biliary or bowel obstruction; phenylketonuria (some formulations contain phenylalanine); dysbetalipoproteinemia",pearl:"Not absorbed systemically (therefore safe in pregnancy); MUST separate administration of other medications by 1 hour before or 4 hours after (bind to many drugs in GI tract); increases triglycerides (avoid in hypertriglyceridemia); constipation is most common complaint; oldest lipid-lowering class; colesevelam approved for Type 2 DM (glucose lowering)"},
  {name:"pcsk9 inhibitors",system:"Cardiovascular",moa:"Alirocumab/Evolocumab: monoclonal antibodies against PCSK9 protein; PCSK9 normally degrades LDL receptors; inhibition allows LDL receptors to be recycled/upregulated; dramatically increases LDL clearance. Inclisiran: siRNA that silences PCSK9 gene in hepatocytes",use:"Familial hypercholesterolemia; ASCVD with inadequate LDL-C lowering on maximum statin + ezetimibe; statin intolerance",side:"Injection site reactions; nasopharyngitis; muscle pain; cognitive effects (neurocognition - studied, no clear causation); flu-like symptoms",contra:"Hypersensitivity; pregnancy (limited data); inclisiran: severe liver impairment",pearl:"Most potent LDL-C lowering agents available (50-60% reduction on top of statin); subcutaneous injection every 2-4 weeks (alirocumab/evolocumab) or every 6 months (inclisiran); expensive (brand only); proven to reduce CV events (ODYSSEY OUTCOMES, FOURIER trials); inclisiran = siRNA (different mechanism; twice yearly dosing - unique)"},
  {name:"fibrates",system:"Cardiovascular",moa:"Activate peroxisome proliferator-activated receptor alpha (PPARα); increase lipoprotein lipase activity; reduce TG synthesis and VLDL secretion; increase HDL; modest LDL reduction",use:"Hypertriglyceridemia (primary use - drug of choice); mixed dyslipidemia; low HDL",side:"GI upset; myopathy/rhabdomyolysis (ESPECIALLY when combined with statins); gallstones (increases cholesterol excretion in bile); hepatotoxicity; increased homocysteine (gemfibrozil)",contra:"Severe renal/hepatic impairment; concurrent statin with gemfibrozil (high rhabdomyolysis risk - avoid this combination); gallbladder disease; pregnancy",pearl:"GEMFIBROZIL + STATIN = HIGH RHABDOMYOLYSIS RISK (gemfibrozil inhibits glucuronidation of statins → increases statin levels); FENOFIBRATE preferred if fibrate + statin needed (lower interaction risk); primary use = hypertriglyceridemia; modest HDL elevation; do NOT use for CV event reduction (not proven despite lipid effects)"},
  {name:"niacin",system:"Cardiovascular",moa:"Inhibits hepatic VLDL synthesis (reduces TG production); decreases LDL-C; increases HDL-C (most effective agent for raising HDL); inhibits lipolysis in adipose tissue; reduces free fatty acid flux to liver",use:"Dyslipidemia (raises HDL best of all agents); hypertriglyceridemia; heterozygous FH; largely fallen out of favor after AIM-HIGH and HPS2-THRIVE trials",side:"FLUSHING (most common - prostaglandin mediated; give aspirin 30 min before to reduce); hepatotoxicity (sustained-release form has highest risk); hyperglycemia; hyperuricemia (gout exacerbation); GI upset; pruritis",contra:"Active liver disease; severe gout; peptic ulcer; DM (hyperglycemia); sustained-release with hepatotoxicity history",pearl:"Flushing is prostaglandin-mediated (take aspirin 325mg 30 min before to reduce flushing); immediate-release (best tolerated hepatically) vs sustained-release (most hepatotoxic); large clinical trials showed NO additional CV benefit when added to statin (AIM-HIGH, HPS2-THRIVE); falling out of use; immediate-release best hepatic profile; take with food (reduces flushing)"},
  {name:"omega-3 fatty acids",system:"Cardiovascular",moa:"EPA and DHA reduce hepatic TG production; increase TG clearance; also anti-inflammatory (reduce inflammatory mediators); EPA only (icosapentaenoic acid - Vascepa) may have additional CV benefits",use:"Severe hypertriglyceridemia (>500 mg/dL); Vascepa (pure EPA/icosapentaenoic acid): CV risk reduction in patients with elevated TGs already on statin (REDUCE-IT trial)",side:"Fishy taste/burping; GI upset; increased LDL-C (DHA-containing products may increase LDL); bleeding risk (high doses); atrial fibrillation risk (Vascepa)",contra:"Hypersensitivity (fish/shellfish allergy); bleeding disorders (relative - high doses inhibit platelet aggregation)",pearl:"Vascepa (pure EPA - icosapentaenoic acid) reduced CV events in REDUCE-IT trial in statin-treated patients; Lovaza (EPA+DHA) - FDA approved for TG >500 but may raise LDL (DHA effect); prescription omega-3 more concentrated than OTC fish oil; OTC fish oil not equivalent to prescription forms; AF risk noted in Vascepa"},
  {name:"bempedoic acid",system:"Cardiovascular",moa:"Inhibits ATP-citrate lyase (ACL) in cholesterol synthesis pathway upstream of HMG-CoA reductase; reduces hepatic cholesterol synthesis; upregulates LDL receptors; acts in liver ONLY (requires liver-specific activation - does not affect muscle ACL)",use:"LDL-C lowering in adults with ASCVD or familial hypercholesterolemia unable to tolerate statins or needing additional lowering; often combined with ezetimibe (Nexlizet)",side:"Hyperuricemia (gout exacerbation - increases uric acid); tendon rupture (rare but BOXED WARNING); myalgia (less than statins - no muscle ACL inhibition); GI upset",contra:"Concurrent statins not recommended to maximize dose (limited data); pregnancy",pearl:"Acts ONLY in liver (prodrug activated by liver-specific enzyme) - does NOT inhibit ACL in muscle = theoretically lower muscle side effects than statins; BOXED WARNING for tendon rupture; increases uric acid (monitor in gout patients); CLEAR Outcomes trial showed reduced CV events; can be used in statin-intolerant patients; Nexlizet = bempedoic acid + ezetimibe (combination)"},
  {name:"furosemide",system:"Cardiovascular",moa:"Block Na+/K+/2Cl- cotransporter (NKCC2) in thick ascending limb of loop of Henle; prevent Na+, K+, Cl-, Ca2+ and Mg2+ reabsorption; most potent diuretics; can work even in advanced renal failure",use:"Acute decompensated heart failure (IV - first-line); pulmonary edema; hypertension with CKD or edema; nephrotic syndrome; hypercalcemia (IV furosemide + NS); cirrhotic ascites",side:"Hypokalemia (MAJOR - metabolic alkalosis); hyponatremia; hypomagnesemia; HYPOCALCEMIA (contrast to thiazides); hyperuricemia; ototoxicity (dose-related, especially IV; additive with aminoglycosides); hyperglycemia; photosensitivity (furosemide/bumetanide contain sulfa); dehydration",contra:"Anuria; sulfonamide allergy (furosemide, bumetanide, torsemide contain sulfa - but ethacrynic acid does NOT); electrolyte imbalance; concurrent aminoglycosides (ototoxicity); hypersensitivity",pearl:"MOST POTENT diuretics; work in renal failure (unlike thiazides - effective at GFR <30 mL/min); IV for acute HF; HYPO-calcemia (contrast thiazides which cause HYPERcalcemia); ototoxicity additive with aminoglycosides; ethacrynic acid = only loop diuretic without sulfa group (use in sulfa allergy); 'loop diuretics lose everything' (K, Na, Mg, Ca, Cl)"},
  {name:"spironolactone",system:"Cardiovascular",moa:"Spironolactone: competitive antagonist of aldosterone and other steroid receptors (aldosterone, androgen, progesterone); eplerenone: selective aldosterone antagonist (no sex hormone effects); block aldosterone-mediated Na+ reabsorption and K+ secretion in collecting duct; RETAIN potassium",use:"Heart failure with reduced EF (MORTALITY REDUCTION - add-on to ACEi/ARB + beta-blocker); primary hyperaldosteronism; hypertension (resistant); nephrotic syndrome; hepatic cirrhosis with ascites; spironolactone: hirsutism/PCOS (anti-androgen); Conn syndrome",side:"Hyperkalemia (AVOID with ACEi/ARB unless careful monitoring; especially dangerous in CKD); gynecomastia/breast tenderness (spironolactone - anti-androgen; NOT eplerenone); menstrual irregularities; increased SCr; hypotension",contra:"Hyperkalemia; concurrent high-dose ACEi or ARB without close monitoring; renal impairment (accumulates); hypersensitivity; Addison's disease",pearl:"Eplerenone is more selective (no gynecomastia - use instead of spironolactone in men who develop gynecomastia); RETAIN K+ (risk of hyperkalemia especially with ACEi/ARB - monitor closely); MORTALITY reduction in HFrEF, post-MI HF, and resistant hypertension; spironolactone also used for acne/hirsutism/PCOS (anti-androgenic); monitor K+ and SCr closely when starting"},
  {name:"triamterene",system:"Cardiovascular",moa:"Block epithelial sodium channels (ENaC) in collecting tubule; prevent Na+ reabsorption and K+ secretion; NOT aldosterone antagonists (act independently of aldosterone); retain potassium",use:"Edema (combined with thiazides to prevent hypokalemia); hypertension (combined with thiazides - Dyazide = triamterene + HCTZ; Midamor = amiloride alone); lithium-induced diabetes insipidus (amiloride)",side:"Hyperkalemia; elevated SCr (triamterene can block creatinine secretion - falsely elevates creatinine); renal stones (triamterene - blue-green fluorescence); blood dyscrasias",contra:"Hyperkalemia; renal failure; concurrent K+ supplements or potassium-sparing agents; anuria",pearl:"Retain K+ without aldosterone antagonism (direct ENaC blockade); triamterene can crystallize in urine causing kidney stones; Dyazide/Maxzide = triamterene + HCTZ (common combination to balance K+); amiloride used for lithium-induced DI (blocks Li+ entry into collecting duct cells through ENaC); weaker diuretics than loops or thiazides"},
  {name:"acetazolamide",system:"Cardiovascular",moa:"Inhibits carbonic anhydrase in proximal tubule; blocks Na+/HCO3- reabsorption; alkalinizes urine; weakest diuretic; also inhibits carbonic anhydrase in ciliary body (reduces aqueous humor production) and choroid plexus (reduces CSF)",use:"Glaucoma (reduces aqueous humor); acute mountain sickness (prevention and treatment); metabolic alkalosis (from excessive thiazide/loop diuretic use); epilepsy (adjunct); edema (rarely used as diuretic); familial periodic paralysis",side:"Metabolic acidosis (hyperchloremic); hypokalemia; renal stones (calcium phosphate precipitates in alkaline urine); sulfonamide-type allergic reactions; hyperuricemia; paresthesias; taste abnormalities",contra:"Sulfonamide allergy; hepatic cirrhosis (reduces NH4+ trapping → hepatic encephalopathy); hypokalemia; severe COPD (metabolic acidosis risk); chronic use for edema (self-limiting effect)",pearl:"Weakest diuretic (only increases Na+ excretion by ~5%); primarily used for GLAUCOMA (not diuresis); ACUTE MOUNTAIN SICKNESS prophylaxis/treatment (start 1-2 days before ascent); causes METABOLIC ACIDOSIS (useful for treating metabolic alkalosis from excessive diuretics); all compounds are sulfonamides (sulfa allergy cross-reactivity); avoid in hepatic cirrhosis"},
  {name:"mannitol",system:"Cardiovascular",moa:"Freely filtered but not reabsorbed; increases tubular fluid osmolarity; reduces water reabsorption throughout nephron; also increases plasma osmolarity → pulls fluid from cells/brain into vascular space",use:"Cerebral edema (reduce intracranial pressure - ICP); acute glaucoma (reduces intraocular pressure); acute renal failure (maintain urine flow); forced diuresis (drug/toxin elimination)",side:"Hyponatremia (osmotic shift of water into vasculature dilutes Na+); dehydration; pulmonary edema (initial expansion of intravascular volume); rebound ICP increase (if blood-brain barrier disrupted); hypokalemia; metabolic acidosis",contra:"Established anuria (accumulated = more pulmonary edema); intracranial hemorrhage; severe pulmonary edema; congestive heart failure; dehydration",pearl:"NOT a sulfonamide (no sulfa allergy concern); IV ONLY; first-line for acute ICP reduction (cerebral edema); hypertonic saline is alternative for ICP; reduces brain water by creating osmotic gradient; initial expansion of plasma volume (may worsen CHF initially); crystallizes at low temperatures (warm before administration)"},
  {name:"tolvaptan",system:"Cardiovascular",moa:"Antagonize vasopressin V2 receptors in collecting duct; prevent ADH-mediated water reabsorption; increase free water excretion (aquaresis = electrolyte-free water elimination); correct hypervolemic/euvolemic hyponatremia",use:"Hypervolemic hyponatremia (SIADH, heart failure, cirrhosis); severe symptomatic hyponatremia; tolvaptan also for ADPKD (autosomal dominant polycystic kidney disease) - slows cyst growth",side:"Thirst; polyuria; dehydration; rapid sodium correction (osmotic demyelination syndrome - ODS if corrected too fast); hepatotoxicity (BOXED WARNING - tolvaptan for ADPKD); elevated uric acid",contra:"Hypovolemic hyponatremia (worsens); inability to respond to thirst; anuria; concurrent strong CYP3A4 inhibitors; urgency to rapidly correct sodium (increases correction speed - risk of osmotic demyelination)",pearl:"BOXED WARNING for tolvaptan: hepatotoxicity (liver toxicity limits use for ADPKD - Jynarque formulation with REMS program); osmotic demyelination syndrome if sodium corrected too rapidly (>10-12 mEq/L in 24 hours); conivaptan IV (for inpatient); tolvaptan oral; electrolyte-free water excretion = 'aquaresis' (not the same as traditional diuresis); access to water must be assured (thirst mechanism crucial)"},
  {name:"penicillin g benzathine",system:"Antimicrobials",moa:"Slowly absorbed IM depot formulation; provides prolonged low-level penicillin G; binds PBPs; inhibits cell wall synthesis; bactericidal against Group A Streptococcus",use:"Group A strep pharyngitis treatment; rheumatic fever primary treatment; rheumatic fever secondary prophylaxis (monthly IM injections); syphilis (primary, secondary, early latent)",side:"Injection site pain/reactions; allergic reactions (rash to anaphylaxis); Jarisch-Herxheimer reaction (syphilis treatment); NEVER give IV (can cause fatal cardiac arrest)",contra:"Penicillin allergy; IV administration (FATAL - IM ONLY); do NOT confuse with Bicillin C-R (contains procaine penicillin + benzathine - different formulation)",pearl:"SINGLE IM injection for rheumatic fever treatment and strep pharyngitis; MONTHLY IM for rheumatic fever secondary prophylaxis (duration depends on severity); Drug of choice for syphilis (all stages); NEVER administer IV (cardiac and CNS toxicity); DO NOT confuse Bicillin LA with Bicillin C-R (different products)"},
  {name:"vancomycin",system:"Antimicrobials",moa:"Binds D-Ala-D-Ala terminus of peptidoglycan precursors; inhibits cell wall synthesis; bactericidal against gram-positive organisms including MRSA",use:"MRSA bacteremia/endocarditis (drug of choice); S. viridans endocarditis in PCN-allergic patients; empiric endocarditis before cultures; C. difficile (oral only for mild-severe CDI)",side:"Red man syndrome (infusion-related - slow infusion rate); nephrotoxicity (especially with aminoglycosides); ototoxicity; thrombophlebitis; MRSA resistance emerging (VISA, VRSA)",contra:"Vancomycin allergy; Red man syndrome is NOT a true allergy (slow infusion rate or antihistamine pretreatment); oral form for CDI only (not absorbed systemically)",pearl:"Monitor AUC-guided dosing (preferred over trough monitoring - reduces nephrotoxicity); Red Man Syndrome = rate-related infusion reaction (NOT true allergy - slow infusion); aminoglycosides (gentamicin) used in combination for synergy in certain endocarditis regimens; oral vancomycin for C. difficile (NOT systemically absorbed); MRSA endocarditis = IV vancomycin minimum 6 weeks"},
  {name:"gentamicin",system:"Antimicrobials",moa:"Irreversibly binds 30S ribosomal subunit; causes mRNA misreading; bactericidal; concentration-dependent; used in COMBINATION for synergistic effect with beta-lactams/vancomycin in endocarditis",use:"Endocarditis (synergy with beta-lactams or vancomycin for enterococcal, streptococcal, staphylococcal endocarditis); gram-negative serious infections (combined with beta-lactam); prophylaxis before GU procedures in high-risk patients",side:"Nephrotoxicity (reversible); ototoxicity (IRREVERSIBLE - vestibular and cochlear damage); neuromuscular blockade; accumulation in renal failure",contra:"Pre-existing renal impairment (adjust dose); myasthenia gravis; concurrent nephrotoxins or ototoxins; pregnancy (ototoxicity to fetus)",pearl:"Used for SYNERGY in endocarditis (often low dose, short duration); ototoxicity is IRREVERSIBLE (gentamicin preferentially damages vestibular apparatus); monitor levels and renal function; once-daily dosing preferred for gram-negative infections (concentration-dependent killing reduces toxicity); avoid concurrent loop diuretics (additive ototoxicity)"},
  {name:"levofloxacin",system:"Antimicrobials",moa:"Inhibit DNA gyrase (topoisomerase II) and topoisomerase IV; prevent DNA replication; bactericidal; broad spectrum including atypical organisms (Mycoplasma, Chlamydophila, Legionella) and S. pneumoniae",use:"Community-acquired pneumonia (severe or with comorbidities); HAP/VAP; sinusitis; UTI; alternative for AOM treatment failure; Legionella pneumonia (drug of choice)",side:"QT prolongation; tendon rupture (BOXED WARNING - especially Achilles; concurrent steroids or age >60 increases risk); peripheral neuropathy (BOXED WARNING); CNS effects (seizures, hallucinations); C. difficile; photosensitivity; dysglycemia",contra:"Children (cartilage damage - avoid in pediatrics); QT prolongation; myasthenia gravis; concurrent antacids/dairy/calcium within 2 hours (chelation reduces absorption); pregnancy; concurrent NSAIDs (lowers seizure threshold)",pearl:"BLACK BOX WARNINGS: tendon rupture/tendinitis, peripheral neuropathy, CNS effects, QT prolongation, aortic aneurysm; moxifloxacin covers atypical + anaerobic organisms (better CAP coverage - no Pseudomonas); levofloxacin covers Pseudomonas (used for HAP/VAP); 'last resort' antibiotics per FDA (reserve for when no alternatives); moxifloxacin has NO RENAL dose adjustment (hepatic excretion)"},
  {name:"piperacillin-tazobactam",system:"Antimicrobials",moa:"Piperacillin binds PBPs and inhibits cell wall synthesis; tazobactam irreversibly inhibits beta-lactamases protecting piperacillin from enzymatic inactivation; broadest spectrum penicillin",use:"Hospital-acquired pneumonia (HAP); ventilator-associated pneumonia (VAP); febrile neutropenia (with aminoglycoside); complicated intra-abdominal infections; Pseudomonas aeruginosa infections; complicated skin infections",side:"C. difficile; diarrhea; allergic reactions (PCN cross-reactivity); electrolyte abnormalities; hypokalemia; hepatotoxicity; thrombophlebitis (IV)",contra:"Penicillin allergy; hypersensitivity to beta-lactam/beta-lactamase inhibitors",pearl:"Empiric HAP/VAP coverage (covers Pseudomonas, MSSA, gram-negatives, anaerobes); does NOT cover MRSA (add vancomycin if MRSA suspected); extended infusions (4-hour infusion for Pseudomonas) preferred pharmacokinetically; does NOT cover ESBL-producing organisms (need carbapenem); 4.5g q6h or 3.375g q6h standard dosing"},
  {name:"doxycycline",system:"Antimicrobials",moa:"Binds 30S ribosomal subunit; inhibits aminoacyl-tRNA binding; bacteriostatic; covers atypical organisms (Mycoplasma, Chlamydophila, Rickettsia) and S. pneumoniae",use:"CAP outpatient (alternative to amoxicillin; alone or with amoxicillin); atypical pneumonia; Lyme disease; Rocky Mountain Spotted Fever; STDs; malaria prophylaxis",side:"Photosensitivity; GI esophageal irritation (take with water, stay upright 30 min); tooth discoloration (children <8 years); chelation with divalent cations (antacids, dairy, iron - reduces absorption); teratogenic",contra:"Children <8 years (tooth discoloration, bone effects); pregnancy; concurrent antacids/dairy/iron (within 2 hours); hypersensitivity",pearl:"Alternative outpatient CAP treatment (when amoxicillin not tolerated or resistant); covers atypical organisms + S. pneumoniae; PHOTOSENSITIVITY = advise sunscreen; avoid dairy/antacids (chelation); take with FULL glass of water and remain UPRIGHT 30 min (esophageal irritation/ulceration); doxycycline + amoxicillin is standard outpatient CAP combination"},
  {name:"streptomycin",system:"Antimicrobials",moa:"Irreversibly binds 30S ribosomal subunit; inhibits protein synthesis; bactericidal; first aminoglycoside discovered (Fleming); requires active mycobacterial growth for efficacy",use:"TB (second-line - alternative when first-line drugs not tolerated or resistance); MDR-TB (multi-drug resistant); plague; tularemia; brucellosis; enterococcal endocarditis (synergy)",side:"Ototoxicity (primarily cochlear - hearing loss; irreversible); nephrotoxicity; vestibular toxicity (less than gentamicin); neuromuscular blockade; injection site reactions",contra:"Pre-existing hearing loss or renal impairment; pregnancy (ototoxicity to fetus - absolute CI); concurrent ototoxic drugs; myasthenia gravis",pearl:"IM injection only (no oral form); IRREVERSIBLE ototoxicity (primarily cochlear damage - hearing loss, unlike gentamicin which preferentially damages vestibular); monitor audiograms and renal function; used in MDR-TB regimens; first antibiotic discovered to be effective against TB; resistance via ribosomal mutation (rpsL gene)"},
  {name:"ethionamide",system:"Antimicrobials",moa:"Prodrug structurally similar to isoniazid; requires activation by mycobacterial monooxygenase (EthA); inhibits mycolic acid synthesis (same as INH but different enzyme target); bacteriostatic",use:"MDR-TB (second-line when first-line drugs fail or resistance present); used in combination with other anti-TB agents; leprosy (combination)",side:"GI toxicity (most common - nausea, vomiting, abdominal pain - take with food or at bedtime); hepatotoxicity; peripheral neuropathy (supplement pyridoxine); hypothyroidism; psychiatric effects (depression)",contra:"Severe hepatic impairment; pregnancy (teratogenic); hypersensitivity",pearl:"Second-line agent for MDR-TB; supplement pyridoxine (B6) to prevent neuropathy (similar to INH); GI side effects dose-limiting (start low and increase); resistance develops via mutation in ethA or inhA genes; cross-resistance with isoniazid possible (both target mycolic acid synthesis)"},
  {name:"bedaquiline",system:"Antimicrobials",moa:"Inhibits mycobacterial ATP synthase (subunit c of ATP synthase); blocks ATP production; bactericidal; unique mechanism with no cross-resistance to other anti-TB drugs",use:"MDR-TB (multi-drug resistant TB) and XDR-TB; combination regimen for adults when other treatments are inadequate",side:"QT prolongation (BOXED WARNING - increased deaths observed in clinical trials vs placebo); hepatotoxicity; nausea; arthralgia; dizziness; headache",contra:"QT prolongation; concurrent QT-prolonging drugs; severe hepatic impairment; hypersensitivity",pearl:"BOXED WARNING for increased mortality (more deaths in bedaquiline group in clinical trials despite microbiological cure - unexplained; reserve for when no adequate alternatives); QT prolongation monitoring required (ECG before and during); novel MOA (ATP synthase inhibition) - no cross-resistance with other anti-TB drugs; FDA approved for MDR-TB 2012"},
  {name:"terbinafine",system:"Antifungals",moa:"Inhibits squalene epoxidase in ergosterol synthesis pathway; squalene accumulates (toxic to fungi); reduces ergosterol production; fungicidal (concentration-dependent)",use:"Onychomycosis (drug of choice oral - fingernails and toenails); tinea pedis, tinea cruris, tinea corporis (topical); tinea capitis (oral - first-line); dermatophyte infections",side:"Oral: hepatotoxicity (monitor LFTs); GI upset; taste disturbance (dysgeusia - may persist after stopping); rash; headache; Topical: local irritation",contra:"Active hepatic disease; CYP2D6 inhibitor (interactions with TCAs, beta-blockers, SSRIs); hypersensitivity",pearl:"DRUG OF CHOICE for onychomycosis (oral) and tinea capitis; fungicidal (unlike azoles which are fungistatic); must treat 6 weeks (fingernails) or 12 weeks (toenails) for onychomycosis; taste disturbance (dysgeusia) can persist months; check LFTs before starting oral form; topical form for superficial dermatophyte infections; CYP2D6 inhibitor = drug interactions with many commonly used drugs"},
  {name:"griseofulvin",system:"Antifungals",moa:"Binds to and disrupts fungal microtubules (binds tubulin); prevents mitotic spindle formation; inhibits fungal cell division; fungistatic; deposited in keratin-containing tissues (skin, hair, nails)",use:"Tinea capitis (alternative to terbinafine; preferred for Microsporum canis); tinea unguium (onychomycosis - alternative); dermatophyte infections requiring systemic therapy",side:"Photosensitivity; GI upset (take with fatty food - increases absorption); headache; lupus-like syndrome; hepatotoxicity; teratogenic; drug interactions (induces CYP450)",contra:"Pregnancy (teratogenic); porphyria; severe liver disease; concurrent warfarin (reduces warfarin efficacy - CYP inducer)",pearl:"ORAL ONLY (no topical form); deposits in keratin of skin, hair, nails (targets dermatophytes); TAKE WITH FATTY FOOD (increases absorption significantly); CYP inducer (reduces warfarin, OCP efficacy); mostly replaced by terbinafine and itraconazole for onychomycosis; photosensitivity (avoid sun); teratogenic - use contraception during and 1 month after"},
  {name:"selenium sulfide",system:"Antifungals",moa:"Selenium sulfide: anti-mitotic; cytostatic activity against Malassezia yeast; zinc pyrithione: antimicrobial activity against Malassezia and bacteria; both reduce seborrheic dermatitis and tinea versicolor",use:"Tinea versicolor (treatment of choice); seborrheic dermatitis; dandruff (anti-dandruff shampoos - Head & Shoulders = zinc pyrithione; Selsun Blue = selenium sulfide)",side:"Local irritation; hair discoloration (selenium sulfide); dryness; avoid eye contact",contra:"Avoid on broken skin; avoid eye/mucous membrane contact; hypersensitivity",pearl:"First-line for tinea versicolor (topical); selenium sulfide = Selsun Blue; zinc pyrithione = Head & Shoulders; apply to affected areas for 10-15 minutes then wash off; recurrence common in tinea versicolor (long-term prophylaxis may be needed); oral azoles (fluconazole, itraconazole) for severe or recurrent cases"},
  {name:"nystatin",system:"Antifungals",moa:"Binds to ergosterol in fungal cell membranes; forms pores causing leakage of intracellular components; fungicidal at high concentrations; fungistatic at lower concentrations; similar to amphotericin B",use:"Oropharyngeal candidiasis (thrush) - oral solution/lozenges; cutaneous and mucocutaneous candidiasis (topical); vaginal candidiasis (topical - second-line after fluconazole); GI candidiasis; magic mouthwash component",side:"GI upset (nausea, diarrhea - oral); local irritation (topical); unpleasant taste (oral solution)",contra:"Systemic fungal infections (NOT absorbed systemically - no effect on systemic fungal infections); hypersensitivity",pearl:"TOPICAL AND ORAL USE ONLY (not absorbed from GI tract = cannot treat systemic infections); think Candida (nystatin = anti-Candida; NOT for dermatophytes); magic mouthwash component for oral mucositis; oral suspension for thrush ('swish and swallow'); NOT for dermatophyte infections (tinea); azoles or amphotericin for systemic infections"},
  {name:"clotrimazole",system:"Antifungals",moa:"Inhibit fungal CYP450 enzyme lanosterol 14-alpha-demethylase; prevent ergosterol synthesis; disrupt fungal cell membrane integrity; fungistatic (topical concentrations)",use:"Tinea infections (tinea pedis, cruris, corporis, versicolor - OTC); vaginal candidiasis (miconazole, clotrimazole); oropharyngeal candidiasis (clotrimazole troches); seborrheic dermatitis (ketoconazole shampoo/cream)",side:"Local irritation; burning; erythema; contact dermatitis (rare); ketoconazole oral: significant systemic side effects (DO NOT use oral ketoconazole for fungal infections)",contra:"Ketoconazole oral: AVOID (hepatotoxicity, drug interactions, QT prolongation, antiandrogenic - FDA has restricted oral use); hypersensitivity",pearl:"OTC availability (clotrimazole Lotrimin, miconazole Monistat); clotrimazole troches for oropharyngeal candidiasis (dissolve in mouth 5x daily); ketoconazole 2% shampoo for seborrheic dermatitis; ORAL ketoconazole CONTRAINDICATED for most fungal infections (safer topical or systemic azoles available); topical azoles do NOT cover tinea capitis or onychomycosis (require oral therapy)"},
  {name:"oxytocin",system:"General",moa:"Activates G-protein-coupled oxytocin receptors in uterine myofibrils; increases intracellular Ca2+; stimulates uterine contractions; also increases local prostaglandin production to further augment contractions",use:"Labor induction and augmentation; prevention and treatment of postpartum hemorrhage (uterine atony); management of incomplete or inevitable abortion",side:"Uterine hyperstimulation/tachysystole (fetal distress); hypotension; tachycardia; increased cardiac output; flushing; nausea/vomiting; antidiuretic effect (hyponatremia with excessive IV fluids - water intoxication); myocardial ischemia",contra:"Contracted pelvis; placenta previa; prior classical uterine incision; transverse fetal lie; prior myomectomy entering endometrium; fetal compromise (relative)",pearl:"Must have continuous fetal monitoring during use; most common cause of adverse fetal outcome in hospital settings is oxytocin misuse (uterine hyperstimulation); antidiuretic effect can cause dangerous hyponatremia if given with large volumes of hypotonic IV fluids; terbutaline used to treat uterine hyperstimulation (tocolysis); low-dose protocols preferred"},
  {name:"misoprostol",system:"Reproductive",moa:"Synthetic PGE1 analog; binds prostaglandin E receptors in uterus and cervix; causes cervical softening/ripening (collagen dissolution) and uterine contractions; increases uterine tone",use:"Cervical ripening before induction (off-label for obstetric use); medical abortion (with mifepristone); postpartum hemorrhage prevention; NSAID-induced ulcer prevention; incomplete abortion",side:"Uterine hyperstimulation; fever; GI upset (diarrhea, cramping); teratogenic if pregnancy continues (Mobius syndrome, limb defects); tachysystole",contra:"Prior uterine surgery (cesarean section or myomectomy) - risk of uterine rupture; hypersensitivity; concurrent with oxytocin (do NOT use together - excessive uterine stimulation); kidney/liver disease (renal component)",pearl:"Off-label for cervical ripening but widely used; PGE1 analog (dinoprostone = PGE2 - FDA approved alternative); teratogenic if pregnancy continues after failed abortion attempt; do NOT use in prior uterine scar (uterine rupture risk); combined with mifepristone for medical abortion; also used for NSAID-induced ulcer prophylaxis"},
  {name:"dinoprostone",system:"General",moa:"Synthetic PGE2 analog; binds prostaglandin receptors in cervix; causes cervical ripening through collagen dissolution and softening; also stimulates uterine contractions",use:"Cervical ripening at term before labor induction (FDA approved); uterine evacuation for missed abortion, fetal death",side:"Uterine hyperstimulation; fever; GI effects (nausea, vomiting, diarrhea); local site reactions; back pain",contra:"Prior uterine surgery; placenta previa; unexplained vaginal bleeding; concurrent oxytocin (separate by at least 30 minutes after dinoprostone removal); hypersensitivity",pearl:"FDA-approved for cervical ripening (unlike misoprostol which is off-label); Cervidil = vaginal insert (can be removed if hyperstimulation occurs - advantage over misoprostol); must separate from oxytocin by at least 30 minutes; improves Bishop score before induction"},
  {name:"magnesium sulfate",system:"Reproductive",moa:"Decreases acetylcholine release at motor nerve terminals; competes with calcium; inhibits smooth muscle contractions; neuroprotective mechanism not fully understood but reduces risk of cerebral palsy in premature infants",use:"Preterm labor tocolysis (buys 48 hours for steroid administration); neuroprotection against cerebral palsy (<32 weeks gestation); eclampsia prevention and treatment (drug of choice for preeclampsia seizures)",side:"Flushing; diaphoresis; loss of deep tendon reflexes (DTRs - early toxicity sign); respiratory depression (toxicity); cardiac arrest (severe toxicity); neonatal depression; hypotension; sedation",contra:"Myasthenia gravis (blocks acetylcholine at NMJ); heart block; renal failure (accumulation); hypersensitivity; significant hypomagnesemia",pearl:"ANTIDOTE = CALCIUM GLUCONATE (keep at bedside during MgSO4 infusion); toxicity monitoring: check DTRs (loss of patellar reflex is FIRST sign), respiratory rate, and urine output hourly; therapeutic level for eclampsia 4-8 mEq/L; respiratory arrest occurs at higher levels; neonatal hypermagnesemia with maternal use; drug of choice for eclampsia prevention/treatment"},
  {name:"betamethasone",system:"Pulmonary",moa:"Bind glucocorticoid receptors; stimulate fetal lung surfactant production (phosphatidylcholine and phosphatidylglycerol); accelerate lung maturation; reduce inflammatory mediators; enhance type II pneumocyte differentiation",use:"Antenatal use (24-34 weeks - standard; 34-37 weeks - given if imminent delivery) to accelerate fetal lung maturity; reduce neonatal respiratory distress syndrome (RDS), intraventricular hemorrhage (IVH), and necrotizing enterocolitis (NEC)",side:"Maternal hyperglycemia (monitor in gestational diabetes); transient fetal heart rate changes; theoretical risk of impaired fetal brain growth with repeated courses",contra:"Active TB (relative); clinical chorioamnionitis (relative - give anyway if imminent preterm birth); routine weekly courses NOT recommended (rescue dose only)",pearl:"TWO doses given 24 hours apart for maximal benefit; maximum benefit within 24-48 hours of first dose (hence why tocolysis given - buy time for 2 doses); betamethasone preferred over dexamethasone (better evidence, less neonatal sepsis); do NOT give routine weekly courses; aim to deliver within 7 days of course for maximum benefit; critically important 24-34 weeks gestation"},
  {name:"terbutaline",system:"Pulmonary",moa:"Selective beta-2 receptor agonist; activates adenylyl cyclase in myometrium; increases cAMP; decreases intracellular Ca2+; inhibits uterine contractions; also bronchodilator",use:"Preterm labor tocolysis (short-term, 2nd-3rd line); acute treatment of uterine hyperstimulation (single dose SC); asthma (rescue inhaler - 2nd/3rd line)",side:"Maternal tachycardia; palpitations; tremor; hypokalemia; hyperglycemia; hypotension; pulmonary edema; fetal tachycardia",contra:"Tachycardia-sensitive cardiovascular disease; poorly controlled diabetes; pulmonary edema; BOXED WARNING: Do NOT use oral terbutaline for long-term tocolysis (>48-72 hours) or maintenance tocolysis - risk of serious maternal cardiac events and death",pearl:"BOXED WARNING for oral terbutaline - FDA restricted to only short-term acute use for tocolysis (do not send home on oral terbutaline); acute single SC dose for uterine hyperstimulation treatment; hyperglycemia via beta-2 modulation of insulin/glucagon secretion; nifedipine and indomethacin preferred over terbutaline for preterm labor"},
  {name:"nifedipine",system:"Cardiovascular",moa:"Blocks voltage-gated L-type calcium channels in uterine smooth muscle; reduces intracellular Ca2+; inhibits myometrial contractions; used for tocolysis at 32-34 weeks",use:"Preterm labor tocolysis (first-line with indomethacin for 32-34 weeks); typically used as 2nd-line if indomethacin contraindicated or >32 weeks",side:"Dizziness; flushing; hypotension; tachycardia (reflex); headache; no known fetal side effects",contra:"Maternal hypotension; concurrent magnesium sulfate (additive hypotension/neuromuscular blockade - use with caution); cardiac disease",pearl:"One of the two preferred tocolytics (with indomethacin); no known direct fetal side effects (unlike terbutaline or magnesium); avoid concurrent magnesium sulfate (additive effects); used for 32-34 weeks gestation window; oral administration; relatively safe profile"},
  {name:"indomethacin",system:"Reproductive",moa:"Inhibits COX-1 and COX-2; reduces prostaglandin synthesis; prostaglandins normally promote uterine contractions; reduction causes tocolysis; also closes patent ductus arteriosus (PDA) in neonates",use:"Preterm labor tocolysis (first-line, 24-32 weeks); neonatal PDA closure (IV indomethacin in premature neonates); ankylosing spondylitis; acute gout; anti-inflammatory",side:"GI upset (maternal); oligohydramnios with prolonged use; fetal: in utero premature closure of ductus arteriosus (AVOID after 32 weeks or >72 hours); neonatal pulmonary hypertension",contra:"Gestational age >32 weeks; use >72 hours; renal dysfunction; platelet dysfunction; GI disease; asthma (NSAID sensitivity); oligohydramnios already present",pearl:"First-line tocolytic for <32 weeks; DO NOT use after 32 weeks (premature ductus arteriosus constriction); maximum 72 hours of use; same drug also used to CLOSE a PDA in premature neonates (opposite therapeutic intent); monitor amniotic fluid (oligohydramnios risk)"},
  {name:"pyridoxine",system:"GI",moa:"Pyridoxine: mechanism for anti-nausea effect not fully understood; cofactor in neurotransmitter synthesis; Doxylamine: first-generation H1 antihistamine with anticholinergic properties; reduces nausea through CNS H1 blockade",use:"Nausea and vomiting of pregnancy (only FDA-approved medication - Diclegis); morning sickness; hyperemesis gravidarum (adjunct)",side:"Drowsiness/sedation (doxylamine); anticholinergic effects; dry mouth; blurred vision; urinary retention",contra:"Hypersensitivity; concurrent MAOIs; significant QT prolongation risk with doxylamine (mild)",pearl:"ONLY FDA-approved drug for nausea and vomiting of pregnancy; combination is delayed-release tablet (Diclegis/Bonjesta); can make DIY version (OTC doxylamine + B6); safe in pregnancy (extensive safety data); take before bed (delayed release peaks in morning); non-pharmacologic approaches should also be tried"},
  {name:"ceftriaxone",system:"Antimicrobials",moa:"Binds penicillin-binding proteins (PBPs); inhibits bacterial cell wall synthesis; bactericidal; active against Neisseria gonorrhoeae",use:"Gonorrhea (Neisseria gonorrhoeae) - ONLY recommended antibiotic class for definitive treatment; pelvic inflammatory disease; syphilis (alternative); bacterial meningitis; CAP",side:"Allergic reactions; biliary sludge; GI effects; pain at injection site (IM); C. difficile; hypersensitivity",contra:"Cephalosporin/penicillin allergy; concurrent IV calcium (neonates); hyperbilirubinemia in neonates",pearl:"ONLY cephalosporins recommended for gonorrhea (increasing resistance to all other classes); single IM dose for uncomplicated gonorrhea; add azithromycin or doxycycline for presumed chlamydia co-infection; ceftriaxone also safe in pregnancy; resistance to fluoroquinolones, tetracyclines widespread - do NOT use those as monotherapy"},
  {name:"doxycycline",system:"Antimicrobials",moa:"Binds 30S ribosomal subunit; inhibits aminoacyl-tRNA binding to mRNA-ribosome complex; bacteriostatic; covers Chlamydia trachomatis (atypical intracellular organism)",use:"Chlamydia (primary treatment - 7 days); gonorrhea coinfection coverage (with ceftriaxone); PID; syphilis (alternative to penicillin); LGV; non-gonococcal urethritis; pelvic inflammatory disease",side:"Photosensitivity; GI esophageal irritation; tooth discoloration (children <8 years); chelation with divalent cations; teratogenic",contra:"Pregnancy (tooth discoloration, bone effects - use azithromycin instead); children <8 years; concurrent antacids/dairy/iron (within 2 hours)",pearl:"First-line for chlamydia in non-pregnant adults; AVOID in pregnancy (use azithromycin instead); 7-day course for chlamydia; partner treatment required; abstain 7 days after completion; most commonly paired with ceftriaxone for gonorrhea/chlamydia coinfection"},
  {name:"azithromycin",system:"Antimicrobials",moa:"Binds 50S ribosomal subunit; inhibits bacterial protein synthesis; bacteriostatic; covers Chlamydia trachomatis; single 1g dose for chlamydia",use:"Chlamydia (single 1g oral dose - alternative to doxycycline, preferred in pregnancy); gonorrhea co-treatment (1g with ceftriaxone); pertussis; pelvic inflammatory disease (with ceftriaxone)",side:"GI upset (nausea, diarrhea, cramping); QT prolongation; hepatotoxicity (rare); hearing loss (high doses)",contra:"QT prolongation; concurrent QT-prolonging drugs; hypersensitivity",pearl:"Preferred for chlamydia in PREGNANCY (safe alternative to doxycycline); single 1g dose (compliance advantage); also covers chlamydia coinfection when combined with ceftriaxone for gonorrhea treatment; doxycycline has better efficacy for chlamydia but requires 7-day course; azithromycin better for compliance"},
  {name:"metronidazole",system:"Reproductive",moa:"Prodrug activated by microbial reduction of nitro group; reactive intermediates damage parasite/bacterial DNA; active against anaerobes and protozoa (Trichomonas vaginalis, Gardnerella vaginalis)",use:"Trichomoniasis (drug of choice - 2g single dose OR 500mg BID x7 days); bacterial vaginosis (drug of choice); C. difficile (oral, mild-moderate); anaerobic infections; H. pylori (triple therapy)",side:"Metallic taste; nausea; disulfiram-like reaction with alcohol (AVOID alcohol during and 48 hours after); peripheral neuropathy (prolonged use); dark urine (harmless)",contra:"First trimester pregnancy (for trichomoniasis - limited data; can use after first trimester); concurrent alcohol or disulfiram; hypersensitivity",pearl:"Treat BOTH partners for trichomoniasis; alcohol interaction = disulfiram-like reaction (counsel patients strictly); treat in 2nd and 3rd trimester of pregnancy (safe); avoid in 1st trimester if possible; tinidazole is alternative; bacterial vaginosis treatment = metronidazole gel or oral"},
  {name:"penicillin g",system:"Antimicrobials",moa:"Binds PBPs; inhibits cell wall synthesis; bactericidal against Treponema pallidum (syphilis organism); beta-lactam antibiotic",use:"Syphilis (ALL stages - drug of choice; Penicillin G benzathine IM for primary/secondary/early latent; aqueous Penicillin G IV for neurosyphilis); congenital syphilis; Lyme disease; strep infections",side:"Allergic reactions (rash to anaphylaxis); Jarisch-Herxheimer reaction (fever, rigors, myalgia 2-8 hours after first dose - prostaglandin-mediated inflammatory response to spirochete killing); injection site reactions; electrolyte disturbances (high dose IV)",contra:"Penicillin allergy (desensitization required for pregnant patients - NO safe alternative in pregnancy for neurosyphilis); hypersensitivity",pearl:"ONLY drug proven effective for syphilis; NO safe substitute for penicillin in pregnancy (desensitize PCN-allergic pregnant patients); Jarisch-Herxheimer reaction expected and NOT a sign of allergy; treat early latent syphilis with single IM benzathine penicillin G; neurosyphilis requires aqueous penicillin G IV for 10-14 days; doxycycline is alternative for non-pregnant patients"},
  {name:"imiquimod",system:"Antivirals",moa:"Imiquimod: Toll-like receptor 7/8 agonist; activates innate immune response; stimulates interferon-alpha and other cytokines; local immune-mediated destruction of HPV warts. Podofilox: antimitotic; disrupts HPV-infected cell mitosis. Sinecatechins: green tea extract; mechanism unclear; likely immune modulation",use:"External genital and perianal condylomata acuminata (HPV warts); imiquimod also for actinic keratosis and basal cell carcinoma",side:"Imiquimod: local erythema, erosion, flaking, crusting, edema; flu-like symptoms; hypopigmentation; Podofilox: local burning/pain/inflammation; sinecatechins: local application site reactions",contra:"Pregnancy (podofilox and sinecatechins - safety data limited); internal/vaginal lesions (not for use on internal surfaces); hypersensitivity",pearl:"All self-applied by patient at home; imiquimod is immune stimulant (mechanism different from podofilox antimitotic); podofilox is patient-applied form of podophyllin (provider-applied version); HPV warts recur frequently (dormant virus persists); HPV vaccination prevents infection but does not treat existing warts; sinecatechins = Veregen (OTC green tea extract)"},
  {name:"hpv vaccine",system:"Renal",moa:"Virus-like particles (VLPs) containing HPV L1 capsid proteins; stimulate antibody production against HPV types; prevent initial HPV infection; Gardasil 9 covers 9 HPV types (6, 11, 16, 18, 31, 33, 45, 52, 58)",use:"Prevention of HPV infection; prevention of cervical, vaginal, vulvar, anal, oropharyngeal cancer; prevention of genital warts; recommended for ages 9-26 (routine), up to 45 years (shared decision-making)",side:"Injection site pain/swelling/redness; syncope (observe 15 minutes post-vaccination); headache; fever; nausea",contra:"Hypersensitivity to any vaccine component; pregnancy (not routinely recommended - delay until postpartum; limited safety data)",pearl:"2-dose series (ages 9-15 given <15 years old); 3-dose series if starting ≥15 years or immunocompromised; does NOT treat existing HPV infection; does NOT replace cervical cancer screening; most effective when given before sexual debut; Gardasil 9 provides broader coverage than Cervarix"},
  {name:"isotretinoin",system:"Reproductive",moa:"13-cis retinoic acid; binds RAR/RXR nuclear receptors; alters gene transcription; causes sebaceous gland atrophy and normalizes follicular keratinization",use:"Severe nodular/cystic acne (only FDA indication); isotretinoin is the most effective acne treatment available",side:"CATASTROPHIC TERATOGENICITY (Category X - CNS, cardio-aortic, ear, cleft defects, microtia, thymic aplasia, craniofacial and branchial arch defects); cheilitis; xerosis; elevated TGs/LDL; hepatotoxicity; depression/suicidality; pseudotumor cerebri (with tetracyclines)",contra:"PREGNANCY (absolute - Category X; two negative pregnancy tests required); concurrent vitamin A supplementation; concurrent tetracyclines (pseudotumor cerebri); blood/organ donation during and 1 month after treatment",pearl:"iPLEDGE REMS program MANDATORY (two negative pregnancy tests + two contraception methods monthly); teratogenicity is CATASTROPHIC (multiple organ system defects); 1 month washout required post-therapy before conception; fat-soluble (take with fatty meal); most common REMS-required drug in US"},
  {name:"warfarin",system:"Cardiovascular",moa:"Inhibits Vitamin K epoxide reductase; prevents carboxylation of factors II, VII, IX, X, and proteins C and S; anticoagulant effect",use:"Atrial fibrillation; DVT/PE; mechanical heart valves; venous thromboembolism prevention (NOT safe in pregnancy)",side:"TERATOGENIC (Category X - first trimester: nasal hypoplasia, stippled epiphyses, intrauterine growth restriction; all trimesters: fetal hemorrhage/CNS bleeding); hemorrhage (maternal and fetal)",contra:"PREGNANCY (Category X - fetal warfarin syndrome; crosses placenta freely); active bleeding; hypersensitivity; non-compliant patients",pearl:"Use LMWH (enoxaparin) in pregnancy instead (does not cross placenta); fetal warfarin syndrome = nasal hypoplasia + stippled epiphyses + IUGR; CNS bleeding can occur throughout pregnancy; mechanical heart valves are a complex situation (heparin less effective but safer for fetus); NEVER use in pregnancy unless no alternative and benefit clearly outweighs risk"},
  {name:"valproic acid",system:"Neurology",moa:"Enhances GABA activity; blocks Na+ channels; blocks T-type Ca2+ channels; inhibits histone deacetylase",use:"Epilepsy; bipolar disorder; migraine prevention; NOT recommended in women of childbearing potential if alternatives exist",side:"NEURAL TUBE DEFECTS (spina bifida - 1-2%); fetal valproate syndrome (craniofacial anomalies, limb defects, cardiovascular defects, autism spectrum disorder); lower IQ scores in exposed children; GI upset; hepatotoxicity; pancreatitis; weight gain; alopecia",contra:"PREGNANCY (highest teratogenic risk of all anticonvulsants - AVOID); liver disease; urea cycle disorders; mitochondrial disease",pearl:"HIGHEST teratogenic risk of any anticonvulsant (neural tube defects, cognitive impairment, autism); FDA requires REMS (SHARE program) and counseling in women of childbearing potential; supplement high-dose folic acid (4-5mg/day) if must use; transition to safer alternatives (lamotrigine, levetiracetam) before conception if possible; Boxed Warning: teratogenicity, hepatotoxicity, pancreatitis"},
  {name:"phenytoin",system:"Cardiovascular",moa:"Blocks voltage-gated sodium channels; reduces repetitive neuronal firing; cell membrane stabilizer",use:"Focal and tonic-clonic seizures; status epilepticus (IV fosphenytoin); trigeminal neuralgia; cardiac arrhythmias (limited)",side:"FETAL HYDANTOIN SYNDROME: facial dysmorphology (wide nasal bridge, short nose, abnormal ears), digital hypoplasia, ventricular septal defect, cognitive impairment, cleft palate; nystagmus; gingival hyperplasia; hirsutism; megaloblastic anemia; teratogenic",contra:"Pregnancy (fetal hydantoin syndrome); heart block; bradycardia; hypersensitivity; concurrent delavirdine",pearl:"Fetal hydantoin syndrome: facial dysmorphology + digit/nail hypoplasia + CNS defects; if seizure control requires phenytoin, supplement folic acid; SJS/TEN risk (HLA-B*1502 in Asian patients); CYP450 INDUCER (reduces OCP, warfarin, other drug efficacy); zero-order kinetics (saturable) = small dose changes cause large level changes"},
  {name:"ace inhibitors",system:"Cardiovascular",moa:"ACEi: inhibit ACE enzyme; prevent formation of angiotensin II; ARBs: block AT1 receptors; both reduce renal blood flow and aldosterone",use:"Hypertension; heart failure; diabetic nephropathy (NOT during pregnancy - avoid entirely)",side:"FETAL RENAL AGENESIS/DYSGENESIS; oligohydramnios; pulmonary hypoplasia; intrauterine growth restriction; fetal demise; neonatal anuria/renal failure; cranial bone hypoplasia",contra:"PREGNANCY (Category D/X - fetal renal hypoplasia and death; AVOID in all trimesters - risk is highest in 2nd-3rd trimester but first trimester exposure should also be avoided); hyperkalemia; bilateral renal artery stenosis",pearl:"Must STOP ACEi/ARBs as soon as pregnancy is confirmed; switch to methyldopa, labetalol, or nifedipine for pregnancy hypertension; fetal kidney damage most severe in 2nd-3rd trimester (active fetal urine production and renal development); oligohydramnios from fetal renal failure leads to pulmonary hypoplasia; counsel all women of childbearing age on this risk"},
  {name:"thalidomide",system:"Endocrine",moa:"Inhibits angiogenesis and modulates immune response (anti-TNF); inhibits cereblon (protein important for limb development); causes vascular disruption during embryonic limb development",use:"Multiple myeloma (with dexamethasone); erythema nodosum leprosum; myelodysplastic syndrome; NOT safe in pregnancy EVER",side:"PHOCOMELIA (limb reduction defects - 'flipper' limbs; characteristic teratogenicity); other skeletal defects; cardiovascular defects; GI defects; peripheral neuropathy (dose-limiting); sedation; constipation; DVT/PE risk; teratogenicity",contra:"PREGNANCY (absolute - single dose can cause catastrophic defects); REMS program required (THALOMID REMS - mandatory contraception for women of childbearing potential and men)",pearl:"Historical catastrophe (1950s-60s) led to major drug safety reforms; responsible for ~10,000 cases of phocomelia before withdrawn; single dose during critical window (22-36 days post-conception) causes defects; REMS program mandatory; also causes peripheral neuropathy (dose-limiting); lenalidomide (Revlimid) and pomalidomide are analogs with same teratogenic risk"},
  {name:"tetracyclines",system:"Antimicrobials",moa:"Bind 30S ribosomal subunit; inhibit aminoacyl-tRNA binding; chelate divalent cations; bacteriostatic",use:"Chlamydia; atypical pneumonia; RMSF; Lyme disease; acne; malaria prophylaxis (AVOID in pregnancy for all these indications - use alternatives)",side:"TERATOGENIC: bone and teeth staining/hypoplasia (2nd-3rd trimester - calcification period); inhibit bone growth; yellowing of primary teeth; maternal hepatotoxicity (high IV doses in pregnancy); photosensitivity",contra:"PREGNANCY (Category D - bone and teeth staining in all tetracyclines; avoid all tetracyclines after 1st trimester); children <8 years; hypersensitivity",pearl:"Deposit in calcium-rich tissues (bones and teeth) during calcification; causes permanent yellow-brown-gray tooth discoloration; bone growth inhibition; safe alternatives in pregnancy: azithromycin (for atypical infections), amoxicillin (strep/some STIs), cephalosporins; doxycycline is only tetracycline used in young children ONLY for RMSF (benefit outweighs risk)"},
  {name:"mifepristone",system:"Endocrine",moa:"Competitive antagonist at progesterone receptors (also glucocorticoid receptors at high doses); blocks progesterone's support of pregnancy; causes decidual necrosis and cervical softening; sensitizes uterus to prostaglandins; used with misoprostol for medical abortion",use:"Medical abortion (≤70 days gestational age - combined with misoprostol); Cushing syndrome (Korlym formulation); emergency contraception (investigational); uterine leiomyomas (research)",side:"Uterine cramping/bleeding; incomplete abortion (requires follow-up); GI effects; infection (rare); prolonged heavy bleeding; allergic reactions; adrenal insufficiency risk with repeated use (glucocorticoid receptor antagonism)",contra:"Ectopic pregnancy (not effective); IUD in place; chronic adrenal failure; hemorrhagic disorders; concurrent corticosteroids (reduces efficacy); hypersensitivity; no access to emergency care",pearl:"Combined with misoprostol (24-48 hours later) for medical abortion (>95% effective ≤7 weeks); mifepristone alone is less effective; follow-up required to confirm complete abortion; REMS program required (Mifeprex); highly controlled; antiprogesterone mechanism allows early abortion without surgery; also approved for Cushing syndrome (Korlym brand)"},
  {name:"estrogens",system:"Endocrine",moa:"Bind cytosolic estrogen receptors (ERα and ERβ); receptor complex translocates to nucleus; modulates gene transcription; regulate development and maintenance of female reproductive system; feedback inhibition of FSH and LH (contraceptive mechanism when combined with progestin)",use:"Oral contraceptives (OCP - with progestin); hormone replacement therapy (HRT) for menopausal symptoms; primary hypogonadism; dysmenorrhea suppression; emergency contraception (high-dose); postmenopausal osteoporosis prevention; prostate cancer (DES)",side:"Nausea; breast tenderness; fluid retention; DVT/PE (especially with high doses and smoking); hypertension; increased endometrial cancer risk (without progestin); increased breast cancer risk; migraine exacerbation; cholestasis; hyperpigmentation; mood changes",contra:"Known/suspected estrogen-dependent cancers (breast, endometrial); undiagnosed vaginal bleeding; liver disease; history of DVT/PE/stroke; pregnancy; heavy smokers >35 years (CVD risk); active thrombophlebitis",pearl:"Add progestin if uterus intact (prevents endometrial cancer from unopposed estrogen); BOXED WARNING for endometrial cancer, CV risk in postmenopausal women; DVT risk increased with oral (first-pass effect); transdermal reduces CV/thrombotic risk; CYP inducers (rifampin, phenytoin, phenobarbital) reduce OCP efficacy; antibiotic-OCP interaction via enterohepatic cycling (limited evidence)"},
  {name:"progestins",system:"Endocrine",moa:"Bind progesterone receptors; inhibit preovulatory LH surge (prevent ovulation); thicken cervical mucus; create hostile endometrium for implantation; maintain pregnancy; some progestins have androgenic or estrogenic properties depending on structure",use:"OCP component; contraception (progestin-only methods - mini-pill, Depo-Provera, Mirena IUD, Nexplanon implant); HRT (with estrogen in women with intact uterus); endometriosis; abnormal uterine bleeding; threatened abortion; preterm birth prevention (17-OHPC)",side:"Irregular bleeding/spotting; weight gain; mood changes; acne (androgenic progestins); depression; reduced libido; amenorrhea (with high-dose); breast tenderness; reduced bone density (Depo-Provera with long-term use)",contra:"Known or suspected pregnancy (varies by indication); undiagnosed vaginal bleeding; liver disease; current breast cancer; arterial thrombosis history",pearl:"Progestin-only pills ('mini-pill') must be taken same time every day (3-hour window); Depo-Provera IM every 12 weeks (contraception + endometriosis + heavy bleeding); levonorgestrel IUD (Mirena) - 5-7 years, reduces heavy bleeding significantly; Nexplanon = subdermal implant (3 years) - most effective reversible contraception; different progestins have different androgenic activity"},
  {name:"combined oral contraceptives",system:"Reproductive",moa:"Combined estrogen (ethinyl estradiol) and progestin; primarily inhibit preovulatory LH surge preventing ovulation; also thicken cervical mucus and alter endometrium; MOA: estrogens and progestins inhibit LH surge → prevent ovulation",use:"Contraception (>99% effective with perfect use); dysmenorrhea; endometriosis; PCOS (androgen suppression); acne; PMS/PMDD; emergency contraception (high dose - Yuzpe method)",side:"Nausea; breast tenderness; breakthrough bleeding; DVT/PE; hypertension; decreased libido; headache; mood changes; rare: arterial thrombosis (stroke, MI - especially in smokers >35)",contra:"SMOKING >35 years (absolute CI - CVD risk); history of DVT/PE/stroke/MI; migraine with aura; uncontrolled hypertension; liver disease; breast cancer; pregnancy; hypersensitivity",pearl:"BOXED WARNING for smokers >35 (significantly increased CV risk); migraine with aura = absolute CI (stroke risk); progestin-only pills safer for smokers/CV risk patients; anticonvulsants (phenytoin, phenobarbital, carbamazepine) and rifampin are CYP inducers that REDUCE OCP efficacy; Ortho Tri-Cyclen approved for acne; start Sunday after period or any day (quick start)"},
  {name:"emergency contraceptives",system:"Reproductive",moa:"Levonorgestrel (Plan B): prevents/delays ovulation; may prevent fertilization; does NOT cause abortion. Ulipristal acetate (Ella): progesterone receptor modulator; delays or inhibits ovulation; may also affect implantation. Copper IUD: copper ions are spermicidal; most effective emergency contraception",use:"Prevention of pregnancy after unprotected sex or contraceptive failure; levonorgestrel: up to 72 hours (best within 72h); ulipristal: up to 120 hours (5 days); copper IUD: up to 120 hours (most effective)",side:"Nausea/vomiting (Plan B); irregular bleeding; headache; dizziness; breast tenderness; next menstrual period may be altered",contra:"Known pregnancy (not abortifacient - does not terminate established pregnancy); ulipristal: avoid concurrent progesterone-containing contraceptives (reduces efficacy); copper IUD: Wilson's disease, copper allergy",pearl:"Plan B (levonorgestrel) OTC - take as soon as possible after unprotected sex; Ella (ulipristal) requires prescription but effective up to 5 days; copper IUD = most effective emergency contraception and provides ongoing protection; levonorgestrel less effective in obese patients (>165 lbs) - use ella or copper IUD; does NOT affect established pregnancy"},
  {name:"tamoxifen",system:"Reproductive",moa:"Partial agonist/antagonist at estrogen receptors; antagonist in breast tissue (blocks tumor growth in ER+ cancers); agonist in bone (preserves bone density) and endometrium (stimulates endometrial growth - adverse effect); competitive inhibitor of estrogen binding",use:"ER-positive breast cancer treatment (early and metastatic); chemoprevention in high-risk women; male breast cancer; DCIS; premenopausal first-line hormonal therapy",side:"Hot flashes; vaginal dryness; endometrial cancer (uterine cancer - increased risk from partial agonism); DVT/PE; cataracts; mood changes; depression",contra:"History of DVT/PE (relative); undiagnosed vaginal bleeding; pregnancy; concurrent CYP2D6 inhibitors (SSRIs like paroxetine, fluoxetine reduce tamoxifen activation to endoxifen - reduce efficacy)",pearl:"ENDOMETRIAL CANCER risk (agonist on endometrium) - annual gynecologic evaluation required; avoid concurrent strong CYP2D6 inhibitors (paroxetine, fluoxetine reduce active metabolite endoxifen - use sertraline or venlafaxine instead if antidepressant needed); DVT/PE risk; 5 years standard duration (10 years for some premenopausal patients); bone-protective effect (agonist in bone)"},
  {name:"raloxifene",system:"Oncology",moa:"Partial agonist/antagonist at estrogen receptors; antagonist in breast and uterus (no endometrial stimulation); agonist in bone (preserves bone density) and liver (reduces LDL); does NOT cause hot flashes as reliably as HRT",use:"Postmenopausal osteoporosis (prevention and treatment); breast cancer chemoprevention in high-risk postmenopausal women; does NOT treat menopausal vasomotor symptoms (hot flashes)",side:"Hot flashes (common - worsens vasomotor symptoms); DVT/PE (class effect); leg cramps; edema; does NOT increase endometrial cancer risk (unlike tamoxifen)",contra:"History of DVT/PE or venous thrombosis (BOXED WARNING); pregnancy; premenopausal women; prolonged immobilization; hypersensitivity",pearl:"Advantage over tamoxifen: NO endometrial cancer risk (pure antagonist in uterus); BOXED WARNING for DVT/PE (same as tamoxifen); does NOT treat hot flashes (may worsen them); prevents osteoporosis AND breast cancer prevention in one drug; used in postmenopausal women only"},
  {name:"clomiphene",system:"Reproductive",moa:"Competitive estrogen receptor antagonist at hypothalamus; blocks negative feedback of estrogen; increases GnRH pulse frequency → increases FSH and LH release → stimulates follicular development and ovulation",use:"Female infertility (anovulatory cycles, PCOS); ovulation induction; first-line treatment for ovulation induction",side:"Multiple gestation (6-8% twins); ovarian hyperstimulation syndrome (OHS - formation of multiple ovarian cysts); hot flashes; visual disturbances (intensification/prolongation of afterimages - stop if vision changes); mood swings; breast tenderness; nausea",contra:"Pregnancy; ovarian cysts or enlargement; liver disease; undiagnosed vaginal bleeding; thyroid/adrenal dysfunction; hypersensitivity",pearl:"First-line for ovulation induction; pulsatile dosing (50mg daily for 5 days beginning day 3-5 of cycle); if no ovulation at 50mg, increase to 100mg; VISUAL DISTURBANCES require immediate discontinuation; multiple pregnancy rate 6-8% (twins mostly); if ovulation occurs but no pregnancy in 3-4 cycles, reassess; anti-estrogen at hypothalamus increases FSH/LH → ovulation"},
  {name:"aromatase inhibitors",system:"Reproductive",moa:"Inhibit aromatase (CYP19A1) enzyme; prevent conversion of androgens to estrogens in peripheral tissues; dramatically reduce estrogen levels; used in postmenopausal women (adrenal androgen conversion is main source post-menopause)",use:"Postmenopausal ER+ breast cancer (adjuvant and metastatic - superior to tamoxifen in postmenopausal); ovulation induction in PCOS (off-label - letrozole preferred over clomiphene); breast cancer chemoprevention",side:"Hot flashes; arthralgia/myalgia (joint pain - most common reason for stopping); osteoporosis (no bone-protective effect unlike tamoxifen/raloxifene - supplement calcium/vitamin D); vaginal dryness; mood changes; headache",contra:"Pregnancy (estrogen suppression harmful to fetus); premenopausal women (ovaries still producing estrogen - not effective without ovarian suppression); hypersensitivity",pearl:"Preferred over tamoxifen for postmenopausal ER+ breast cancer; BONE LOSS - need bone density monitoring and calcium/vitamin D supplementation; no endometrial cancer risk (unlike tamoxifen); letrozole now preferred over clomiphene for ovulation induction in PCOS (fewer side effects, better live birth rates); exemestane is steroidal (irreversible); letrozole/anastrozole are non-steroidal (reversible)"},
  {name:"gnrh agonists",system:"Reproductive",moa:"Agonists: continuous (non-pulsatile) stimulation of GnRH receptors → initial flare then receptor downregulation → profound suppression of LH/FSH/sex hormones (chemical castration). Antagonists: directly block GnRH receptors without initial flare → immediate sex hormone suppression",use:"Prostate cancer (medical castration); endometriosis; uterine fibroids; precocious puberty; assisted reproduction (controlled ovarian stimulation); premenopausal breast cancer; GnRH antagonists (cetrorelix, ganirelix): IVF protocols",side:"Hot flashes; osteoporosis; impotence; decreased libido; vaginal dryness; mood changes; initial tumor flare (agonists - from initial LH/FSH surge - add androgen blocker during first 2 weeks for prostate cancer)",contra:"Pregnancy; undiagnosed vaginal bleeding; osteoporosis (relative - worsen with prolonged use); hypersensitivity",pearl:"Agonists: initial flare of tumor (prostate cancer - prescribe antiandrogen first weeks to prevent flare); antagonists: NO flare; add-back therapy (low-dose estrogen/progestin) reduces hot flashes and bone loss with long-term use; leuprolide IM/SC monthly or 3-month depot; leuprolide used for endometriosis (6-month course), precocious puberty (continuous); GnRH antagonists used in IVF protocols"},
  {name:"metformin",system:"Endocrine",moa:"Inhibits hepatic gluconeogenesis (primary mechanism); activates AMPK (AMP-activated protein kinase); decreases intestinal glucose absorption; improves peripheral insulin sensitivity; does NOT stimulate insulin secretion",use:"Type 2 diabetes mellitus (first-line if no contraindication); PCOS (off-label - improves insulin resistance); prediabetes; GLP-1 agonist combination",side:"GI (nausea, diarrhea, metallic taste - most common, minimize by taking with food or using XR form); lactic acidosis (rare but serious - in renal failure, liver failure, heart failure, alcoholism, contrast dye procedures); vitamin B12 deficiency (long-term use); weight neutral",contra:"eGFR <30 mL/min (contraindicated; hold if <45); hepatic failure; alcohol abuse; heart failure (historical concern - current guidelines allow if stable); IV contrast dye (hold 48 hours before and after - lactic acidosis risk); hypersensitivity",pearl:"FIRST-LINE for T2DM (reduces all-cause mortality, CV events, cheap, weight neutral); hold before IV contrast (48 hours before and after - lactic acidosis risk); lactic acidosis rare but fatal (risk factors: renal/liver/HF/alcohol); B12 monitoring recommended with long-term use; GI side effects minimized with XR form; safe in combination with all other antidiabetic drugs"},
  {name:"sulfonylureas",system:"Endocrine",moa:"Block ATP-sensitive K+ channels (KATP) on pancreatic beta cells; cause membrane depolarization; voltage-gated Ca2+ channels open; Ca2+ influx triggers insulin release; stimulate insulin secretion regardless of blood glucose",use:"Type 2 diabetes mellitus (second-line or if cost is concern); C-peptide positive type 2 DM; requires functional beta cells",side:"HYPOGLYCEMIA (most significant - especially glyburide and in elderly/renal failure); weight gain; GI upset; rash; photosensitivity; rare: SIADH (hyponatremia); disulfiram-like reaction with alcohol (chlorpropamide - older agent)",contra:"Type 1 DM (no beta cells); significant renal impairment (glipizide preferred - hepatic metabolism; glyburide accumulates - avoid in CKD); hepatic impairment; hypersensitivity (sulfonamide cross-reactivity possible); pregnancy",pearl:"GLIPIZIDE PREFERRED in elderly and CKD (shorter acting, hepatic metabolism, less hypoglycemia risk); GLYBURIDE most hypoglycemia risk (accumulates in renal failure, active metabolites); cheap option (cost consideration in guidelines); HYPOGLYCEMIA risk requires patient education; second-generation SUs (glipizide, glyburide, glimepiride) preferred over first-generation; insulin secretion is glucose-independent (hypoglycemia risk even without eating)"},
