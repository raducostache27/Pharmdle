  {name:"vancomycin",system:"Antimicrobials",moa:"Glycopeptide — inhibits cell wall synthesis by binding D-Ala-D-Ala terminus of peptidoglycan precursors (different mechanism from beta-lactams)",use:"MRSA infections (bacteremia, endocarditis, pneumonia, meningitis), C. difficile (oral — not absorbed), penicillin-allergic patients with serious gram-positive infections",side:"Red Man Syndrome (vancomycin flushing syndrome — histamine release, not true allergy), nephrotoxicity, ototoxicity, thrombocytopenia",contra:"None absolute; avoid rapid infusion",pearl:"Red Man Syndrome = infuse too fast → slow rate + diphenhydramine; monitor AUC/MIC for dosing; oral form for C. diff (NOT absorbed)"},
  {name:"doxycycline",system:"Antimicrobials",moa:"Tetracycline — inhibits 30S ribosomal subunit, blocking aminoacyl-tRNA binding → bacteriostatic",use:"Atypical pneumonia (Mycoplasma, Chlamydia, Legionella), Lyme disease, RMSF, chlamydia, syphilis (pen allergy), malaria prophylaxis, acne, MRSA SSTIs",side:"Photosensitivity, GI upset, esophageal ulceration, tooth discoloration/bone inhibition in children <8, pseudotumor cerebri",contra:"Children <8 years, pregnancy",pearl:"Drug of choice for RMSF and Lyme (early); photosensitivity — use sunscreen; avoid dairy and antacids (chelation)"},
  {name:"azithromycin",system:"Antimicrobials",moa:"Macrolide — binds 50S ribosomal subunit (23S rRNA); inhibits translocation → bacteriostatic",use:"Community-acquired pneumonia, atypical pneumonia (Mycoplasma, Chlamydia, Legionella), chlamydia, gonorrhea (combo), MAC prophylaxis (HIV)",side:"GI upset (most common), QT prolongation, hepatotoxicity, hearing loss (high doses)",contra:"Prolonged QT, macrolide allergy",pearl:"Z-pack; excellent intracellular penetration; single-dose 1g for chlamydial urethritis/cervicitis; QT prolongation risk"},
  {name:"clindamycin",system:"Antimicrobials",moa:"Lincosamide — binds 50S ribosomal subunit; inhibits peptide bond formation → bacteriostatic",use:"Anaerobic infections, MRSA SSTIs (oral), bacterial vaginosis, aspiration pneumonia, toxoplasmosis (with pyrimethamine), PCP prophylaxis",side:"C. difficile colitis (highest risk among all antibiotics), GI upset, diarrhea",contra:"C. difficile history",pearl:"Highest C. diff risk of any antibiotic; excellent anaerobic coverage; also used topically for acne (minimal systemic absorption)"},
  {name:"metronidazole",system:"Antimicrobials",moa:"Prodrug — reduced by anaerobic organisms to reactive nitro radicals that damage DNA",use:"Anaerobic infections (abscesses, aspiration pneumonia), C. difficile (oral/IV), bacterial vaginosis, Trichomonas, H. pylori, Giardia, Entamoeba",side:"Metallic taste, nausea, peripheral neuropathy (prolonged use), disulfiram-like reaction with alcohol",contra:"Concurrent alcohol use, first trimester of pregnancy (relative)",pearl:"Disulfiram-like reaction with alcohol (avoid alcohol during and 48 hours after); drug of choice for BV, Trichomonas, Giardia"},
  {name:"ciprofloxacin",system:"Antimicrobials",moa:"Fluoroquinolone — inhibits DNA gyrase (topoisomerase II) and topoisomerase IV → blocks DNA replication and transcription",use:"UTI, pyelonephritis, GI infections (Salmonella, Shigella, Campylobacter), anthrax prophylaxis, gonorrhea (resistance increasing), Pseudomonas",side:"QT prolongation, tendinopathy/tendon rupture (especially Achilles — black box), peripheral neuropathy, C. diff, CNS effects",contra:"Children/adolescents (cartilage toxicity), pregnancy, myasthenia gravis, concurrent QT-prolonging drugs",pearl:"Black box for tendon rupture and peripheral neuropathy; Achilles tendinitis most common; avoid in children and pregnancy"},
  {name:"levofloxacin",system:"Antimicrobials",moa:"Fluoroquinolone — inhibits DNA gyrase and topoisomerase IV; 'respiratory fluoroquinolone' with enhanced pneumococcal activity",use:"Community-acquired pneumonia, sinusitis, UTI/pyelonephritis, TB (second-line), anthrax",side:"QT prolongation, tendinopathy (black box), hyperglycemia/hypoglycemia in diabetics, C. diff",contra:"Children, pregnancy, prolonged QT",pearl:"'Respiratory quinolone' — better S. pneumoniae coverage than ciprofloxacin; avoid antacids/sucralfate (chelation reduces absorption)"},
  {name:"trimethoprim-sulfamethoxazole",system:"Antimicrobials",moa:"TMP blocks dihydrofolate reductase; SMX blocks dihydropteroate synthase — sequential blockade of folate synthesis → synergistic bactericidal",use:"UTI, PCP treatment and prophylaxis, MRSA SSTIs (oral), Nocardia, Toxoplasma prophylaxis (HIV), Pneumocystis jirovecii",side:"Hyperkalemia (TMP blocks renal K⁺ secretion), Stevens-Johnson syndrome, bone marrow suppression, hemolytic anemia (G6PD deficiency), nephrotoxicity, sulfa allergy",contra:"Sulfa allergy, pregnancy (near term), severe renal failure, G6PD deficiency (high doses)",pearl:"TMP acts like a potassium-sparing diuretic — monitor K⁺; first-line for PCP and MRSA SSTIs; give with leucovorin in immunocompromised to reduce hematologic toxicity"},
  {name:"nitrofurantoin",system:"Antimicrobials",moa:"Prodrug — reduced by bacterial enzymes to reactive metabolites that damage DNA, ribosomes, and cell membranes",use:"Uncomplicated lower UTI (cystitis), UTI prophylaxis",side:"Pulmonary toxicity (acute and chronic), peripheral neuropathy, hemolytic anemia (G6PD deficiency), GI upset, brown urine",contra:"eGFR <30–45 (inadequate urinary concentration), pregnancy near term (neonatal hemolytic anemia), G6PD deficiency",pearl:"Only effective for lower UTI (not pyelonephritis — doesn't achieve tissue levels); brown discoloration of urine is harmless"},
  {name:"permethrin",system:"Antimicrobials",moa:"Pyrethroid — prolongs Na⁺ channel opening in arthropod neurons causing paralysis and death of ectoparasites",use:"Scabies (5% cream), head lice (1% lotion), body lice",side:"Skin burning, itching, rash (usually mild and transient)",contra:"None absolute; caution in infants under 2 months",pearl:"Apply 5% cream from neck down for scabies, leave 8–14 hours; itching may persist weeks after treatment (dead mites still present)"},
  {name:"ivermectin",system:"Antimicrobials",moa:"Potentiates GABA-gated Cl⁻ channels in invertebrate nerve/muscle → paralysis and death of parasites",use:"Crusted/Norwegian scabies (oral), strongyloidiasis, onchocerciasis (river blindness), head lice, lymphatic filariasis",side:"Mazzotti reaction (fever, urticaria, edema from dying microfilariae in onchocerciasis), dizziness, nausea",contra:"Children <15 kg, pregnancy (relative contraindication)",pearl:"Oral ivermectin for crusted scabies (not responsive to topical permethrin); does not kill eggs — second dose at 2 weeks required"},
  {name:"linezolid",system:"Antimicrobials",moa:"Oxazolidinone — binds 23S rRNA of 50S ribosomal subunit; inhibits initiation of translation (unique mechanism)",use:"MRSA pneumonia (better lung penetration than vancomycin), VRE infections, MRSA SSTIs",side:"Serotonin syndrome (MAO-B inhibitor), myelosuppression (especially thrombocytopenia), peripheral/optic neuropathy (prolonged use), lactic acidosis",contra:"Concurrent serotonergic drugs (serotonin syndrome risk), concurrent MAOIs",pearl:"Weak MAO inhibitor — avoid tyramine-rich foods and serotonergic drugs; monitor CBC weekly (thrombocytopenia); preferred over vancomycin for MRSA pneumonia"},
  {name:"daptomycin",system:"Antimicrobials",moa:"Cyclic lipopeptide — inserts into bacterial cell membrane in a Ca²⁺-dependent manner → membrane depolarization → rapid cell death",use:"MRSA bacteremia and right-sided endocarditis, VRE infections, MRSA SSTIs",side:"Myopathy/rhabdomyolysis (monitor CK weekly), eosinophilic pneumonia",contra:"Left-sided (pulmonary) pneumonia (inactivated by surfactant)",pearl:"'Surfactant-inactivated' — do NOT use for pneumonia; inactivated by pulmonary surfactant; monitor CK weekly for myopathy"},

  // ── ANTIFUNGALS ───────────────────────────────────────────────────────────────
  {name:"fluconazole",system:"Antifungals",moa:"Azole — inhibits CYP51 (lanosterol 14α-demethylase) → blocks ergosterol synthesis → fungistatic",use:"Candidiasis (oral, esophageal, vaginal, candidemia), cryptococcal meningitis (consolidation/maintenance), coccidioidomycosis",side:"GI upset, elevated LFTs, QT prolongation, CYP2C9/3A4 inhibitor (many drug interactions), teratogenicity",contra:"Pregnancy, concurrent QT-prolonging drugs",pearl:"CYP inhibitor — many drug interactions (warfarin, statins, phenytoin); NOT effective against Aspergillus or molds"},
  {name:"itraconazole",system:"Antifungals",moa:"Azole — inhibits ergosterol synthesis (same as fluconazole); broader mold coverage",use:"Histoplasmosis, blastomycosis, coccidioidomycosis, dermatophytoses (nail), Aspergillus (step-down), sporotrichosis",side:"Negative inotropy (heart failure risk), peripheral neuropathy, GI upset, hepatotoxicity, many drug interactions",contra:"Heart failure, concurrent drugs requiring CYP3A4 (e.g., statins — rhabdomyolysis risk)",pearl:"Only oral azole with some Aspergillus activity; negative inotrope — avoid in HF; variable bioavailability (take capsules with food, solution on empty stomach)"},
  {name:"voriconazole",system:"Antifungals",moa:"Triazole — inhibits fungal CYP51; broader mold coverage than fluconazole; active against Aspergillus",use:"Invasive aspergillosis (drug of choice), Fusarium, Scedosporium, candidemia (step-down), refractory mold infections",side:"Visual disturbances (transient, reversible — hallucinations, photopsia), photosensitivity, hepatotoxicity, QT prolongation, CYP inhibitor, fluorosis (long-term)",contra:"Concurrent rifampin, carbamazepine, ritonavir (strong CYP inducers significantly reduce levels)",pearl:"Drug of choice for invasive aspergillosis; unique side effect is visual changes (photopsia); monitor through levels; photosensitivity → squamous cell carcinoma risk (long-term)"},
  {name:"amphotericin B",system:"Antifungals",moa:"Polyene — binds ergosterol in fungal cell membrane → forms pores → leakage of intracellular contents → cell death; fungicidal",use:"Invasive aspergillosis, cryptococcal meningitis (induction), mucormycosis, severe candidiasis, histoplasmosis (severe)",side:"Nephrotoxicity (dose-limiting — tubular acidosis, hypokalemia, hypomagnesemia), infusion reactions (fever, chills, rigors), anemia",contra:"None absolute; significant renal toxicity limits use",pearl:"'Ampho-terrible' — nephrotoxicity is the major limiting toxicity; lipid formulations (liposomal AmB) have less nephrotoxicity; premedicate with acetaminophen/diphenhydramine for infusion reactions"},
  {name:"caspofungin",system:"Antifungals",moa:"Echinocandin — inhibits beta-(1,3)-D-glucan synthase → disrupts fungal cell wall synthesis (unique mechanism — no mammalian equivalent)",use:"Invasive candidiasis (first-line), aspergillosis (salvage), esophageal candidiasis, empiric antifungal in febrile neutropenia",side:"GI upset, elevated LFTs, infusion-related reactions, hypokalemia",contra:"None absolute; dose adjust in hepatic impairment",pearl:"Echinocandins are the safest antifungals — minimal drug interactions and nephrotoxicity; covers Candida and Aspergillus; does NOT cover Cryptococcus"},
  {name:"micafungin",system:"Antifungals",moa:"Echinocandin — inhibits beta-(1,3)-D-glucan synthase; same class as caspofungin",use:"Invasive candidiasis, esophageal candidiasis, prophylaxis in stem cell transplant",side:"Elevated LFTs, GI upset, histamine-mediated infusion reactions (rare)",contra:"None absolute",pearl:"Echinocandin class: excellent Candida coverage, no Cryptococcus activity, minimal nephrotoxicity; useful in azole-resistant Candida"},
  {name:"terbinafine",system:"Antifungals",moa:"Allylamine — inhibits squalene epoxidase → accumulation of toxic squalene → disrupts ergosterol synthesis; fungicidal",use:"Dermatophyte infections (onychomycosis — nail fungus, tinea corporis, tinea pedis, tinea capitis)",side:"GI upset, hepatotoxicity (rare), taste disturbance (dysgeusia), rash, drug interactions (CYP2D6 inhibitor)",contra:"Hepatic disease, CYP2D6-sensitive drugs (e.g., tricyclics, certain antidepressants)",pearl:"Drug of choice for onychomycosis (nail fungus); check LFTs before use; dysgeusia (metallic taste) is a classic side effect"},
  {name:"nystatin",system:"Antifungals",moa:"Polyene — binds ergosterol → pores in fungal membrane → cell death; fungicidal (same class as amphotericin)",use:"Oropharyngeal candidiasis (thrush — oral swish and swallow), esophageal candidiasis, vaginal candidiasis, cutaneous candidiasis",side:"GI upset (oral), local irritation (topical) — minimal systemic toxicity (not absorbed",contra:"None significant (topical/oral use only)",pearl:"NOT absorbed systemically — used only for mucocutaneous candidiasis; 'swish and swallow' for oral thrush; cannot treat systemic infections"},
  {name:"griseofulvin",system:"Antifungals",moa:"Disrupts microtubule function in mitosis — binds tubulin; deposits in keratin precursor cells in skin, hair, and nails",use:"Dermatophyte infections (tinea capitis — preferred especially in children, tinea corporis, tinea pedis, onychomycosis if terbinafine not tolerated)",side:"Headache, GI upset, photosensitivity, hepatotoxicity, teratogenicity, disulfiram-like reaction with alcohol",contra:"Pregnancy (teratogenic), porphyria, hepatic failure",pearl:"Drug of choice for tinea capitis in children; taken with fatty food (increases absorption); induces CYP3A4 (drug interactions)"},

  // ── ANTIVIRALS ────────────────────────────────────────────────────────────────
  {name:"acyclovir",system:"Antivirals",moa:"Guanosine analog prodrug — activated by viral thymidine kinase to acyclovir triphosphate → inhibits viral DNA polymerase and causes chain termination",use:"HSV-1 and HSV-2 (treatment and prophylaxis), VZV (chickenpox, zoster), herpes encephalitis (IV), genital herpes suppression",side:"Nephrotoxicity/crystalluria (IV — push hydration), neurotoxicity (high doses/renal failure), GI upset",contra:"Severe renal failure without dose adjustment",pearl:"Requires viral thymidine kinase for activation — resistance when TK mutated; IV high-dose for herpes encephalitis; always hydrate well with IV use"},
  {name:"valacyclovir",system:"Antivirals",moa:"Prodrug of acyclovir — converted to acyclovir after oral absorption; same mechanism (viral TK activation → DNA polymerase inhibition)",use:"HSV-1/HSV-2 treatment and suppression, VZV (herpes zoster), cold sores, reduction of HSV transmission",side:"GI upset, headache, nephrotoxicity (less than IV acyclovir), TTP/HUS (very high doses in immunocompromised)",contra:"Severe renal failure without dose adjustment",pearl:"Better oral bioavailability than acyclovir (55% vs 10–20%); preferred over oral acyclovir for most HSV/VZV indications"},
  {name:"ganciclovir",system:"Antivirals",moa:"Guanosine analog — activated by CMV UL97 kinase and cellular kinases → inhibits CMV DNA polymerase; more potent than acyclovir against CMV",use:"CMV retinitis, CMV disease in immunocompromised (transplant, AIDS), CMV prophylaxis post-transplant",side:"Myelosuppression (bone marrow toxicity — neutropenia, thrombocytopenia — main dose-limiting toxicity), nephrotoxicity, teratogenicity",contra:"ANC <500, platelet <25,000, pregnancy",pearl:"Main toxicity is myelosuppression (monitor CBC); resistance via UL97 mutation → switch to foscarnet or cidofovir"},
  {name:"valganciclovir",system:"Antivirals",moa:"Oral prodrug of ganciclovir — hydrolyzed to ganciclovir after absorption; same mechanism (CMV UL97 kinase → DNA polymerase inhibition)",use:"CMV retinitis treatment and prevention, CMV prophylaxis post-transplant (solid organ)",side:"Myelosuppression (same as ganciclovir — neutropenia, thrombocytopenia), GI upset, nephrotoxicity",contra:"ANC <500, platelet <25,000, pregnancy; severe renal impairment (dose adjust)",pearl:"Oral bioavailability equivalent to IV ganciclovir; preferred for outpatient CMV treatment/prophylaxis; monitor CBC closely"},
  {name:"foscarnet",system:"Antivirals",moa:"Pyrophosphate analog — directly inhibits viral DNA polymerase (HSV, CMV, HIV reverse transcriptase) WITHOUT requiring viral kinase activation",use:"CMV retinitis (ganciclovir-resistant), acyclovir-resistant HSV/VZV in immunocompromised patients",side:"Nephrotoxicity (major — dose-limiting), electrolyte abnormalities (hypocalcemia, hypomagnesemia, hypophosphatemia), seizures, penile/genital ulcers",contra:"Severe renal impairment",pearl:"Does NOT need viral kinase activation — works against TK-deficient acyclovir-resistant HSV and UL97-mutant ganciclovir-resistant CMV; severe electrolyte disturbances (chelates divalent cations)"},
  {name:"cidofovir",system:"Antivirals",moa:"Nucleotide analog (acyclic) — phosphorylated by cellular kinases (not viral kinases) to active form → inhibits viral DNA polymerase",use:"CMV retinitis (ganciclovir/foscarnet resistant), BK virus nephropathy (off-label), adenovirus (off-label)",side:"Severe nephrotoxicity (proximal tubular toxicity — Fanconi syndrome), neutropenia, uveitis, ocular hypotony",contra:"Pre-existing renal failure, concurrent nephrotoxic drugs",pearl:"Must be given with probenecid and IV saline prehydration to reduce nephrotoxicity; does not require viral kinase activation"},
  {name:"oseltamivir",system:"Antivirals",moa:"Neuraminidase inhibitor — blocks influenza neuraminidase → prevents viral release from infected cells and spread to uninfected cells",use:"Influenza A and B treatment (start within 48 hours of symptoms), influenza prophylaxis in high-risk contacts",side:"Nausea, vomiting (take with food), headache, neuropsychiatric effects (reported in children — rare)",contra:"None absolute; dose adjust in renal impairment",pearl:"Most effective when started within 48 hours of symptom onset; reduces duration by ~1–2 days; both treatment and post-exposure prophylaxis"},
  {name:"zanamivir",system:"Antivirals",moa:"Neuraminidase inhibitor — same mechanism as oseltamivir; inhaled formulation",use:"Influenza A and B treatment and prophylaxis (inhaled)",side:"Bronchospasm (can be severe in asthma/COPD patients — black box warning), GI upset, headache",contra:"Severe asthma or COPD (bronchospasm risk)",pearl:"Inhaled — not systemic; bronchospasm is the key concern; oral oseltamivir preferred if pulmonary disease present"},
  {name:"baloxavir",system:"Antivirals",moa:"Cap-dependent endonuclease inhibitor — novel mechanism; blocks influenza polymerase acidic (PA) protein, inhibiting viral mRNA transcription",use:"Influenza A and B (uncomplicated, within 48 hours), high-risk patients with influenza",side:"Diarrhea, bronchitis; drug interactions (polyvalent cations — dairy, antacids reduce absorption)",contra:"Pregnancy (insufficient data)",pearl:"Novel mechanism different from neuraminidase inhibitors; single oral dose for uncomplicated influenza; don't take with dairy/antacids"},
  {name:"ribavirin",system:"Antivirals",moa:"Guanosine analog — multiple mechanisms: inhibits inosine monophosphate dehydrogenase (IMP-DH), disrupts viral RNA capping, and induces lethal mutagenesis",use:"HCV (with peginterferon — now largely replaced by DAAs), RSV (inhaled — severe cases in infants), Lassa fever, hantavirus (off-label)",side:"Hemolytic anemia (dose-limiting), teratogenicity (Category X — contraception required for men and women), fatigue",contra:"Pregnancy (Category X), significant anemia, hemoglobinopathies, severe renal failure",pearl:"Teratogenic — contraception required for 6 months after stopping in both sexes; hemolytic anemia monitors hemoglobin"},
  {name:"sofosbuvir",system:"Antivirals",moa:"NS5B nucleotide analog inhibitor — blocks HCV RNA-dependent RNA polymerase; pangenotypic activity",use:"Chronic hepatitis C (all genotypes — part of DAA regimens, e.g., sofosbuvir/velpatasvir)",side:"Fatigue, headache, nausea; bradycardia when combined with amiodarone (serious interaction)",contra:"Concurrent amiodarone (fatal bradycardia), severe renal failure (prodrug metabolite accumulates)",pearl:"Pangenotypic — works against all HCV genotypes; part of fixed-dose combinations (Epclusa, Harvoni); amiodarone interaction is serious and can be fatal"},
  {name:"ledipasvir",system:"Antivirals",moa:"NS5A inhibitor — blocks HCV NS5A replication complex; disrupts viral assembly and replication",use:"Chronic HCV genotype 1 (combined with sofosbuvir as Harvoni)",side:"Fatigue, headache, nausea, diarrhea; drug interactions (antacids, acid-suppressing agents reduce absorption)",contra:"Concurrent amiodarone (with sofosbuvir component)",pearl:"Part of Harvoni (ledipasvir/sofosbuvir) — first once-daily single-tablet HCV regimen; revolutionized HCV treatment with >95% SVR rates"},

  // ── HIV ───────────────────────────────────────────────────────────────────────
  {name:"zidovudine",system:"HIV",moa:"NRTI — nucleoside reverse transcriptase inhibitor; thymidine analog; incorporated into viral DNA → chain termination",use:"HIV treatment (ART combinations), prevention of maternal-to-child transmission (perinatal prophylaxis)",side:"Bone marrow suppression (anemia, neutropenia — dose-limiting), macrocytic anemia, myopathy, lactic acidosis/hepatic steatosis (mitochondrial toxicity)",contra:"Severe anemia/neutropenia",pearl:"First HIV drug approved; still used for PMTCT (perinatal prophylaxis); the classic NRTI with myelosuppression and macrocytic anemia"},
  {name:"tenofovir",system:"HIV",moa:"NRTI — nucleotide reverse transcriptase inhibitor (NtRTI); adenosine analog; terminates viral DNA chain",use:"HIV treatment (backbone of most ART regimens), HBV treatment (tenofovir disoproxil fumarate), PrEP (HIV pre-exposure prophylaxis)",side:"Nephrotoxicity (Fanconi syndrome, decreased bone density), lactic acidosis",contra:"Severe renal impairment (dose adjust), concurrent nephrotoxic drugs",pearl:"TDF: nephrotoxic; TAF (alafenamide): lower renal/bone toxicity, same HIV activity; backbone of most modern HIV regimens; also first-line for HBV"},
  {name:"emtricitabine",system:"HIV",moa:"NRTI — cytosine analog (similar to lamivudine); inhibits HIV and HBV reverse transcriptase → chain termination",use:"HIV treatment (nearly universal in ART combinations), HBV treatment (less common), PrEP",side:"Headache, GI upset, skin hyperpigmentation (palms/soles), lactic acidosis (rare)",contra:"None absolute; dose adjust in renal failure",pearl:"Often combined with tenofovir (Truvada, Descovy) as the NRTI backbone; also active against HBV — discontinuation can cause HBV flare"},
  {name:"efavirenz",system:"HIV",moa:"NNRTI — non-nucleoside reverse transcriptase inhibitor; binds allosteric site of HIV-1 RT (not incorporated into DNA)",use:"HIV-1 treatment (historically first-line; now less used due to CNS side effects)",side:"CNS effects (vivid dreams, dizziness, mood changes, depression — dose at bedtime), teratogenicity (neural tube defects — Category D), rash, QT prolongation",contra:"Pregnancy (first trimester — neural tube defects), psychiatric illness",pearl:"Take at bedtime to minimize CNS side effects (vivid dreams, dizziness); teratogenic — avoid in first trimester; CYP3A4 inducer"},
  {name:"rilpivirine",system:"HIV",moa:"NNRTI — allosteric inhibitor of HIV-1 reverse transcriptase; second-generation NNRTI",use:"HIV-1 treatment in treatment-naive patients with viral load <100,000 copies/mL and CD4 >200 cells/mm³",side:"Depression, insomnia, headache, rash; reduced efficacy with acid-suppressing agents",contra:"Concurrent PPIs (reduced absorption), viral load >100,000 at baseline, CD4 <200",pearl:"Must be taken with food; acid-suppressing agents significantly reduce levels — CANNOT be taken with PPIs; used in long-acting injectable combinations (cabotegravir + rilpivirine)"},
  {name:"lopinavir-ritonavir",system:"HIV",moa:"PI + pharmacokinetic booster — lopinavir inhibits HIV protease (prevents polyprotein cleavage); ritonavir is a potent CYP3A4 inhibitor used to 'boost' lopinavir levels",use:"HIV treatment in adults and children; second-line regimen when INSTI-based regimens fail",side:"GI toxicity (diarrhea, nausea — significant), hyperlipidemia, hyperglycemia, lipodystrophy, QT/PR prolongation",contra:"Concurrent drugs heavily dependent on CYP3A4 (risk of life-threatening interactions)",pearl:"Ritonavir is not therapeutic at this dose — it's a 'PK booster'; PI class causes dyslipidemia and lipodystrophy; many drug interactions via CYP3A4"},
  {name:"atazanavir",system:"HIV",moa:"HIV protease inhibitor — inhibits HIV aspartyl protease, preventing maturation of viral polyproteins",use:"HIV treatment in combination ART regimens (requires boosting with cobicistat or ritonavir)",side:"Indirect hyperbilirubinemia/jaundice (UGT1A1 inhibition — scleral icterus, benign), nephrolithiasis, PR interval prolongation, dyslipidemia (less than other PIs)",contra:"Concurrent PPIs at standard doses (significantly reduce levels), severe hepatic impairment",pearl:"Jaundice from indirect hyperbilirubinemia is benign (unconjugated) — reassure patient; least dyslipidemia of the PIs; nephrolithiasis possible"},
  {name:"dolutegravir",system:"HIV",moa:"INSTI — integrase strand transfer inhibitor; blocks HIV integrase, preventing integration of viral DNA into host chromosome",use:"HIV-1 treatment (first-line preferred regimen), HIV-2, treatment-experienced patients",side:"Insomnia, headache, GI upset, weight gain, neural tube defects (periconceptional — first trimester concern), CK elevation",contra:"Concurrent dofetilide (life-threatening interaction); caution in first trimester (neural tube defect risk — update guidelines evolving)",pearl:"First-line preferred agent; high barrier to resistance; neural tube defect concern in first trimester — discuss with patients who may become pregnant"},
  {name:"bictegravir",system:"HIV",moa:"INSTI — second-generation integrase strand transfer inhibitor; part of BIC/TAF/FTC (Biktarvy) single-tablet regimen",use:"HIV-1 treatment in treatment-naive and virologically suppressed patients",side:"GI upset (nausea, diarrhea), headache, insomnia, weight gain",contra:"Concurrent rifampin (strong CYP3A4/P-gp inducer reduces levels), dofetilide",pearl:"Part of Biktarvy — most prescribed HIV regimen; high genetic barrier to resistance; take with food if GI upset"},
  {name:"raltegravir",system:"HIV",moa:"First-generation INSTI — inhibits HIV integrase strand transfer; prevents viral DNA integration into host genome",use:"HIV-1 treatment in combination ART, pediatric HIV, HIV in pregnancy (well-established safety data)",side:"GI upset, insomnia, CK elevation/myopathy, rhabdomyolysis (rare), creatine kinase elevation",contra:"Concurrent rifampin at standard dose (reduces levels significantly)",pearl:"First INSTI approved; lower barrier to resistance than dolutegravir/bictegravir; preferred in pregnancy (most safety data among INSTIs)"},
  {name:"maraviroc",system:"HIV",moa:"CCR5 antagonist — blocks CCR5 co-receptor on CD4 T cells, preventing CCR5-tropic HIV-1 entry",use:"CCR5-tropic HIV-1 infection in treatment-experienced patients; prevention in high-risk populations (off-label)",side:"Hepatotoxicity, cough, fever, rash, postural hypotension, possible cardiovascular risk",contra:"CXCR4-tropic or dual/mixed-tropic HIV (requires tropism testing first), severe hepatic impairment",pearl:"Requires tropism testing (Trofile assay) before use — only works against R5-tropic virus; unique mechanism (entry inhibitor); does NOT affect CXCR4-tropic virus"},
  {name:"enfuvirtide",system:"HIV",moa:"Fusion inhibitor — synthetic peptide that mimics HR2 region of gp41; binds gp41, preventing hairpin formation and membrane fusion",use:"Treatment-experienced HIV-1 patients with multidrug-resistant virus (salvage therapy)",side:"Injection site reactions (virtually universal — nodules, cysts), bacterial pneumonia, hypersensitivity reactions",contra:"None absolute",pearl:"Subcutaneous injection twice daily — painful injection site reactions are the major limiting factor; only fusion inhibitor approved; reserved for salvage therapy"},

  // ── AUTONOMIC ─────────────────────────────────────────────────────────────────
  {name:"pilocarpine",system:"Autonomic",moa:"Muscarinic (M3) agonist — directly stimulates muscarinic receptors; miotic and secretory effects",use:"Glaucoma (reduces IOP by opening trabecular meshwork), xerostomia (Sjögren syndrome, radiation-induced), angle-closure glaucoma",side:"SLUDD (salivation, lacrimation, urination, defecation, diaphoresis), blurred vision (miosis), bronchospasm",contra:"Asthma, COPD (bronchospasm), iritis",pearl:"Direct muscarinic agonist; miosis useful in glaucoma; SLUDD = cholinergic toxidrome mnemonic"},
  {name:"bethanechol",system:"Autonomic",moa:"Direct muscarinic agonist (M2/M3) — stimulates bladder detrusor and GI smooth muscle; resistant to cholinesterase",use:"Urinary retention (post-op, neurogenic bladder), gastric atony",side:"SLUDD, bronchospasm, bradycardia, hypotension",contra:"Asthma, bowel/urinary obstruction, peptic ulcer",pearl:"Does not cross BBB; used specifically for urinary retention and GI hypomotility; resistant to acetylcholinesterase"},
  {name:"neostigmine",system:"Autonomic",moa:"Reversible acetylcholinesterase inhibitor — increases ACh at all cholinergic synapses (NMJ and muscarinic)",use:"Myasthenia gravis (diagnosis and treatment), reversal of non-depolarizing NMJ blockade (post-op), ileus, urinary retention",side:"Cholinergic crisis (SLUDD, muscle fasciculations, weakness), bronchospasm, bradycardia",contra:"Bowel or urinary obstruction, mechanical GI/urinary obstruction",pearl:"Does NOT cross BBB; given with atropine to block muscarinic side effects when reversing NMJ blockade"},
  {name:"physostigmine",system:"Autonomic",moa:"Reversible acetylcholinesterase inhibitor — increases ACh; crosses BBB (unlike neostigmine)",use:"Anticholinergic toxidrome/overdose (atropine poisoning), glaucoma (historical)",side:"Cholinergic crisis, seizures, bradycardia",contra:"Asthma, GI/urinary obstruction, cardiovascular disease",pearl:"Only AChEI that crosses BBB — antidote for anticholinergic overdose (atropine, TCA, antihistamine toxicity)"},
  {name:"atropine",system:"Autonomic",moa:"Competitive muscarinic antagonist — blocks M1, M2, M3 receptors; anticholinergic",use:"Bradycardia, organophosphate/nerve agent poisoning, pre-operative antisialagogue, COPD (ipratropium is derivative), cycloplegia",side:"ABCDE: Anti-salivation, Blurry vision, Constipation, Dry skin, Elevated HR (tachycardia); urinary retention, confusion (elderly)",contra:"Narrow-angle glaucoma, BPH, ileus",pearl:"'Hot as a hare, dry as a bone, blind as a bat, red as a beet, mad as a hatter' — anticholinergic mnemonic; antidote for bradycardia and organophosphate poisoning"},
  {name:"scopolamine",system:"Autonomic",moa:"Muscarinic antagonist — blocks M1 in CNS and vestibular system; anticholinergic",use:"Motion sickness (transdermal patch), post-op nausea, pre-op sedation",side:"Dry mouth, blurred vision, urinary retention, sedation, confusion",contra:"Narrow-angle glaucoma, BPH",pearl:"Transdermal patch behind the ear; best anticholinergic for motion sickness; crosses BBB causing sedation"},
  {name:"phenylephrine",system:"Autonomic",moa:"Selective alpha-1 agonist — vasoconstriction; no beta effects at therapeutic doses",use:"Nasal decongestant, hypotension (vasopressor), mydriasis (eye drops)",side:"Hypertension, reflex bradycardia, headache",contra:"Severe hypertension, narrow-angle glaucoma (eye drops)",pearl:"Pure alpha-1 agonist — causes reflex bradycardia via baroreceptor response; no cardiac stimulation"},
  {name:"clonidine",system:"Autonomic",moa:"Central alpha-2 agonist — reduces sympathetic outflow from CNS; decreases NE release",use:"Hypertension, ADHD (adjunct), opioid/nicotine withdrawal, Tourette syndrome, menopausal flushing",side:"Sedation, dry mouth, rebound hypertension on withdrawal, bradycardia",contra:"Severe bradycardia or AV block",pearl:"Rebound hypertension on abrupt discontinuation — taper slowly; also used for opioid withdrawal symptoms"},
  {name:"prazosin",system:"Autonomic",moa:"Selective alpha-1 antagonist — vasodilation (arteriolar and venous)",use:"Hypertension, BPH (urinary symptom relief), PTSD nightmares, Raynaud phenomenon",side:"First-dose orthostatic hypotension (take first dose at bedtime), dizziness, nasal stuffiness",contra:"None absolute",pearl:"First-dose syncope — always start at bedtime; also reduces nightmares in PTSD (alpha-1 blockade in CNS)"},
  {name:"tamsulosin",system:"Autonomic",moa:"Selective alpha-1A antagonist — relaxes smooth muscle in prostate and bladder neck",use:"BPH (urinary symptoms — improves flow), kidney stones (facilitate passage)",side:"Retrograde ejaculation, orthostatic hypotension (less than prazosin), floppy iris syndrome (intraoperative)",contra:"Concurrent strong CYP3A4 inhibitors",pearl:"More selective for urinary tract than prazosin — less BP effect; warn surgeons about prior use (floppy iris syndrome in cataract surgery)"},
  {name:"propranolol",system:"Autonomic",moa:"Non-selective beta-1 and beta-2 blocker — reduces HR, contractility, renin release; also blocks beta-2 in bronchi/vasculature",use:"Hypertension, angina, post-MI, arrhythmias, essential tremor, migraine prophylaxis, hyperthyroidism (symptom control), performance anxiety, portal hypertension",side:"Bronchospasm (beta-2 block), bradycardia, fatigue, erectile dysfunction, hypoglycemia masking, cold extremities",contra:"Asthma/COPD (bronchospasm), decompensated HF, AV block, cocaine intoxication",pearl:"Non-selective — contraindicated in asthma; masks hypoglycemia tachycardia in diabetics; do not stop abruptly (rebound angina/MI)"},

  // ── BLOOD & INFLAMMATION ──────────────────────────────────────────────────────
  {name:"warfarin",system:"Cardiovascular",moa:"Vitamin K epoxide reductase inhibitor — blocks regeneration of active vitamin K → reduces factors II, VII, IX, X and proteins C and S",use:"AF stroke prevention, DVT/PE treatment and prevention, mechanical heart valves, hypercoagulable states",side:"Bleeding, skin necrosis (protein C deficiency — initiation), teratogenicity (warfarin embryopathy), purple toe syndrome",contra:"Pregnancy, active bleeding, recent CNS surgery",pearl:"Reversed with vitamin K (slow) or FFP/4-factor PCC (fast); narrow therapeutic index — many drug and food interactions; monitor INR; factor VII has shortest half-life (INR rises first)"},
  {name:"dabigatran",system:"Cardiovascular",moa:"Direct thrombin (factor IIa) inhibitor — binds active site of thrombin",use:"AF stroke prevention, DVT/PE treatment and prevention",side:"Bleeding, dyspepsia (GI upset), increased MI risk (slight)",contra:"Active bleeding, severe renal failure (CrCl <15), mechanical heart valves",pearl:"Reversed with idarucizumab (Praxbind); GI upset common — take with food; renal clearance ~80%"},
  {name:"rivaroxaban",system:"Cardiovascular",moa:"Direct factor Xa inhibitor — binds active site of factor Xa",use:"AF stroke prevention, DVT/PE treatment and prevention, post-orthopedic VTE prophylaxis",side:"Bleeding",contra:"Active bleeding, severe hepatic impairment (Child-Pugh C), pregnancy",pearl:"Reversed with andexanet alfa; take with evening meal (increases absorption); once daily dosing for AF"},
  {name:"alteplase",system:"Cardiovascular",moa:"Recombinant tPA — activates plasminogen to plasmin → fibrinolysis",use:"Acute ischemic stroke (within 4.5 hours), STEMI, massive PE, occluded central venous catheter",side:"Bleeding (intracranial hemorrhage — major risk), reperfusion arrhythmias",contra:"Active bleeding, recent surgery/trauma, prior hemorrhagic stroke, severe hypertension",pearl:"Time is brain — door-to-needle <60 min for stroke; check BP and neuro status frequently; do not use in recent surgery"},

var MAX_HINTS = 5;
var hintKeys   = ["moa","use","side","contra","pearl"];
var hintLabels = ["Mechanism of Action","Clinical Use","Side Effects","Contraindications","Clinical Pearl"];
var hintClasses= ["","","side-effect","contra","pearl"];
var CATEGORIES = ["All","Cardiovascular","Pulmonary","Renal","Endocrine","Reproductive","Musculoskeletal","Oncology","GI","Neurology","Dermatology","Autonomic","Antimicrobials","Antifungals","Antivirals","HIV"];
var allDrugNames = [];
(function(){
  var seen = {};
  for(var i=0;i<drugs.length;i++){ if(!seen[drugs[i].name]){ seen[drugs[i].name]=1; allDrugNames.push(drugs[i].name); } }
  allDrugNames.sort(function(a,b){ return a.toLowerCase().localeCompare(b.toLowerCase()); });
})();
var currentDrug, hintLevel=0, attempts=0, queue=[], gameOver=false, acActiveIdx=-1;
var sel = document.getElementById("systemSelect");
var guessInput = document.getElementById("guess");
var acList = document.getElementById("autocomplete");
var hintsEl = document.getElementById("hints");
var pipsEl = document.getElementById("pips");
var resultEl = document.getElementById("result");
var prevGuessesEl = document.getElementById("prevGuesses");
var guessBtn = document.getElementById("guessBtn");
var nextBtn = document.getElementById("nextBtn");
for(var c=0;c<CATEGORIES.length;c++){
  var o = document.createElement("option");
  o.value = CATEGORIES[c]; o.textContent = CATEGORIES[c];
  sel.appendChild(o);
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function buildQueue(){
  var sys=sel.value;
  if(sys==="All"){ queue=shuffle(drugs); }
  else{ var f=[]; for(var i=0;i<drugs.length;i++){if(drugs[i].system===sys)f.push(drugs[i]);} queue=shuffle(f); }
}
function newGame(resetQueue){
  if(resetQueue||queue.length===0) buildQueue();
  currentDrug=queue.pop();
  hintLevel=0; attempts=0; gameOver=false;
  guessInput.value="";
  resultEl.style.display="none"; resultEl.className="result-banner";
  hintsEl.innerHTML=""; prevGuessesEl.innerHTML="";
  hideAc();
  renderPips(); showHint();
}
function renderPips(){
  pipsEl.innerHTML="";
  for(var i=0;i<MAX_HINTS;i++){
    var p=document.createElement("div");
    p.className="pip"+(i<attempts?" used":"");
    pipsEl.appendChild(p);
  }
}
function markCorrectPip(){
  var ps=pipsEl.children;
  for(var i=0;i<MAX_HINTS;i++) ps[i].className="pip";
  for(var i=0;i<attempts-1;i++) ps[i].className="pip used";
  if(attempts>0) ps[attempts-1].className="pip correct";
}
function showHint(){
  if(hintLevel>=MAX_HINTS) return;
  var card=document.createElement("div");
  card.className="hint-card "+(hintClasses[hintLevel]||"");
  card.innerHTML="<div class='hint-label'>"+hintLabels[hintLevel]+"</div>"+currentDrug[hintKeys[hintLevel]];
  hintsEl.appendChild(card);
  hintLevel++;
}
function addChip(name){
  var chip=document.createElement("div");
  chip.className="guess-chip"; chip.textContent=name;
  prevGuessesEl.appendChild(chip);
}
function guessDrug(){
  if(gameOver){ newGame(false); return; }
  var guess=guessInput.value.toLowerCase().trim();
  if(!guess) return;
  attempts++;
  guessInput.value=""; hideAc();
  guessInput.blur();
  if(guess===currentDrug.name.toLowerCase()){
    gameOver=true; markCorrectPip();
    while(hintLevel<MAX_HINTS) showHint();
    resultEl.className="result-banner correct";
    resultEl.innerHTML="✓ Correct! The drug was <strong>"+currentDrug.name+"</strong>";
    resultEl.style.display="block";
    setTimeout(function(){ resultEl.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
  } else {
    addChip(guess); renderPips();
    if(hintLevel<MAX_HINTS){
      showHint();
      var last=hintsEl.lastElementChild;
      if(last) setTimeout(function(){ last.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
      resultEl.className="result-banner wrong";
      resultEl.innerHTML="✗ Not quite — here's another clue…";
      resultEl.style.display="block";
    } else {
      gameOver=true;
      resultEl.className="result-banner reveal";
      resultEl.innerHTML="Out of hints. The answer was <strong>"+currentDrug.name+"</strong>";
      resultEl.style.display="block";
      setTimeout(function(){ resultEl.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
    }
  }
}
function showAc(val){
  acActiveIdx=-1;
  if(!val){ hideAc(); return; }
  var matches=[];
  for(var i=0;i<allDrugNames.length;i++){
    if(allDrugNames[i].toLowerCase().indexOf(val)===0) matches.push(allDrugNames[i]);
  }
  if(!matches.length){ hideAc(); return; }
  acList.innerHTML="";
  for(var i=0;i<matches.length;i++){
    (function(name){
      var d=document.createElement("div");
      d.className="ac-item"; d.textContent=name;
      d.addEventListener("touchend",function(e){
        e.preventDefault(); e.stopPropagation();
        guessInput.value=name; hideAc(); guessDrug();
      });
      d.addEventListener("mousedown",function(e){
        e.preventDefault();
        guessInput.value=name; hideAc(); guessDrug();
      });
      acList.appendChild(d);
    })(matches[i]);
  }
  acList.classList.remove("hidden");
}
function hideAc(){
  acList.classList.add("hidden"); acList.innerHTML=""; acActiveIdx=-1;
}
guessInput.addEventListener("input",function(){
  showAc(guessInput.value.toLowerCase().trim());
});
guessInput.addEventListener("keydown",function(e){
  var items=acList.querySelectorAll(".ac-item");
  if(e.key==="Enter"||e.keyCode===13){
    e.preventDefault();
    if(acActiveIdx>=0&&items[acActiveIdx]){ guessInput.value=items[acActiveIdx].textContent; hideAc(); }
    guessDrug(); return;
  }
  if(!items.length) return;
  if(e.key==="ArrowDown"||e.keyCode===40){
    e.preventDefault(); acActiveIdx=Math.min(acActiveIdx+1,items.length-1);
    for(var i=0;i<items.length;i++) items[i].classList.toggle("active",i===acActiveIdx);
    if(acActiveIdx>=0) guessInput.value=items[acActiveIdx].textContent;
  } else if(e.key==="ArrowUp"||e.keyCode===38){
    e.preventDefault(); acActiveIdx=Math.max(acActiveIdx-1,-1);
    for(var i=0;i<items.length;i++) items[i].classList.toggle("active",i===acActiveIdx);
    if(acActiveIdx>=0) guessInput.value=items[acActiveIdx].textContent;
  } else if(e.key==="Escape"||e.keyCode===27){
    hideAc();
  }
});
guessBtn.addEventListener("click",guessDrug);
guessBtn.addEventListener("touchend",function(e){ e.preventDefault(); guessDrug(); });
nextBtn.addEventListener("click",function(){ newGame(false); });
nextBtn.addEventListener("touchend",function(e){ e.preventDefault(); newGame(false); });
sel.addEventListener("change",function(){ newGame(true); });
document.addEventListener("touchstart",function(e){
  if(!guessInput.contains(e.target)&&!acList.contains(e.target)) hideAc();
},{passive:true});
document.addEventListener("mousedown",function(e){
  if(!guessInput.contains(e.target)&&!acList.contains(e.target)) hideAc();
});
buildQueue(); newGame(false);
})();
</script>
