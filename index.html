  {name:"glp-1 receptor agonists",system:"Cardiovascular",moa:"Mimic glucagon-like peptide-1 (GLP-1); bind GLP-1 receptors on pancreatic beta cells; stimulate glucose-dependent insulin secretion; suppress glucagon; delay gastric emptying (promotes satiety); reduce hepatic glucose production; act on hypothalamus to reduce appetite",use:"Type 2 diabetes (preferred add-on after metformin, especially with CV disease); obesity/overweight treatment (semaglutide - Ozempic/Wegovy; liraglutide - Saxenda); cardiovascular risk reduction (in T2DM with established CV disease or high CV risk); heart failure (semaglutide)",side:"GI (nausea, vomiting, diarrhea - most common, dose-limiting, usually temporary); pancreatitis (BOXED WARNING - thyroid C-cell tumors in rodents - avoid in personal/family history medullary thyroid carcinoma or MEN2); gastroparesis; injection site reactions; cholelithiasis; tachycardia",contra:"Personal or family history of medullary thyroid carcinoma (BOXED WARNING - rodent data); MEN type 2; pancreatitis history (relative); Type 1 DM; hypersensitivity",pearl:"WEIGHT LOSS is prominent (semaglutide/liraglutide FDA-approved for obesity); GLUCOSE-DEPENDENT insulin release (low hypoglycemia risk when used alone - increases insulin only when glucose is high); CARDIOVASCULAR BENEFIT proven (LEADER, SUSTAIN-6 trials); semaglutide available SC and oral (Rybelsus - oral); once-weekly SC semaglutide (Ozempic) most convenient; most effective non-insulin antidiabetic for glucose and weight reduction"},
  {name:"sglt2 inhibitors",system:"Cardiovascular",moa:"Inhibit sodium-glucose cotransporter 2 (SGLT2) in proximal renal tubule; block ~90% of renal glucose reabsorption; cause glucosuria; reduce blood glucose; also cause natriuresis, reduce intraglomerular pressure, diuresis, reduce body weight",use:"Type 2 diabetes (especially with heart failure, CKD, or established CV disease); heart failure with reduced and preserved EF; CKD (slows progression); cardiovascular risk reduction",side:"Genital mycotic infections (most common - Candida, especially women); UTIs; DKA (euglycemic DKA - even with normal glucose); Fournier's gangrene (rare necrotizing fasciitis of genitalia); bone fractures (canagliflozin); hypotension; polyuria; weight loss",contra:"Type 1 DM (DKA risk); eGFR <20-30 mL/min (depending on agent); hypersensitivity; recurrent UTI/genital infections; pregnancy",pearl:"Hold 3-4 days before surgery or prolonged fasting (euglycemic DKA risk); EUGLYCEMIC DKA is easily missed (normal glucose but anion gap metabolic acidosis + ketonemia); genital mycotic infections very common (counsel on hygiene); canagliflozin associated with lower limb amputation risk and bone fractures; multiple OUTCOMES trials show CV and renal protection BEYOND glucose control; can be used with all other antidiabetic agents"},
  {name:"dpp-4 inhibitors",system:"Renal",moa:"Inhibit dipeptidyl peptidase-4 (DPP-4) enzyme; prevent degradation of endogenous GLP-1 and GIP; increase incretin levels; stimulate glucose-dependent insulin secretion; suppress glucagon; modest glucose lowering",use:"Type 2 diabetes (add-on to metformin or other agents); preferred in elderly or patients with hypoglycemia concerns; renal impairment (linagliptin does not require dose adjustment)",side:"Nasopharyngitis/URI (most common); pancreatitis (rare); arthralgia (class effect - BOXED WARNING concern); heart failure hospitalization risk (saxagliptin, alogliptin - SAVOR-TIMI/EXAMINE trials); bullous pemphigoid",contra:"Personal history of pancreatitis (relative); hypersensitivity; heart failure (saxagliptin, alogliptin - avoid or use with caution)",pearl:"Weight neutral (unlike SUs or insulin); LOW HYPOGLYCEMIA risk (glucose-dependent mechanism); LINAGLIPTIN: no renal dose adjustment (hepatically metabolized - preferred in CKD); saxagliptin associated with increased HF hospitalizations (avoid in HF patients - use DPP-4 inhibitor with neutral HF data); generally well-tolerated; modest glucose-lowering effect"},
  {name:"thiazolidinediones",system:"Endocrine",moa:"Activate peroxisome proliferator-activated receptor gamma (PPARγ) in adipose, muscle, liver; increase insulin receptor expression; improve insulin sensitivity in peripheral tissues; redistribute fat from visceral to subcutaneous; does NOT stimulate insulin secretion",use:"Type 2 diabetes (add-on or monotherapy); insulin resistance; fatty liver disease (NASH - pioglitazone off-label)",side:"Weight gain (fluid retention and adipogenesis); peripheral edema; heart failure exacerbation (fluid retention - BOXED WARNING); bone fractures (increased fracture risk in women); bladder cancer (pioglitazone - controversial association - BOXED WARNING); hepatotoxicity (troglitazone withdrawn from market)",contra:"HEART FAILURE (BOXED WARNING - fluid retention worsens HF); active liver disease; bladder cancer history (pioglitazone - BOXED WARNING); pregnancy; hypersensitivity; NYHA Class III-IV HF",pearl:"BOXED WARNING for heart failure (fluid retention mechanism - edema increases risk of HF decompensation); PIOGLITAZONE: bladder cancer signal (controversial, 5+ years of use); rosiglitazone: CV controversy (post-MI concerns - restricted use); weight gain and edema are limiting factors; once daily oral; slow onset (weeks to full effect); not recommended for patients with CHF"},
  {name:"insulin",system:"Endocrine",moa:"Activates insulin receptor tyrosine kinase; promotes glucose uptake (GLUT4 translocation in muscle and adipose); stimulates glycogen, lipid, and protein synthesis; inhibits gluconeogenesis and glycogenolysis; reduces circulating glucose",use:"Type 1 DM (required); Type 2 DM (when oral agents insufficient); DKA (regular insulin IV); hyperkalemia (regular insulin + dextrose - shifts K+ into cells); gestational diabetes; stress hyperglycemia",side:"HYPOGLYCEMIA (most important - can be life-threatening); weight gain; lipodystrophy at injection sites; hypokalemia (insulin drives K+ into cells); allergic reactions (rare with human insulin); edema (insulin-induced sodium retention)",contra:"Hypoglycemia (adjust dose); hypersensitivity to specific insulin preparation",pearl:"TYPES: Rapid-acting (lispro, aspart, glulisine - peak 1hr, 4hr duration; prandial bolus); Short-acting (regular insulin - peak 2-4hr; DKA, hyperkalemia); Intermediate (NPH - variable, falling out of favor); Long-acting (glargine, detemir, degludec - peakless basal, once daily); regular insulin = only insulin given IV; do NOT mix glargine with other insulins; continuous pump uses rapid-acting insulin only; adjust dose during illness (sick day rules)"},
  {name:"glucagon",system:"Cardiovascular",moa:"Binds glucagon receptors in liver (cAMP-mediated); activates glycogenolysis and gluconeogenesis; rapidly increases blood glucose; also relaxes GI smooth muscle; used diagnostically and as antidote for hypoglycemia",use:"Severe hypoglycemia (when IV access unavailable - SC/IM injection); beta-blocker overdose (increases cardiac cAMP); calcium channel blocker overdose; GI diagnostic procedures (motility reduction); anaphylaxis (alternative if epinephrine unavailable)",side:"Nausea/vomiting (most common); tachycardia; hypertension; hyperglycemia; hypersensitivity",contra:"Pheochromocytoma (stimulates catecholamine release → hypertensive crisis); insulinoma (paradoxically causes more insulin release); hypersensitivity to glucagon/pork products",pearl:"Must have glycogen stores to work (may not work in malnourished/fasting patients - little hepatic glycogen); teach family members to inject SC/IM for home use; intranasal glucagon (Baqsimi) now available (no injection needed); must reposition patient (vomiting risk); after recovery - patient should eat (glycogen stores depleted); beta-blocker overdose: glucagon bypasses blocked beta receptors and increases cAMP directly"},
  {name:"activated charcoal",system:"Cardiovascular",moa:"Large surface area charcoal with pores; adsorbs many drugs and toxins in GI tract; prevents absorption; binds toxin-charcoal complex is not absorbed; most effective within 1-2 hours of ingestion",use:"Acute poisoning/overdose (within 1-2 hours of ingestion); many drug overdoses (acetaminophen, salicylates, TCAs, digoxin, theophylline, phenobarbital); NOT effective for metals, alcohols, strong acids/bases, iron",side:"Aspiration pneumonitis (if unconscious - must protect airway first); vomiting; constipation; black stools; bowel obstruction (rare with multiple doses)",contra:"Unprotected airway (unconscious patient); caustic ingestion (acids/bases); hydrocarbon ingestion; ileus or bowel obstruction; not useful beyond 2 hours for most ingestions; NOT for metals (iron, lithium), alcohols, cyanide",pearl:"CHARCOAL does NOT adsorb: PHAIL (Pesticides/Petroleum, Heavy metals, Acids/Alkalis, Iron/Isopropyl, Lithium); most effective within 1-2 hours of ingestion (rarely used now because patients rarely present this quickly); airway must be protected first; activated charcoal NOT a substitute for antidotes; multiple-dose activated charcoal enhances elimination of some drugs (theophylline, phenobarbital)"},
  {name:"n-acetylcysteine",system:"Pulmonary",moa:"Replenishes glutathione stores (precursor to glutathione); directly conjugates toxic metabolite NAPQI (N-acetyl-p-benzoquinone imine); prevents hepatic necrosis from acetaminophen overdose; also mucolytic (breaks disulfide bonds in mucus)",use:"Acetaminophen overdose (antidote - must give within 8-10 hours for best results, still effective up to 24+ hours); mucolytic (inhaled for COPD, cystic fibrosis); contrast-induced nephropathy prevention",side:"IV: anaphylactoid reactions (flushing, bronchospasm, nausea - histamine-mediated, NOT IgE); Oral: nausea, vomiting (sulfurous rotten egg smell); hepatoprotective with proper dosing",contra:"Anaphylactoid reaction during infusion (slow infusion rate or use oral form); hypersensitivity to NAC",pearl:"ANTIDOTE for acetaminophen (APAP) overdose - must give promptly; use Rumack-Matthew nomogram (APAP level vs time since ingestion) to determine treatment; most effective within 8 hours; IV preferred for serious overdose; oral has sulfurous odor (can dilute in juice); 21-hour IV protocol or 72-hour oral protocol; after acetaminophen metabolism, NAPQI causes hepatic necrosis; NAC replenishes glutathione (hepatoprotective)"},
  {name:"naloxone",system:"Pulmonary",moa:"Competitive antagonist at all opioid receptors (mu, kappa, delta); rapidly reverses opioid-induced respiratory depression, sedation, and miosis; short half-life (30-90 minutes) vs most opioids",use:"Opioid overdose reversal (IV, IM, intranasal); respiratory depression from opioids; included in Suboxone to prevent IV abuse; MOUD (included in buprenorphine/naloxone formulation)",side:"Precipitated withdrawal (acute opioid withdrawal - agitation, tachycardia, diaphoresis, N/V - frightening but not life-threatening in otherwise healthy adults); pain return; resedation (opioid half-life outlasts naloxone)",contra:"No absolute CI in acute overdose; use caution in opioid-dependent patients (precipitated withdrawal); neonates of opioid-dependent mothers (precipitates severe neonatal withdrawal)",pearl:"SHORT HALF-LIFE (30-90 min) = patient can re-sedate after initial reversal (monitor carefully, may need repeat doses); intranasal Narcan available OTC for community use; high-potency opioids (fentanyl) may require multiple doses; IV/IM/intranasal/SC/sublingual routes; harm reduction - widespread community distribution; 'coma cocktail' = naloxone + dextrose + thiamine + oxygen for altered mental status"},
  {name:"flumazenil",system:"Pulmonary",moa:"Competitive antagonist at GABA-A benzodiazepine binding site; reverses benzodiazepine-induced sedation, respiratory depression, and psychomotor impairment; short half-life (< 1 hour)",use:"Reversal of benzodiazepine oversedation (procedural sedation, intubation reversal); benzodiazepine overdose (rarely used emergently); reversal of newer hypnotics (zolpidem)",side:"SEIZURES in BZD-dependent patients (precipitates acute withdrawal - life-threatening); resedation (short half-life); nausea/vomiting; anxiety; dizziness",contra:"Patients on BZDs for seizure control (precipitates status epilepticus); BZD-dependent patients (severe withdrawal with seizures); concurrent TCA overdose (BZDs needed to prevent TCA-induced seizures); patients with raised ICP",pearl:"RARELY used in emergency setting due to seizure risk; use cautiously in mixed overdose situations; SHORT half-life = resedation can occur (monitor patient); never substitute for airway management; unlike naloxone, flumazenil is rarely given empirically in unknown overdose (too risky if BZD-dependent); safe to use in procedural reversal of BZD in non-dependent patients"},
  {name:"atropine",system:"Reproductive",moa:"Competitive muscarinic receptor antagonist; blocks acetylcholine effects (bradycardia, bronchospasm, bronchorrhea, lacrimation, salivation, urination, defecation); reverses SLUDGE/DUMBELS symptoms of organophosphate poisoning",use:"Organophosphate and carbamate pesticide poisoning (antidote); nerve agent poisoning (sarin, VX - antidote with pralidoxime); bradycardia (ACLS); preoperative antisialagogue; reverse NMB (with neostigmine); antispasmodic",side:"Anticholinergic toxicity (HOT, DRY, BLIND, RED, MAD): hyperthermia, dry mouth, blurred vision, flushing, tachycardia, urinary retention, constipation, confusion",contra:"Narrow-angle glaucoma; BPH; GI/urinary obstruction; tachycardia (caution); myasthenia gravis",pearl:"SLUDGE mnemonic for cholinergic toxidrome (Organophosphate): Salivation, Lacrimation, Urination, Defecation, GI cramps, Emesis; large doses of atropine required for organophosphate poisoning (titrate to secretion drying, not heart rate); ALSO give pralidoxime (2-PAM) for organophosphates (reactivates acetylcholinesterase before 'aging' occurs); ANTIDOTE KIT: atropine + pralidoxime auto-injector"},
  {name:"pralidoxime",system:"Autonomic",moa:"Reactivates organophosphate-inhibited acetylcholinesterase by displacing organophosphate from enzyme's serine residue; removes organophosphate from AChE before 'aging' (irreversible bond formation occurs within hours); increases functional AChE",use:"Organophosphate poisoning (combined with atropine); nerve agent exposure; works at nicotinic receptors (muscle weakness/paralysis) which atropine cannot address",side:"Tachycardia; hypertension; dizziness; headache; vision changes; nausea",contra:"Carbamate poisoning (controversial - may worsen carbamate toxicity; some guidelines still recommend); must use EARLY before aging occurs",pearl:"Must be given EARLY (before aging of organophosphate-AChE complex - occurs within hours; some compounds age faster); atropine addresses muscarinic symptoms (SLUDGE); pralidoxime addresses NICOTINIC symptoms (muscle weakness, fasciculations, paralysis) - atropine does NOT reverse nicotinic effects; combination of atropine + pralidoxime is standard for organophosphate/nerve agent poisoning"},
  {name:"digoxin-specific antibody fragments",system:"Cardiovascular",moa:"Sheep-derived IgG antibody fragments (Fab fragments) with high affinity for digoxin; bind free digoxin in serum; remove digoxin from Na+/K+-ATPase binding sites; complex is renally excreted; rapidly reverses life-threatening digoxin toxicity",use:"Life-threatening digoxin toxicity (severe arrhythmias, AV block, hyperkalemia, digoxin level >10 ng/mL, clinical toxicity unresponsive to other measures); oleander and other cardiac glycoside poisonings",side:"Worsening heart failure (digoxin's inotropic effect reversed); hypokalemia (digoxin toxicity causes hyperkalemia; reversal restores K+ back into cells); recurrence of AF (rate control removed); allergic reactions",contra:"No absolute contraindications for life-threatening toxicity; use with caution in severe renal failure (complex accumulates)",pearl:"ANTIDOTE FOR DIGOXIN TOXICITY; calculate dose based on body burden or digoxin level; hyperkalemia is a SIGN of severe toxicity (not a reason to treat K+ separately - treat the digoxin toxicity); post-reversal: monitor for hypokalemia and worsening heart failure; do NOT give calcium for digoxin-induced hyperkalemia (worsens cardiac arrhythmias from digoxin - 'stone heart' concept); avoid lidocaine and quinidine in digoxin toxicity"},
  {name:"physostigmine",system:"Renal",moa:"Reversible AChE inhibitor that crosses BBB; increases CNS acetylcholine; counteracts central AND peripheral anticholinergic effects (unlike neostigmine which does NOT cross BBB)",use:"Severe anticholinergic toxicity/delirium (tricyclic antidepressant toxicity - use with CAUTION; diphenhydramine overdose; atropine toxicity; Datura/jimsonweed poisoning); diagnostic for anticholinergic syndrome",side:"Cholinergic toxicity (bradycardia, bronchospasm, seizures, excessive secretions); bradycardia (serious); MUST have atropine available",contra:"TCA overdose (DO NOT use - may worsen arrhythmias and cause seizures via AV block/cardiac conduction effects); GI/GU obstruction; asthma; cardiac conduction abnormalities; hypersensitivity",pearl:"CROSSES BBB (unlike neostigmine) - reverses central anticholinergic delirium; AVOID in TCA overdose (sodium channel blockade effects + increased AChE at NMJ = fatal arrhythmias and seizures); administer slowly IV; atropine must be at bedside; used for diagnostic purposes in uncertain anticholinergic vs sympathomimetic toxidrome; half-life shorter than atropine (may need repeated doses)"},
  {name:"nitrofurantoin",system:"Antimicrobials",moa:"Prodrug activated by bacterial enzymes; reactive intermediates damage bacterial DNA, ribosomes, and metabolic enzymes; bactericidal at high concentrations; active primarily against gram-negative enteric bacteria; concentrates in urine",use:"Uncomplicated acute cystitis (first-line); UTI prophylaxis (recurrent UTI prevention); NOT for pyelonephritis (does not achieve adequate tissue concentrations)",side:"GI upset (nausea, diarrhea - take with food); pulmonary reactions (acute: hypersensitivity pneumonitis; chronic: pulmonary fibrosis with long-term use); peripheral neuropathy (chronic use); hepatotoxicity; hemolytic anemia (G6PD deficiency)",contra:"Renal impairment (eGFR <30 mL/min - does not achieve adequate urinary concentrations AND accumulates - toxicity); pyelonephritis (inadequate tissue levels); 38+ weeks pregnancy (hemolytic anemia in neonate at term); G6PD deficiency; hypersensitivity",pearl:"ONLY for LOWER UTI (cystitis) - do NOT use for pyelonephritis or upper tract infections; requires adequate renal function to concentrate in urine (avoid eGFR <30); AVOID at term pregnancy (>38 weeks - neonatal hemolytic anemia); monitor pulmonary symptoms with long-term prophylactic use; take with food (reduces GI side effects); safe in first and second trimester of pregnancy for uncomplicated cystitis"},
  {name:"fosfomycin",system:"Antimicrobials",moa:"Inhibits MurA enzyme (pyruvyl transferase) in bacterial cell wall synthesis pathway; prevents UDP-GlcNAc modification (early step in peptidoglycan synthesis); unique mechanism; bactericidal",use:"Uncomplicated acute cystitis (single 3g dose - excellent compliance); MDR organisms (E. coli, Enterococcus faecalis); reserve for multidrug-resistant UTI; limited use beyond UTI",side:"GI (nausea, diarrhea); headache; vaginitis; generally well tolerated",contra:"Renal impairment (dose adjust); NOT for pyelonephritis; hypersensitivity; NOT for systemic infections",pearl:"SINGLE 3g dose = excellent compliance; reserve for MDR organisms (save fosfomycin for when other agents fail - resistance selection); active against E. coli and enterococci (but NOT Pseudomonas or Klebsiella reliably); only oral formulation in US (IV available in Europe); also safe in pregnancy (for uncomplicated cystitis); unique MOA = no cross-resistance with other classes"},
  {name:"daptomycin",system:"Antimicrobials",moa:"Calcium-dependent insertion into bacterial cell membrane; forms oligomers creating pores; disrupts membrane potential; inhibits DNA, RNA, and protein synthesis secondarily; bactericidal; ONLY active against gram-positive bacteria",use:"MRSA bloodstream infections (bacteremia); right-sided endocarditis (NOT left-sided - inactivated by lung surfactant); complicated skin/soft tissue infections (ABSSSI); VRE; daptomycin-susceptible organisms",side:"MYOPATHY (dose-dependent - monitor CK weekly; Boxed Warning); pulmonary toxicity if used for pneumonia (inactivated by surfactant); eosinophilic pneumonia; peripheral neuropathy; GI effects; elevated LFTs",contra:"Pneumonia/lung infections (CONTRAINDICATED - inactivated by pulmonary surfactant = inactive in lungs); concurrent statins (increased myopathy risk - consider stopping statins); hypersensitivity",pearl:"CANNOT TREAT PNEUMONIA (inactivated by pulmonary surfactant - unique and tested limitation); monitor CK weekly (myopathy/rhabdomyolysis risk); hold concurrent statins; active against MRSA, VRE, and Enterococcus; concentration-dependent killing (once daily dosing); excellent GRAM-POSITIVE bactericidal activity"},
  {name:"tigecycline",system:"Antimicrobials",moa:"Structurally related to tetracyclines; binds 30S ribosomal subunit with 5x higher affinity than tetracyclines; overcomes tetracycline resistance mechanisms (efflux pumps, ribosomal protection); bacteriostatic; broad spectrum",use:"Complicated intra-abdominal infections; complicated skin/soft tissue infections; community-acquired bacterial pneumonia; MDR gram-negative organisms (ESBL, Acinetobacter - salvage); NOT for bloodstream infections (inadequate serum levels)",side:"GI (nausea, vomiting - most common, dose-limiting); increased mortality in clinical trials compared to other comparators (BOXED WARNING for increased mortality in severe infections); hepatotoxicity; pancreatitis; photosensitivity",contra:"Bloodstream infections/bacteremia (inadequate serum drug levels - BOXED WARNING related); BOXED WARNING: all-cause mortality increased in serious infections; pregnancy (Category D); children <8 years; hypersensitivity",pearl:"BOXED WARNING: increased mortality seen in clinical trials (reserve for when no alternative); poor serum concentrations (NOT for bacteremia); active against resistant organisms (MRSA, VRE, ESBL producers, CRE, Acinetobacter); ESBL = extended spectrum beta-lactamase producing organisms; NOT for hospital-acquired pneumonia or ventilator-associated pneumonia (increased mortality); last-resort for MDR organisms"},
  {name:"proton pump inhibitors",system:"Musculoskeletal",moa:"Irreversible inhibition of H+/K+-ATPase (proton pump) in parietal cell canaliculi; require activation in acidic environment (prodrugs); block final step of acid secretion; inhibit >90% of acid secretion over 24 hours",use:"GERD; peptic ulcer disease (gastric and duodenal); H. pylori eradication (component of triple/quadruple therapy); Zollinger-Ellison syndrome; NSAID-induced ulcer prevention; stress ulcer prophylaxis (ICU patients); erosive esophagitis",side:"Increased infection risk (C. difficile, pneumonia - gastric acid barrier reduced); osteoporosis/fractures (decreased calcium absorption with long-term use); hypomagnesemia; vitamin B12 deficiency; headache; diarrhea; interstitial nephritis (FDA warning 2020); drug interactions (omeprazole inhibits CYP2C19 - reduces clopidogrel activation)",contra:"Concurrent use with rilpivirine or atazanavir (HIV antiretrovirals - require acidic pH for absorption); hypersensitivity; long-term use without indication",pearl:"MOST POTENT acid suppression; take 30-60 minutes BEFORE meals (on empty stomach - maximally activate pumps); requires 3-4 days to reach full effect (only 20-30% pumps blocked initially); OMEPRAZOLE inhibits CYP2C19 (reduces clopidogrel activation - use pantoprazole if needed with clopidogrel); long-term use increases C. difficile, fractures, magnesium and B12 deficiency; once daily dosing (24hr duration)"},
  {name:"h2 receptor antagonists",system:"GI",moa:"Competitive reversible antagonists at H2 histamine receptors on gastric parietal cells; reduce basal (especially nocturnal) and meal-stimulated acid secretion; faster onset than PPIs but less potent (inhibit ~50% of acid secretion)",use:"GERD (mild to moderate); peptic ulcer disease (maintenance); Zollinger-Ellison syndrome (historical - PPIs now preferred); prevention of GI bleeding (IV, ICU); nocturnal acid suppression (add-on to PPI); OTC for heartburn",side:"Cimetidine: gynecomastia/impotence (antiandrogen effect); mental status changes (IV, especially elderly); POTENT CYP450 inhibitor; QT prolongation (rapid IV); ranitidine: withdrawn from market (carcinogenic NDMA impurity); headache; diarrhea; fatigue",contra:"Ranitidine: WITHDRAWN from market (NDMA impurity); cimetidine: concurrent drugs metabolized by CYP (warfarin, theophylline, phenytoin, lidocaine, benzodiazepines - toxicity); renal impairment (dose adjustment)",pearl:"Onset faster than PPIs (30-45 min); particularly effective for NOCTURNAL acid (histamine primary driver at night); CIMETIDINE is 'dirty drug' - antiandrogen (gynecomastia, impotence, galactorrhea) + POTENT CYP inhibitor (multiple interactions); RANITIDINE WITHDRAWN (FDA 2020 - NDMA contamination); FAMOTIDINE safest (no CYP inhibition, no antiandrogen effects); Beers Criteria for cimetidine in elderly (mental status changes)"},
  {name:"sucralfate",system:"Musculoskeletal",moa:"Aluminum salt of sulfated sucrose; in acidic environment, polymerizes to form sticky viscous gel; adheres to ulcer craters; forms protective barrier; also binds pepsin and bile salts; stimulates prostaglandin and bicarbonate secretion",use:"Peptic ulcer disease (duodenal ulcers - prevention and treatment); stress ulcer prophylaxis (ICU - alternative to PPI/H2 blocker); GERD (limited use); prevention of NSAID-induced ulcers",side:"Constipation (most common - aluminum component); drug binding/interactions (must separate from other medications by 2 hours); aluminum accumulation in renal failure; bezoar formation (rare)",contra:"Renal failure (aluminum accumulation - aluminum toxicity); concurrent medications requiring acidic absorption (must separate by 2 hours); dysphagia (tablet formulation)",pearl:"Requires acidic pH to activate (do NOT use with PPIs or H2 blockers simultaneously - pH elevation reduces efficacy); separate from other medications by 2 hours (binds them); not absorbed systemically (except small amount of aluminum); available as suspension for patients with dysphagia; generally replaced by PPIs/H2 blockers but still used for stress ulcer prophylaxis"},
  {name:"misoprostol",system:"Musculoskeletal",moa:"Synthetic PGE1 analog; binds EP3 receptors on parietal cells; inhibits acid secretion (decreases cAMP in parietal cells); stimulates mucus and bicarbonate secretion; promotes mucosal blood flow; enhances mucosal defense",use:"Prevention of NSAID-induced gastric/duodenal ulcers (approved indication - especially chronic NSAID users); gastric cytoprotection; also obstetric uses (cervical ripening, medical abortion - covered separately)",side:"Diarrhea (most common, dose-limiting - prostaglandin-mediated); abdominal cramping; uterine contractions (caution in pregnant women); nausea; headache",contra:"Pregnancy (uterotonic - can cause uterine contractions and fetal harm; Category X for GI indications in pregnant women); hypersensitivity; inflammatory bowel disease (may worsen)",pearl:"FDA approved for NSAID-induced ulcer PREVENTION (not just treatment); Arthrotec = diclofenac + misoprostol (combination); reduces ulcer risk in chronic NSAID users; diarrhea is dose-dependent (start low); take WITH food to reduce GI side effects; WARN about pregnancy (uterotonic effects); also used off-label as cervical ripening agent"},
  {name:"bismuth subsalicylate",system:"Antimicrobials",moa:"Antimicrobial against H. pylori; forms protective coating over ulcers; stimulates prostaglandin secretion; antisecretory; salicylate component has anti-inflammatory effects; direct effect on gut motility",use:"H. pylori eradication (quadruple therapy with metronidazole, tetracycline, PPI); traveler's diarrhea (prevention and treatment); non-specific diarrhea; dyspepsia; heartburn",side:"Black tongue and stool (harmless bismuth sulfide from reaction with H2S - warn patients); tinnitus (salicylate toxicity at high doses); constipation; Reye syndrome risk (salicylate component in children with viral illness)",contra:"Children/adolescents with viral illness (Reye syndrome risk - salicylate component); aspirin allergy; renal impairment (bismuth accumulation); pregnancy (salicylate component)",pearl:"BLACK STOOLS are harmless (bismuth sulfide) but warn patients; QUADRUPLE THERAPY for H. pylori (PPI + bismuth + metronidazole + tetracycline); salicylate component = aspirin-like effects (Reye syndrome risk in children with viral illness); traveler's diarrhea prophylaxis (2 tablets 4x/day starting day of travel)"},
  {name:"h. pylori triple",system:"Oncology",moa:"Triple therapy: PPI + amoxicillin + clarithromycin (10-14 days) - PPI reduces acid enabling better antibiotic effect; clarithromycin and amoxicillin kill H. pylori. Quadruple therapy: PPI + bismuth + metronidazole + tetracycline - preferred if clarithromycin resistance >15% (which applies to most of US)",use:"H. pylori infection (cause of most peptic ulcers and gastric cancer precursor); eradication reduces ulcer recurrence from ~80% to <20%",side:"Combined side effects of individual drugs; GI upset; metallic taste (metronidazole); C. difficile risk; rash; drug interactions",contra:"Penicillin allergy (adjust amoxicillin component); clarithromycin-resistant strains (use quadruple therapy); hypersensitivity to components",pearl:"CLARITHROMYCIN resistance >15% (assumed in US unless documented resistance rate) = USE QUADRUPLE THERAPY instead; confirm eradication 4 weeks post-treatment (urea breath test, stool antigen, or biopsy); bismuth quadruple therapy preferred in US; test and treat strategy recommended; H. pylori causes 70-90% of duodenal ulcers and 50-70% of gastric ulcers"},
  {name:"antacids",system:"Reproductive",moa:"Weak bases that react with gastric HCl to form water, gas, and salts; directly neutralize gastric acid; immediate but short-lived effect; do NOT reduce acid secretion",use:"Dyspepsia; heartburn (GERD); mild peptic ulcer symptoms (adjunct); constipation (magnesium hydroxide - laxative effect); hyperphosphatemia in CKD (aluminum hydroxide binds phosphate in GI tract)",side:"Aluminum alone: CONSTIPATION (astringent effect); Magnesium alone: DIARRHEA (osmotic effect); combinations (Maalox, Mylanta) balance these effects; belching/gas; sodium bicarbonate: metabolic alkalosis; calcium carbonate: milk-alkali syndrome; drug interactions (bind other medications - separate by 2 hours)",contra:"Renal failure (aluminum and magnesium accumulation - use calcium carbonate); sodium bicarbonate: hypertension (sodium load); avoid in bowel obstruction; long-term use of sodium bicarbonate (metabolic alkalosis)",pearl:"FASTEST onset (immediate) but SHORTEST duration (~1-2 hours); only effective after meals (food buffering extends effect to 3 hours); must be separated from other drugs by 2 hours (chelation/binding reduces absorption of tetracyclines, FQs, itraconazole, iron, levothyroxine); aluminum causes CONSTIPATION, magnesium causes DIARRHEA (combination = balanced); NOT for long-term use"}
];
var MAX_HINTS = 5;
var hintKeys   = ["moa","use","side","contra","pearl"];
var hintLabels = ["Mechanism of Action","Clinical Use","Side Effects","Contraindications","Clinical Pearl"];
var hintClasses= ["","","side-effect","contra","pearl"];
var CATEGORIES = ["All", "Antifungals", "Antimicrobials", "Antivirals", "Autonomic", "Cardiovascular", "Dermatology", "Endocrine", "GI", "General", "Hematology", "Immunology", "Musculoskeletal", "Neurology", "Oncology", "Pulmonary", "Renal", "Reproductive"];
var allDrugNames = [];
(function(){
  var seen = {};
  for(var i=0;i<drugs.length;i++){ if(!seen[drugs[i].name]){ seen[drugs[i].name]=1; allDrugNames.push(drugs[i].name); } }
  allDrugNames.sort(function(a,b){ return a.toLowerCase().localeCompare(b.toLowerCase()); });
})();
var currentDrug, hintLevel=0, attempts=0, queue=[], gameOver=false, acActiveIdx=-1;
var sel = document.getElementById("systemSelect");
var guessInput = document.getElementById("guess");
var acList = document.getElementById("autocomplete");
var hintsEl = document.getElementById("hints");
var pipsEl = document.getElementById("pips");
var resultEl = document.getElementById("result");
var prevGuessesEl = document.getElementById("prevGuesses");
var guessBtn = document.getElementById("guessBtn");
var nextBtn = document.getElementById("nextBtn");
for(var c=0;c<CATEGORIES.length;c++){
  var o = document.createElement("option");
  o.value = CATEGORIES[c]; o.textContent = CATEGORIES[c];
  sel.appendChild(o);
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function buildQueue(){
  var sys=sel.value;
  if(sys==="All"){ queue=shuffle(drugs); }
  else{ var f=[]; for(var i=0;i<drugs.length;i++){if(drugs[i].system===sys)f.push(drugs[i]);} queue=shuffle(f); }
}
function newGame(resetQueue){
  if(resetQueue||queue.length===0) buildQueue();
  currentDrug=queue.pop();
  hintLevel=0; attempts=0; gameOver=false;
  guessInput.value="";
  resultEl.style.display="none"; resultEl.className="result-banner";
  hintsEl.innerHTML=""; prevGuessesEl.innerHTML="";
  hideAc();
  renderPips(); showHint();
}
function renderPips(){
  pipsEl.innerHTML="";
  for(var i=0;i<MAX_HINTS;i++){
    var p=document.createElement("div");
    p.className="pip"+(i<attempts?" used":"");
    pipsEl.appendChild(p);
  }
}
function markCorrectPip(){
  var ps=pipsEl.children;
  for(var i=0;i<MAX_HINTS;i++) ps[i].className="pip";
  for(var i=0;i<attempts-1;i++) ps[i].className="pip used";
  if(attempts>0) ps[attempts-1].className="pip correct";
}
function showHint(){
  if(hintLevel>=MAX_HINTS) return;
  var card=document.createElement("div");
  card.className="hint-card "+(hintClasses[hintLevel]||"");
  card.innerHTML="<div class='hint-label'>"+hintLabels[hintLevel]+"</div>"+currentDrug[hintKeys[hintLevel]];
  hintsEl.appendChild(card);
  hintLevel++;
}
function addChip(name){
  var chip=document.createElement("div");
  chip.className="guess-chip"; chip.textContent=name;
  prevGuessesEl.appendChild(chip);
}
function guessDrug(){
  if(gameOver){ newGame(false); return; }
  var guess=guessInput.value.toLowerCase().trim();
  if(!guess) return;
  attempts++;
  guessInput.value=""; hideAc();
  guessInput.blur();
  if(guess===currentDrug.name.toLowerCase()){
    gameOver=true; markCorrectPip();
    while(hintLevel<MAX_HINTS) showHint();
    resultEl.className="result-banner correct";
    resultEl.innerHTML="✓ Correct! The drug was <strong>"+currentDrug.name+"</strong>";
    resultEl.style.display="block";
    setTimeout(function(){ resultEl.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
  } else {
    addChip(guess); renderPips();
    if(hintLevel<MAX_HINTS){
      showHint();
      var last=hintsEl.lastElementChild;
      if(last) setTimeout(function(){ last.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
      resultEl.className="result-banner wrong";
      resultEl.innerHTML="✗ Not quite — here's another clue…";
      resultEl.style.display="block";
    } else {
      gameOver=true;
      resultEl.className="result-banner reveal";
      resultEl.innerHTML="Out of hints. The answer was <strong>"+currentDrug.name+"</strong>";
      resultEl.style.display="block";
      setTimeout(function(){ resultEl.scrollIntoView({behavior:"smooth",block:"nearest"}); },80);
    }
  }
}
function showAc(val){
  acActiveIdx=-1;
  if(!val){ hideAc(); return; }
  var matches=[];
  for(var i=0;i<allDrugNames.length;i++){
    if(allDrugNames[i].toLowerCase().indexOf(val)===0) matches.push(allDrugNames[i]);
  }
  if(!matches.length){ hideAc(); return; }
  acList.innerHTML="";
  for(var i=0;i<matches.length;i++){
    (function(name){
      var d=document.createElement("div");
      d.className="ac-item"; d.textContent=name;
      d.addEventListener("touchend",function(e){
        e.preventDefault(); e.stopPropagation();
        guessInput.value=name; hideAc(); guessDrug();
      });
      d.addEventListener("mousedown",function(e){
        e.preventDefault();
        guessInput.value=name; hideAc(); guessDrug();
      });
      acList.appendChild(d);
    })(matches[i]);
  }
  acList.classList.remove("hidden");
}
function hideAc(){
  acList.classList.add("hidden"); acList.innerHTML=""; acActiveIdx=-1;
}
guessInput.addEventListener("input",function(){
  showAc(guessInput.value.toLowerCase().trim());
});
guessInput.addEventListener("keydown",function(e){
  var items=acList.querySelectorAll(".ac-item");
  if(e.key==="Enter"||e.keyCode===13){
    e.preventDefault();
    if(acActiveIdx>=0&&items[acActiveIdx]){ guessInput.value=items[acActiveIdx].textContent; hideAc(); }
    guessDrug(); return;
  }
  if(!items.length) return;
  if(e.key==="ArrowDown"||e.keyCode===40){
    e.preventDefault(); acActiveIdx=Math.min(acActiveIdx+1,items.length-1);
    for(var i=0;i<items.length;i++) items[i].classList.toggle("active",i===acActiveIdx);
    if(acActiveIdx>=0) guessInput.value=items[acActiveIdx].textContent;
  } else if(e.key==="ArrowUp"||e.keyCode===38){
    e.preventDefault(); acActiveIdx=Math.max(acActiveIdx-1,-1);
    for(var i=0;i<items.length;i++) items[i].classList.toggle("active",i===acActiveIdx);
    if(acActiveIdx>=0) guessInput.value=items[acActiveIdx].textContent;
  } else if(e.key==="Escape"||e.keyCode===27){
    hideAc();
  }
});
guessBtn.addEventListener("click",guessDrug);
guessBtn.addEventListener("touchend",function(e){ e.preventDefault(); guessDrug(); });
nextBtn.addEventListener("click",function(){ newGame(false); });
nextBtn.addEventListener("touchend",function(e){ e.preventDefault(); newGame(false); });
sel.addEventListener("change",function(){ newGame(true); });
document.addEventListener("touchstart",function(e){
  if(!guessInput.contains(e.target)&&!acList.contains(e.target)) hideAc();
},{passive:true});
document.addEventListener("mousedown",function(e){
  if(!guessInput.contains(e.target)&&!acList.contains(e.target)) hideAc();
});
buildQueue(); newGame(false);
})();
</script>
</body>
</html>
