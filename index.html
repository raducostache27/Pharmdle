  {name:"metronidazole",system:"Antimicrobials",moa:"Prodrug; activated by microbial reduction of nitro group to reactive intermediates; damages DNA causing strand breakage; bactericidal/antiprotozoal",use:"Anaerobic infections BELOW the diaphragm; C. difficile (drug of choice - mild-moderate); bacterial vaginosis; trichomoniasis (STD - drug of choice); amebic colitis + liver abscess; H. pylori (triple therapy); Giardia",side:"GI (metallic taste, nausea); disulfiram-like reaction with alcohol (headache, flushing, nausea - AVOID alcohol during and 48 hours after); peripheral neuropathy (prolonged use); CNS effects (seizures, encephalopathy - rarely); turns urine dark",contra:"First trimester pregnancy; concurrent alcohol; disulfiram",pearl:"DISULFIRAM-LIKE REACTION WITH ALCOHOL - must counsel patients; drug of choice for trichomoniasis and bacterial vaginosis; used below the diaphragm for anaerobes (clindamycin = above); metronidazole + warfarin (FAB-4 interaction - increases INR); also treats C. difficile (mild-moderate); dark urine (harmless)"},
  {name:"rifampin",system:"Antimicrobials",moa:"Inhibits bacterial RNA polymerase (beta subunit); prevents mRNA synthesis; bactericidal",use:"Tuberculosis (always combination therapy); meningococcal prophylaxis; H. influenzae prophylaxis; staph infections (adjunct, never monotherapy); Rifamycin for traveler's diarrhea",side:"RED/ORANGE discoloration of body fluids (urine, tears, sweat, saliva - harmless but warn patients; will stain contact lenses); hepatotoxicity; drug interactions (potent CYP inducer)",contra:"Concurrent protease inhibitors (HIV treatment); avoid monotherapy (rapid resistance develops)",pearl:"POWERFUL CYP450 INDUCER (most potent); reduces efficacy of oral contraceptives, warfarin, HIV antiretrovirals, and many other drugs; always combined with other agents (resistance develops rapidly as monotherapy); orange discoloration of body fluids - warn patients and about contact lens staining; used for meningococcal/H. influenzae prophylaxis"},
  {name:"methadone",system:"Neurology",moa:"Full mu-opioid receptor agonist; long-acting; also NMDA receptor antagonist; prevents withdrawal and reduces craving",use:"Opioid use disorder (MOUD); severe chronic pain; heroin detoxification",side:"QT prolongation (significant - check EKG before starting); respiratory depression; constipation; sedation; drug interactions (CYP3A4); diaphoresis",contra:"QT prolongation; concurrent QT-prolonging drugs; respiratory depression; must be dispensed only through certified opioid treatment programs (OTPs)",pearl:"Requires daily visits to certified treatment centers (methadone clinics); long half-life (24-36 hours) = once daily dosing; QTc prolongation must be monitored; only MOUD available for pregnant women with OUD who arrived on methadone; unique NMDA antagonism provides additional analgesic benefit; risk of accumulation"},
  {name:"buprenorphine",system:"Neurology",moa:"Partial mu-opioid receptor agonist (high affinity, ceiling effect on respiratory depression); naloxone added to discourage IV abuse (naloxone not absorbed sublingually)",use:"Opioid use disorder (MOUD - first-line for most patients); moderate-severe pain",side:"Withdrawal if given to opioid-dependent patient before adequate withdrawal symptoms (precipitated withdrawal); constipation; nausea; headache; sweating; sedation",contra:"Acute opioid intoxication; must wait for adequate withdrawal before initiating (COWS score ≥8); severe respiratory compromise",pearl:"SAFER than methadone - ceiling effect on respiratory depression; can be prescribed in office setting (vs methadone clinic); naloxone component prevents IV abuse; high affinity for opioid receptor = displaces other opioids (causes precipitated withdrawal if given too early); long-acting injectable (Sublocade) and implant available for compliance; X-waiver (DATA waiver) eliminated in 2023 - any licensed physician can now prescribe"},
  {name:"naltrexone",system:"Neurology",moa:"Competitive opioid receptor antagonist (mu, kappa, delta); blocks euphoric and analgesic effects of opioids; also used for alcohol use disorder",use:"Opioid use disorder (after full detoxification); alcohol use disorder; self-injurious behavior",side:"Hepatotoxicity (at high doses); GI nausea/abdominal pain; injection site reactions (IM); precipitated withdrawal if opioids still in system",contra:"Acute opioid withdrawal or opioids in system (precipitates severe withdrawal); acute hepatitis or liver failure; concurrent opioid analgesics",pearl:"Patient must be FULLY detoxified before starting (7-10 days opioid-free, 10-14 days for methadone); monthly IM injection (Vivitrol) available for compliance; no euphoria (blocks opioid effects); also approved for alcohol use disorder; if patient needs opioid analgesia (surgery) - must overcome blockade with higher doses (use non-opioid alternatives preferably)"},
  {name:"naloxone",system:"Pulmonary",moa:"Competitive opioid receptor antagonist; rapidly reverses respiratory depression, sedation, analgesia from opioid overdose",use:"Opioid overdose reversal; respiratory depression from opioids; MOUD (included in Suboxone to deter IV abuse)",side:"Precipitated withdrawal (acute opioid withdrawal syndrome - agitation, tachycardia, diaphoresis, nausea); resedation (shorter half-life than most opioids); pain (if opioid analgesia reversed)",contra:"No absolute contraindications in overdose; use caution in opioid-dependent patients",pearl:"Shorter half-life (30-90 min) than most opioids - RESEDATION can occur; patient must be monitored after initial reversal; intranasal (Narcan nasal spray) and auto-injector forms available for community use; 65,370 naloxone kits distributed in Alabama in 2024; widely distributed for opioid overdose harm reduction"},
  {name:"epinephrine",system:"Cardiovascular",moa:"Beta1=Beta2 > Alpha1=Alpha2; increases HR, contractility (beta1); bronchodilation (beta2); vasoconstriction at high doses (alpha1 dominates at higher doses)",use:"Anaphylaxis (first-line); cardiac arrest (ACLS); severe asthma; local anesthetic adjunct (vasoconstriction); croup (racemic epinephrine); open-angle glaucoma",side:"Tachycardia; hypertension; arrhythmias; anxiety; tremor; tissue necrosis (extravasation)",contra:"No absolute CI in anaphylaxis or cardiac arrest; avoid in sensitive to catecholamines; do not use with end-artery anatomical sites (ears, fingers, toes, nose, penis) when added to local anesthetics",pearl:"Drug of choice for anaphylaxis; added to local anesthetics to prolong duration (vasoconstriction reduces systemic absorption); coronary arteries have predominant beta2 receptors = net coronary vasodilation with epi; no reflex bradycardia (unlike NE - due to beta2 beta1 combined effect on BP)"},
  {name:"norepinephrine",system:"Renal",moa:"Alpha1 > Alpha2 > Beta1 >>> Beta2; predominantly vasoconstriction (alpha1); some cardiac stimulation (beta1); reflex bradycardia due to severe vasoconstriction",use:"Septic shock; distributive shock; severe hypotension",side:"Reflex bradycardia; severe vasoconstriction; peripheral ischemia; tissue necrosis (extravasation - use central line); hypertension",contra:"Hypovolemia (must correct volume first); mesenteric/peripheral ischemia; use through central line only",pearl:"First-line vasopressor for septic shock; causes reflex bradycardia (unlike epinephrine); pure vasoconstriction increases systemic vascular resistance; increases SBP and DBP; must be given via central IV line to avoid extravasation/tissue necrosis"},
  {name:"dopamine",system:"Cardiovascular",moa:"Dose-dependent receptor activity: Low dose (D1 receptors) = renal vasodilation; Medium dose (Beta1) = increased contractility/HR; High dose (Alpha1) = vasoconstriction",use:"Cardiogenic shock; heart failure with hypotension; bradycardia (second-line); historically for 'renal protection' (no longer supported by evidence)",side:"Arrhythmias (at high doses); tachycardia; tissue necrosis (extravasation); nausea/vomiting",contra:"Uncorrected hypovolemia; concurrent MAOIs (hypertensive crisis risk); pheochromocytoma",pearl:"Dose-dependent effects: 'renal dose' (D1) → 'cardiac dose' (beta1) → 'vasopressor dose' (alpha1); precursor to NE (in vivo); loses selectivity at higher doses; tachyarrhythmias more common vs norepinephrine"},
  {name:"albuterol",system:"Pulmonary",moa:"Selective agonist at beta-2 adrenergic receptors; bronchial smooth muscle relaxation; bronchodilation; also reverses hyperkalemia by shifting K+ into cells",use:"Acute asthma/COPD exacerbation (rescue inhaler); bronchospasm; hyperkalemia (temporary shift K+ intracellularly)",side:"Tremor; tachycardia; hypokalemia; anxiety; palpitations; can worsen anxiety (caution in anxiety disorders)",contra:"Hypersensitivity; use caution with MAOIs and TCAs",pearl:"Short-acting beta-2 agonist (SABA) = rescue inhaler; overuse or high-dose can cause tachycardia and anxiety; helps drive K+ into cells (useful in hyperkalemia - temporary measure); racemic mixture; levalbuterol (R-enantiomer only = fewer cardiovascular side effects)"},
  {name:"atropine",system:"Reproductive",moa:"Competitive antagonist at muscarinic (M) receptors; blocks parasympathetic effects; increases HR, decreases secretions, dilates pupils, reduces GI motility",use:"Bradycardia (ACLS); organophosphate/nerve agent poisoning antidote; preoperative antisialagogue; antispasmodic; pupil dilation (ophthalmology); reversal of neuromuscular blockade (with neostigmine)",side:"HOT, RED, DRY, BLIND, MAD (mnemonics for anticholinergic toxicity): hyperthermia, flushing, dry mouth, blurred vision, urinary retention, constipation, confusion, tachycardia",contra:"Narrow-angle glaucoma; BPH; GI/urinary obstruction; tachycardia (caution)",pearl:"Antidote for organophosphate and muscarine poisoning (treats both because both cause muscarinic overstimulation); anticholinergic toxicity mnemonic: 'Hot as a hare, Dry as a bone, Red as a beet, Blind as a bat, Mad as a hatter'; treat anticholinergic overdose symptomatically; physostigmine is specific antidote for severe anticholinergic toxicity"},
  {name:"propranolol",system:"Cardiovascular",moa:"Competitive antagonist at beta-1 and beta-2 adrenergic receptors; reduces HR, contractility, and BP; blocks bronchodilation (beta2) and hepatic glycogenolysis",use:"Hypertension; angina; arrhythmias; post-MI; essential tremor; migraine prevention; hyperthyroidism (symptoms); anxiety (performance anxiety); pheochromocytoma pre-treatment (with alpha-blocker first)",side:"Bradycardia; hypotension; bronchoconstriction (beta-2 blockade); fatigue; depression; sexual dysfunction; masks hypoglycemia signs; peripheral vasoconstriction (Raynaud's exacerbation)",contra:"Asthma/COPD (bronchoconstriction); heart block; cardiogenic shock; uncompensated heart failure; use with caution in diabetes (masks hypoglycemia)",pearl:"Non-selective = affects both beta-1 (cardiac) and beta-2 (bronchial/metabolic); AVOID in asthma (bronchoconstriction); use SELECTIVE beta-1 blockers (metoprolol, atenolol) when bronchospasm is concern; masks hypoglycemia symptoms in diabetics; 'olol' suffix = beta-blocker"},
  {name:"metoprolol",system:"Cardiovascular",moa:"Selective competitive antagonist at beta-1 adrenergic receptors; reduces HR, contractility, and BP with less effect on beta-2 receptors (bronchial, peripheral vessels)",use:"Hypertension; angina; heart failure (carvedilol, metoprolol succinate); arrhythmias; post-MI; anxiety; migraine prevention",side:"Bradycardia; fatigue; hypotension; cold extremities; sexual dysfunction; at HIGH doses loses selectivity (can cause bronchoconstriction)",contra:"Significant bradycardia; severe heart block; cardiogenic shock; selectivity is lost at high doses",pearl:"Cardioselective = safer in asthma/COPD (at standard doses); selectivity is RELATIVE and DOSE-DEPENDENT; Metoprolol succinate (XL) = preferred for heart failure; atenolol renally excreted; 'olol' suffix = beta-blocker"},
  {name:"prazosin",system:"GI",moa:"Selective competitive antagonist at alpha-1 adrenergic receptors; vasodilation (arteriolar and venous); reduces peripheral vascular resistance; relaxes prostatic smooth muscle",use:"Hypertension; benign prostatic hyperplasia (BPH); Raynaud's phenomenon; PTSD (prazosin - nightmares)",side:"First-dose hypotension/syncope (GIVE FIRST DOSE AT BEDTIME); orthostatic hypotension; reflex tachycardia (less than non-selective alpha blockers); dizziness; nasal congestion",contra:"Concurrent PDE5 inhibitors (sildenafil - severe hypotension); caution with first dose",pearl:"Selective alpha-1 = does NOT blunt pre-synaptic alpha-2 autoreceptors (therefore NO reflex tachycardia); first-dose orthostatic hypotension (give at bedtime with first dose); 'OSIN' suffix = selective alpha-1 blocker (prazosin, terazosin, doxazosin, tamsulosin); tamsulosin most uroselective (alpha-1A) for BPH"},
  {name:"clonidine",system:"Cardiovascular",moa:"Agonist at alpha-2 adrenergic receptors in CNS (brainstem); reduces sympathetic outflow; decreases NE release; lowers BP and HR",use:"Hypertension; ADHD (guanfacine - Intuniv); opioid withdrawal (clonidine - off-label, reduces anxiety/irritability/craving); Tourette's syndrome; hot flashes; menopausal symptoms",side:"Sedation (significant); dry mouth; constipation; rebound hypertension on abrupt discontinuation; bradycardia; sexual dysfunction",contra:"Abrupt discontinuation (severe rebound hypertension); conduction abnormalities",pearl:"REBOUND HYPERTENSION with abrupt discontinuation - TAPER slowly; sedation is prominent (useful in ADHD for evening/sleep); also used for opioid withdrawal (reduces anxiety and craving - limited efficacy, not FDA approved for smoking cessation); clonidine = smoking cessation (limited data)"},
  {name:"phenylephrine",system:"Pulmonary",moa:"Selective agonist at alpha-1 adrenergic receptors; causes vasoconstriction; increases BP; reflexive bradycardia",use:"Nasal decongestant (topical); hypotension in anesthesia; pupil dilation (ophthalmology); combined with local anesthetics for topical nasal anesthesia",side:"Reflex bradycardia (alpha-1 vasoconstriction → baroreceptor reflex); hypertension; nasal rebound congestion (with topical overuse - rhinitis medicamentosa)",contra:"Severe hypertension; concurrent MAOIs",pearl:"Pure alpha-1 agonist = causes reflex bradycardia (unlike epinephrine); no beta receptor effects; nasal decongestant (OTC); combined with tetracaine for nasal topical anesthesia; rhinitis medicamentosa with overuse"},
  {name:"nicotine replacement therapy",system:"General",moa:"Provides nicotine via non-tobacco delivery (patch, gum, lozenge, inhaler, nasal spray); reduces withdrawal symptoms; nicotinic receptor (nAChR) agonist",use:"Smoking/tobacco cessation; nicotine withdrawal",side:"Local irritation (patch site rash, oral irritation); insomnia (with patch - remove at night); nausea; vivid dreams",contra:"Recent MI (relative); pregnancy (nicotine harms fetus but NRT safer than smoking - individualize); severe cardiovascular disease",pearl:"Multiple forms: patch, gum, lozenge, inhaler, nasal spray; patch for background craving, short-acting forms for breakthrough; combination NRT can be used together"},
  {name:"varenicline",system:"General",moa:"Partial agonist at alpha-4 beta-2 nicotinic acetylcholine receptors; reduces cravings (partial agonism) while blocking nicotine binding (competitive inhibition) from smoked cigarettes",use:"Smoking cessation (most effective pharmacotherapy for smoking cessation)",side:"Nausea (most common - take with food); vivid dreams/nightmares; neuropsychiatric effects (depression, suicidal ideation - boxed warning removed 2016 as studies did not confirm); headache",contra:"Severe renal failure (dose adjust); caution in psychiatric disorders (monitor mental status)",pearl:"Most effective smoking cessation pharmacotherapy; partial agonist = reduces withdrawal AND blocks reinforcing effects of smoking; neuropsychiatric BBW was removed (2016 meta-analysis did not confirm risk in most patients); may cause vivid dreams; nausea minimized by taking with food"},
  {name:"bupropion",system:"Neurology",moa:"Inhibits norepinephrine and dopamine reuptake; nicotinic receptor antagonist (helps reduce reward of nicotine); mechanism for smoking cessation not fully understood",use:"Smoking cessation; MDD; seasonal affective disorder; ADHD (off-label)",side:"Lowered seizure threshold; insomnia; dry mouth; agitation; tachycardia; no weight gain",contra:"Seizure disorder; eating disorders; abrupt alcohol/BZD withdrawal; concurrent MAOIs",pearl:"Second-line for smoking cessation (after varenicline); also serves dual purpose if patient has depression; does NOT cause sexual dysfunction; lowers seizure threshold; Zyban = smoking cessation formulation; Wellbutrin = antidepressant formulation (same drug)"},
  {name:"dexamethasone",system:"Pulmonary",moa:"Potent glucocorticoid; reduces inflammation by inhibiting phospholipase A2, COX, and pro-inflammatory cytokines; reduces brain edema and meningeal inflammation in meningitis",use:"Bacterial meningitis (adjunct - reduces neurological complications); cerebral edema; croup; asthma exacerbations; allergic reactions; cancer-related inflammation; adrenal insufficiency; anti-emetic (chemotherapy)",side:"Immunosuppression; hyperglycemia; hypertension; adrenal suppression (with prolonged use); osteoporosis; cataracts; weight gain; cushinoid features; GI bleeding",contra:"Active untreated infections (relative in meningitis - benefit outweighs risk); systemic fungal infections",pearl:"In meningitis: give BEFORE or WITH first antibiotic dose (reduces neurological sequelae); reduces hearing loss in H. influenzae meningitis in children; may reduce CSF penetration of vancomycin (consider rifampin instead if dexamethasone used for pneumococcal meningitis); dexamethasone also diminishes the beneficial inflammation that helps antibiotics penetrate BBB"},
  {name:"fluconazole",system:"Antifungals",moa:"Inhibits fungal CYP450 enzyme lanosterol 14-alpha demethylase; prevents conversion of lanosterol to ergosterol; disrupts fungal cell membrane integrity",use:"Oropharyngeal/esophageal candidiasis; cryptococcal meningitis (consolidation and maintenance); coccidioidomycosis; secondary prophylaxis for candidiasis/cryptococcosis in HIV",side:"GI upset; hepatotoxicity; QT prolongation; rash; drug interactions (CYP3A4 inhibitor); teratogenic",contra:"Pregnancy (teratogenic); concurrent QT-prolonging drugs; hypersensitivity; concurrent cisapride",pearl:"Most commonly used antifungal; oral bioavailability ~90% (oral = IV); drug of choice for esophageal candidiasis consolidation and cryptococcal meningitis maintenance; must discontinue when CD4 >200 for cryptococcal maintenance; CYP3A4 inhibitor with many drug interactions"},
  {name:"itraconazole",system:"Antifungals",moa:"Inhibits fungal CYP450 lanosterol 14-alpha demethylase; disrupts ergosterol synthesis and fungal cell membrane",use:"Histoplasmosis (drug of choice for mild-moderate); coccidioidomycosis (especially bone/joint disease); prophylaxis for histoplasmosis when CD4 <150; aspergillosis",side:"GI upset; hepatotoxicity; negative inotropic effect (avoid in heart failure); drug interactions (strong CYP3A4 inhibitor); peripheral edema; QT prolongation",contra:"Heart failure; concurrent drugs that decrease gastric acid (reduces absorption); concurrent QT-prolonging drugs; pregnancy",pearl:"Preferred over fluconazole for coccidioidomycosis with bone/joint involvement; strong CYP3A4 inhibitor; requires acidic environment for absorption (take with food/cola); negative inotropic effects (avoid in CHF); less CNS penetration than fluconazole"},
  {name:"voriconazole",system:"Antifungals",moa:"Inhibits fungal lanosterol 14-alpha demethylase; broader spectrum than fluconazole/itraconazole",use:"Invasive aspergillosis (drug of choice); candidiasis refractory to fluconazole; coccidioidomycosis refractory to fluconazole/itraconazole; cryptococcal disease",side:"Visual disturbances (transient photophobia, color changes - unique); hepatotoxicity; QT prolongation; hallucinations; photosensitivity; skin cancer (long-term use); drug interactions (CYP inhibitor/substrate)",contra:"Concurrent rifampin (induces voriconazole metabolism); concurrent QT-prolonging drugs; concurrent sirolimus",pearl:"Drug of choice for invasive aspergillosis; unique side effect: transient visual disturbances (photopsia) occurring early in therapy; strong CYP2C19 substrate (genetic variability in metabolism); photosensitivity with long-term use - risk of squamous cell carcinoma"},
  {name:"posaconazole",system:"Antifungals",moa:"Inhibits fungal lanosterol 14-alpha demethylase; broadest spectrum triazole",use:"Refractory candidiasis; invasive aspergillosis (prophylaxis and salvage); mucormycosis; prophylaxis in immunocompromised (stem cell transplant, AML induction)",side:"GI upset; hepatotoxicity; QT prolongation; drug interactions (CYP3A4 inhibitor)",contra:"Concurrent QT-prolonging drugs; concurrent sirolimus; concurrent ergot alkaloids",pearl:"Broadest spectrum triazole; one of few agents active against Mucorales (mucormycosis); extended-release tablets have improved absorption vs oral suspension; strong CYP3A4 inhibitor; used for prophylaxis in high-risk immunocompromised patients"},
  {name:"amphotericin b",system:"Antifungals",moa:"Binds ergosterol in fungal cell membrane, forming pores that cause leakage of intracellular contents; fungicidal; broadest spectrum antifungal",use:"Severe/life-threatening fungal infections: cryptococcal meningitis (induction), histoplasmosis (severe), coccidioidomycosis (severe/diffuse), invasive aspergillosis, candidiasis (resistant/invasive), mucormycosis",side:"Infusion-related reactions (fever, chills, rigors, hypotension); nephrotoxicity (dose-limiting); hypokalemia; hypomagnesemia; anemia; phlebitis (conventional formulation)",contra:"Hypersensitivity; avoid concurrent nephrotoxins; use lipid formulations in renal impairment",pearl:"Gold standard broad-spectrum antifungal; 'ampho-terrible' due to nephrotoxicity; lipid formulations (liposomal, lipid complex) less nephrotoxic but much more expensive; premedicate with acetaminophen, diphenhydramine, and hydrocortisone to reduce infusion reactions; hydrate before infusion to reduce nephrotoxicity; 'last resort' antifungal like carbapenems for bacteria"},
  {name:"flucytosine",system:"Antifungals",moa:"Converted intracellularly to 5-fluorouracil; inhibits fungal DNA synthesis and RNA synthesis; fungistatic",use:"Cryptococcal meningitis (combined with amphotericin B for induction - NEVER monotherapy); candidiasis (combination)",side:"Bone marrow suppression (leukopenia, thrombocytopenia); GI toxicity; hepatotoxicity; rash",contra:"Renal impairment (requires dose adjustment - renally excreted); NEVER use as monotherapy (rapid resistance)",pearl:"ALWAYS used in combination (never monotherapy); combined with amphotericin B for cryptococcal meningitis induction (synergistic); narrow therapeutic index - monitor levels; renally excreted - dose adjust in renal impairment; resistance develops rapidly when used alone"},
  {name:"isoniazid",system:"Antimicrobials",moa:"Prodrug activated by catalase-peroxidase (KatG); inhibits mycolic acid synthesis (cell wall component unique to mycobacteria); bactericidal for actively dividing organisms",use:"Latent TB infection treatment (9 months - drug of choice); active TB (combination with RIPE regimen)",side:"Peripheral neuropathy (pyridoxine deficiency - prevent with vitamin B6); hepatotoxicity (dose-dependent, age-related); lupus-like syndrome; sideroblastic anemia; drug interactions",contra:"Active liver disease; previous INH-related hepatotoxicity; hypersensitivity",pearl:"ALWAYS supplement pyridoxine (vitamin B6) to prevent peripheral neuropathy; hepatotoxicity increases with age (monitor LFTs); RIPE regimen: Rifampin, Isoniazid, Pyrazinamide, Ethambutol x2 months then Isoniazid + Rifampin x4 months; NAT2 slow acetylators have higher drug levels (more toxicity)"},
  {name:"pyrazinamide",system:"Antimicrobials",moa:"Prodrug converted to pyrazinoic acid by mycobacterial pyrazinamidase; mechanism not fully understood; active against intracellular (acidic pH) dormant organisms",use:"Active TB (first 2 months of RIPE regimen); essential for sterilizing intracellular organisms",side:"Hepatotoxicity (most common and significant); hyperuricemia/gout (inhibits uric acid excretion); arthralgias; GI upset; photosensitivity",contra:"Severe hepatic disease; acute gout",pearl:"Part of RIPE regimen; only used for first 2 months (due to hepatotoxicity concerns); active in acidic intracellular environment (targets dormant organisms in macrophages); causes hyperuricemia - monitor uric acid levels"},
  {name:"ethambutol",system:"Antimicrobials",moa:"Inhibits arabinosyltransferase enzyme; disrupts mycobacterial cell wall synthesis (arabinogalactan layer)",use:"Active TB (RIPE regimen); MAC (Mycobacterium avium complex) treatment (combined with macrolide); used to prevent emergence of resistance",side:"Optic neuritis (dose-dependent - causes color vision defects and decreased visual acuity); hyperuricemia; GI upset; hepatotoxicity (rare)",contra:"Pre-existing optic neuritis; children too young to report visual changes; renal impairment (dose adjust)",pearl:"MONITOR visual acuity and color discrimination monthly; optic neuritis is dose-dependent and usually reversible if caught early; cannot use in children too young to report visual changes; used as 4th drug in RIPE regimen until susceptibilities known; also part of MAC treatment"},
  {name:"azithromycin",system:"Antimicrobials",moa:"Binds 50S ribosomal subunit; inhibits bacterial protein synthesis; bacteriostatic; excellent intracellular penetration for MAC",use:"MAC primary prophylaxis (CD4 <50); MAC treatment (combined with ethambutol ± rifabutin); community-acquired pneumonia; C. trachomatis",side:"GI upset; QT prolongation; hepatotoxicity; hearing loss (high dose); minimal CYP interactions vs clarithromycin",contra:"QT prolongation; hypersensitivity; concurrent QT-prolonging drugs",pearl:"Drug of choice for MAC prophylaxis and treatment; 'MACrolide for MAC'; less CYP drug interactions than clarithromycin; long tissue half-life; discontinue prophylaxis when CD4 >100 for ≥3 months on ART"},
  {name:"rifabutin",system:"Antimicrobials",moa:"Inhibits bacterial RNA polymerase (beta subunit); prevents mRNA synthesis; bactericidal; less potent CYP inducer than rifampin",use:"MAC prophylaxis (alternative to azithromycin); MAC treatment (third drug added with macrolide + ethambutol); alternative to rifampin in patients on HIV protease inhibitors",side:"Orange discoloration of body fluids; uveitis (dose-dependent); neutropenia; GI upset; hepatotoxicity; arthralgias",contra:"Concurrent strong CYP3A4 inhibitors (increase rifabutin levels - severe toxicity); hypersensitivity",pearl:"LESS potent CYP inducer than rifampin - preferred in HIV patients on protease inhibitors (rifampin would decrease PI levels too much); dose must be adjusted based on concurrent HIV medications; uveitis is unique adverse effect (adjust dose or discontinue); orange body fluid discoloration (same as rifampin)"},
  {name:"tmp-smx",system:"Antimicrobials",moa:"Sequential blockade of folate synthesis; SMX inhibits dihydropteroate synthase; TMP inhibits dihydrofolate reductase; synergistic bactericidal effect",use:"PCP (Pneumocystis jirovecii) pneumonia: prophylaxis (CD4 <200) and treatment (drug of choice); Toxoplasma gondii suppression (CD4 <100); alternative for Isospora; Nocardia",side:"Rash (sulfonamide allergy); Stevens-Johnson Syndrome; nephrotoxicity; hyperkalemia; megaloblastic anemia; GI upset; hepatotoxicity; hemolysis (G6PD deficiency); myelosuppression",contra:"Sulfonamide allergy; pregnancy (1st/3rd trimester); G6PD deficiency; severe renal/hepatic failure",pearl:"Drug of choice for PCP prophylaxis (start when CD4 <200) AND treatment; also covers Toxoplasma (dual purpose); most common reason for intolerance is rash - can try desensitization; discontinue PCP prophylaxis when CD4 >200 for ≥3 months on ART; one DS tablet daily for prophylaxis"},
  {name:"pentamidine",system:"Pulmonary",moa:"Disrupts DNA, RNA, and protein synthesis in Pneumocystis; mechanism not fully elucidated",use:"PCP prophylaxis (alternative when TMP-SMX not tolerated - inhaled monthly); PCP treatment (IV - alternative to TMP-SMX)",side:"Inhaled: cough, bronchospasm; IV: hypoglycemia (stimulates insulin release), hyperglycemia (long-term - damages beta cells), nephrotoxicity, pancreatitis, hypotension, QT prolongation, electrolyte abnormalities",contra:"Hypersensitivity; use with caution in renal impairment (IV form)",pearl:"Second-line for PCP prophylaxis when TMP-SMX not tolerated; monthly inhaled administration; IV form more toxic (hypoglycemia - monitor blood glucose during IV infusion); inhaled form does not protect against extrapulmonary PCP"},
  {name:"pyrimethamine + sulfadiazine",system:"General",moa:"Pyrimethamine inhibits dihydrofolate reductase; sulfadiazine inhibits dihydropteroate synthase; combined sequential blockade of folate synthesis kills Toxoplasma gondii",use:"Toxoplasma gondii encephalitis treatment (drug of choice); always combined with leucovorin (folinic acid) to prevent myelosuppression",side:"Myelosuppression (leukopenia, thrombocytopenia - prevented with leucovorin); rash (sulfadiazine allergy); Stevens-Johnson syndrome; GI upset; renal stones (sulfadiazine - maintain hydration)",contra:"Sulfonamide allergy; folate deficiency without leucovorin supplementation; must supplement leucovorin",pearl:"ALWAYS combine with leucovorin (folinic acid 10-25mg/day) to reduce myelosuppression from pyrimethamine; TMP-SMX is alternative and also provides primary prophylaxis; secondary prophylaxis required until CD4 >200 for ≥6 months on ART"},
  {name:"ganciclovir",system:"Antivirals",moa:"Prodrug phosphorylated by CMV UL97 kinase to active triphosphate; inhibits viral DNA polymerase; prevents CMV DNA chain elongation",use:"CMV retinitis (drug of choice - valganciclovir oral preferred); CMV prophylaxis in transplant recipients; CMV colitis, esophagitis, pneumonitis; Kaposi sarcoma (adjunct)",side:"Bone marrow suppression (BOXED WARNING: granulocytopenia, anemia, thrombocytopenia - dose-limiting); carcinogenic/teratogenic (animal studies); CNS toxicity; nephrotoxicity; crystalluria",contra:"Concurrent zidovudine (additive myelosuppression); absolute neutrophil count <500 or platelet count <25,000 (relative); pregnancy",pearl:"Valganciclovir is oral prodrug of ganciclovir (bioavailability 60% vs <10% for oral ganciclovir); drug of choice for CMV retinitis; major dose-limiting toxicity is bone marrow suppression (monitor CBC); CMV retinitis requires chronic maintenance until CD4 >100 for 3-6 months; ganciclovir also has activity against HSV, VZV, EBV, HHV-6, HHV-8"},
  {name:"foscarnet",system:"Antivirals",moa:"Pyrophosphate analog; directly inhibits viral DNA/RNA polymerases without requiring phosphorylation by viral kinase; blocks pyrophosphate binding site; does NOT require thymidine kinase activation",use:"CMV retinitis (alternative to ganciclovir; drug of choice for ganciclovir-resistant CMV); acyclovir-resistant HSV and VZV; HHV-6; HIV (weak activity)",side:"Nephrotoxicity (MAJOR - must hydrate aggressively); electrolyte abnormalities (hypocalcemia, hypomagnesemia, hypo/hyperphosphatemia - can cause seizures/arrhythmias); anemia; penile/vulvar ulcers (from drug in urine); phlebitis",contra:"Renal impairment (dose adjust); concurrent nephrotoxins; avoid in dehydration",pearl:"Broad-spectrum antiviral reserved for resistant or emergent infections (like carbapenems for bacteria); active against acyclovir-resistant HSV/VZV (does NOT require thymidine kinase); MUST hydrate aggressively to prevent nephrotoxicity; electrolyte monitoring critical (especially calcium - chelation); penile ulcers from drug excreted in urine; most nephrotoxic antiviral"},
  {name:"cidofovir",system:"Antivirals",moa:"Nucleotide analog; phosphorylated by cellular kinases (not viral); inhibits viral DNA polymerase; active against acyclovir-resistant strains",use:"CMV retinitis (alternative, refractory); acyclovir-resistant HSV; adenovirus; BK virus; HPV (off-label)",side:"Severe nephrotoxicity (dose-limiting - MUST prehydrate with NS and give probenecid to reduce renal excretion); neutropenia; anterior uveitis; ocular hypotony",contra:"Renal impairment (serum creatinine >1.5 mg/dL); concurrent nephrotoxins (including NSAIDs); sulfonamide allergy (relative - probenecid required with each dose and has sulfonamide structure)",pearl:"Must be given with probenecid (blocks tubular secretion) and IV hydration to reduce nephrotoxicity; long intracellular half-life allows weekly then biweekly dosing; active against acyclovir-resistant HSV (does not require viral kinase); reserve for resistant or refractory infections; probenecid required with every dose"},
  {name:"acyclovir",system:"Antivirals",moa:"Prodrug; phosphorylated by viral thymidine kinase (TK) to monophosphate, then cellular kinases to acyclovir triphosphate; inhibits viral DNA polymerase and causes chain termination; selective - only activated in infected cells",use:"HSV-1, HSV-2, VZV infections: herpes labialis, genital herpes (1st episode and suppression), herpes zoster, varicella; HSV encephalitis (IV - drug of choice); neonatal HSV (IV); mucocutaneous HSV in immunocompromised",side:"IV: nephrotoxicity/crystalline nephropathy (hydrate well, infuse slowly); neurotoxicity (tremors, delirium, seizures); phlebitis; Oral: well tolerated - nausea, headache, diarrhea",contra:"Hypersensitivity; renal impairment (dose adjustment needed); avoid rapid IV infusion",pearl:"Prototype antiviral; selective (only activated by viral TK in infected cells); available oral, IV, and topical; oral bioavailability only 20% (low - why valacyclovir preferred); IV for serious infections (encephalitis, neonatal HSV, severe immunocompromised); adequate hydration required with IV to prevent crystalluria; resistance via TK mutation - then use foscarnet or cidofovir"},
  {name:"valacyclovir",system:"Antivirals",moa:"Prodrug (valine ester) of acyclovir; converted to acyclovir by first-pass hepatic/intestinal esterases; same mechanism as acyclovir (viral TK activation → DNA polymerase inhibition)",use:"Herpes zoster (shingles - drug of choice oral); genital herpes (1st episode and recurrent suppression); herpes labialis (cold sores); varicella; CMV prophylaxis (transplant)",side:"Nausea, headache, vomiting; high-dose/renal impairment: TTP/HUS (thrombotic thrombocytopenic purpura/hemolytic uremic syndrome - AIDS patients); confusion, hallucinations",contra:"Hypersensitivity to valacyclovir or acyclovir; renal impairment (dose adjust); only available orally (not IV)",pearl:"Preferred over acyclovir for outpatient use (bioavailability 60% vs 20%; twice daily vs TID-QID dosing); ONLY available orally; drug of choice for herpes zoster (oral); TTP/HUS risk at high doses in AIDS patients; achieves 3-5x higher plasma levels than oral acyclovir"},
  {name:"famciclovir",system:"Antivirals",moa:"Prodrug deacylated/oxidized to penciclovir (active form); phosphorylated by viral TK; inhibits viral DNA polymerase; similar to acyclovir but higher intracellular concentrations and longer intracellular half-life",use:"Genital herpes (1st episode, recurrent, suppression); herpes labialis; herpes zoster; HSV in HIV-infected patients",side:"Headache, nausea, diarrhea; well tolerated",contra:"Hypersensitivity; renal impairment (dose adjust); only available orally",pearl:"Oral only (like valacyclovir); bioavailability 70%; intracellular half-life 7-20 hours (longer than acyclovir - less frequent dosing); broadly similar indications to valacyclovir; prodrug of penciclovir"},
  {name:"penciclovir",system:"Antivirals",moa:"Phosphorylated by viral TK; inhibits viral DNA polymerase; does NOT cause DNA chain termination (unlike acyclovir); higher intracellular concentrations than acyclovir",use:"Herpes labialis (cold sores) - topical cream ONLY; recurrent orolabial/genital herpes (topical)",side:"Local: mild skin irritation, burning, erythema at application site",contra:"Hypersensitivity; avoid mucous membranes/eyes",pearl:"Topical only (no systemic absorption); apply every 2 hours while awake for 4 days; shortens healing by ~17 hours; mnemonic: PENciclovir - apply it with a PEN (topical only)"},
  {name:"trifluridine",system:"Antivirals",moa:"Tri-fluorinated thymidine analog; incorporated into viral DNA; inhibits thymidylate synthetase; does NOT require viral TK activation (active against TK-deficient acyclovir-resistant strains)",use:"HSV keratitis (drug of choice - topical ophthalmic); keratoconjunctivitis and epithelial keratitis from HSV-1 and HSV-2; acyclovir-resistant HSV (topical with interferon alpha)",side:"Local: ocular irritation, burning, stinging, palpebral edema; not absorbed systemically",contra:"Hypersensitivity; do not use in ear canals or other non-ophthalmic areas",pearl:"Drug of choice for HSV keratitis (eye infection); topical ophthalmic drops only; does not require viral TK activation - active against acyclovir-resistant strains; does NOT cause DNA chain termination (unlike acyclovir); apply every 2 hours while awake"},
  {name:"docosanol",system:"Antivirals",moa:"Inhibits fusion of HSV lipid envelope with host cell plasma membrane; prevents viral entry into cells (blocks adsorption and penetration)",use:"Herpes labialis (cold sores/fever blisters) - OTC topical treatment",side:"Local: headache, skin irritation at application site",contra:"Do not apply in/near eyes; hypersensitivity",pearl:"Only OTC FDA-approved topical antiviral for cold sores; unique MOA (blocks cell entry vs other antivirals that block replication); apply 5 times daily until healed; shorten healing time when applied early; available without prescription (Abreva)"},
  {name:"oseltamivir",system:"Antivirals",moa:"Inhibits viral neuraminidase enzyme; prevents release of new viral particles from infected cells and prevents spread to new cells",use:"Influenza A and B treatment (within 48 hours of symptom onset - reduces duration by 1-1.5 days); influenza prophylaxis (post-exposure)",side:"Nausea, vomiting (take with food); headache; rare neuropsychiatric events (especially pediatrics)",contra:"Renal impairment (dose adjust); hypersensitivity",pearl:"Must start within 48 hours of symptom onset for efficacy; reduces duration by ~1.5 days; oral administration; used for both treatment and prophylaxis; less effective against H3N2 and novel strains; resistance can emerge"},
  {name:"zanamivir",system:"Antivirals",moa:"Inhibits influenza neuraminidase; prevents viral release and spread; inhaled directly to respiratory tract",use:"Influenza A and B treatment (within 48 hours); prophylaxis post-exposure",side:"Bronchospasm (significant risk in asthma/COPD - can be life-threatening); cough; irritation",contra:"Asthma or COPD (risk of severe bronchospasm - FDA warning); use with caution in underlying respiratory disease",pearl:"Inhaled powder (Diskhaler); AVOID in asthma/COPD due to bronchospasm risk (use oseltamivir instead); no dose adjustment in renal impairment (not systemically absorbed); same efficacy as oseltamivir"},
  {name:"ribavirin",system:"Antivirals",moa:"Purine (guanosine) analog; multiple mechanisms: inhibits inosine monophosphate dehydrogenase (IMPDH), inhibits viral RNA polymerase and RNA capping; broad antiviral spectrum",use:"RSV (inhaled - treatment in hospitalized children); Hepatitis C (combined with interferon alpha - older regimen); Lassa fever; Hantavirus; hemorrhagic fever viruses",side:"Hemolytic anemia (dose-limiting); teratogenic (BOXED WARNING - category X); depression; insomnia; GI effects; cough (inhaled); neutropenia",contra:"Pregnancy (TERATOGENIC - X category, avoid both in patient and partner); hemoglobin <10 g/dL; severe renal/hepatic disease; concurrent didanosine",pearl:"Significant teratogenicity - two forms of contraception required during therapy and 6 months after; hemolytic anemia is major dose-limiting toxicity; largely replaced in HCV treatment by newer DAAs (direct-acting antivirals); inhaled form for RSV in hospitalized children"},
  {name:"interferon alpha",system:"Antivirals",moa:"Activates antiviral proteins (oligoadenylate synthetase, PKR); promotes cellular resistance to viral infection; stimulates NK cells and macrophages; anti-proliferative effects",use:"Hepatitis B (HBeAg-positive chronic); Hepatitis C (with ribavirin - older regimen, largely replaced by DAAs); Kaposi's sarcoma; hairy cell leukemia; melanoma; condylomata acuminata",side:"Flu-like symptoms (fever, chills, myalgias, fatigue - very common - improve with continued use); depression (significant); bone marrow suppression; alopecia; thyroid dysfunction; injection site reactions; retinal changes",contra:"Decompensated liver disease; severe psychiatric disease; autoimmune hepatitis; pregnancy",pearl:"Flu-like symptoms with each injection (pretreat with acetaminophen); depression is significant - screen and monitor; largely replaced in HCV by highly effective DAAs (direct-acting antivirals); still used for HBV; subcutaneous injection"},
  {name:"amantadine",system:"Antivirals",moa:"Blocks M2 ion channel protein of influenza A; inhibits viral uncoating and RNA replication; no activity against influenza B",use:"Influenza A prevention and treatment (historically); Parkinson's disease (amantadine - dopaminergic effect); drug-induced extrapyramidal symptoms",side:"CNS effects (confusion, insomnia, hallucinations - especially amantadine in elderly); GI upset; anticholinergic effects; livedo reticularis (amantadine)",contra:"Renal impairment (dose adjust); seizure disorder; psychiatric disease",pearl:"Largely INEFFECTIVE now against influenza A due to widespread resistance; rimantadine has fewer CNS side effects than amantadine; amantadine used for Parkinson's disease (anti-dyskinesia and mild dopaminergic effect); NOT for influenza B"},
  {name:"cyclophosphamide",system:"Renal",moa:"Prodrug bioactivated by liver CYP450 to active alkylating metabolites; cross-links DNA (interstrand and intrastrand); prevents DNA replication; cell cycle non-specific",use:"Solid tumors; leukemia; lymphoma; rheumatic diseases (SLE, granulomatosis with polyangiitis); bone marrow transplant conditioning; nephrotic syndrome",side:"Myelosuppression; hemorrhagic cystitis (acrolein metabolite - prevent with MESNA and adequate hydration); SIADH; alopecia; nausea/vomiting; bladder cancer; sterility; secondary leukemia",contra:"Severe bone marrow suppression; hemorrhagic cystitis; active bleeding",pearl:"MESNA (sodium 2-mercaptoethane sulfonate) MUST be given with ifosfamide and high-dose cyclophosphamide to prevent hemorrhagic cystitis (mesna binds acrolein in bladder); cyclophosphamide is unique alkylating agent with immunosuppressive applications; adequate hydration also required; Fanconi syndrome possible"},
  {name:"cisplatin",system:"Renal",moa:"Forms intrastrand and interstrand DNA cross-links (similar to alkylating agents); inhibits DNA replication; cell cycle non-specific",use:"Cisplatin: testicular, bladder, ovarian, GI, lung cancers; Carboplatin: alternative to cisplatin (less toxic); Oxaliplatin: colorectal cancer (with 5-FU/leucovorin = FOLFOX)",side:"Cisplatin: NEPHROTOXICITY (dose-limiting - prevent with amifostine, hydration), peripheral neuropathy, severe N/V, ototoxicity; Carboplatin: primarily myelosuppression (less nephrotoxicity/neuropathy); Oxaliplatin: peripheral neuropathy (cold-induced - unique), myelosuppression",contra:"Pre-existing renal impairment (cisplatin); severe bone marrow suppression; hearing impairment (cisplatin)",pearl:"Cisplatin: most emetogenic chemo agent - aggressive antiemetic protocol required; amifostine reduces nephrotoxicity; hydrate aggressively; Oxaliplatin: unique cold-induced peripheral neuropathy (advise patients avoid cold food/drinks/cold exposure); Carboplatin: dosed by AUC using Calvert formula"},
  {name:"busulfan",system:"Oncology",moa:"Cross-links DNA strands; prevents DNA replication; cell cycle non-specific; extreme myelosuppressive activity",use:"Bone marrow ablation before hematopoietic stem cell transplant; chronic myelogenous leukemia (CML - historical)",side:"Severe and prolonged myelosuppression (intended therapeutic effect for transplant conditioning); pulmonary fibrosis ('busulfan lung'); hyperpigmentation ('busulfan tan'); hepatic veno-occlusive disease; alopecia; seizures (high dose - premedicate with anticonvulsant)",contra:"Not for general use - only when severe myelosuppression is intended (transplant conditioning)",pearl:"Used to ablate patient's bone marrow before transplant (intended severe myelosuppression); unique side effects: pulmonary fibrosis and hyperpigmentation; prophylactic anticonvulsants required with high-dose IV regimens; seizure risk"},
  {name:"nitrosoureas",system:"Reproductive",moa:"Cross-link DNA; also inhibit DNA repair enzymes; cell cycle non-specific; highly lipophilic = crosses blood-brain barrier",use:"Brain tumors (glioblastoma multiforme - drug of choice class for CNS tumors); Hodgkin lymphoma (carmustine in BCVPP); multiple myeloma",side:"CNS toxicity (convulsions, dizziness, ataxia, encephalopathy); severe delayed myelosuppression (weeks after treatment - unique); pulmonary fibrosis; nausea/vomiting; renal toxicity",contra:"Severe bone marrow suppression; pulmonary disease (relative)",pearl:"Cross BBB (only alkylating agents that do - key for CNS tumors); delayed myelosuppression at 4-6 weeks (later than other agents - unexpected late drop in counts); carmustine wafer (Gliadel) implanted directly in surgical cavity for glioblastoma"},
  {name:"methotrexate",system:"Oncology",moa:"Folic acid analog; competitively inhibits dihydrofolate reductase (DHFR); depletes THF (tetrahydrofolate); inhibits DNA synthesis and cell proliferation; S-phase specific",use:"ALL (acute lymphocytic leukemia); lymphomas; osteosarcoma; breast cancer; ectopic pregnancy; medical abortion; psoriasis; RA; IBD; vasculitis (immunosuppressive uses)",side:"Myelosuppression (neutropenia, thrombocytopenia); mucositis/stomatitis; hepatotoxicity (chronic use); pulmonary fibrosis; nephrotoxicity (high dose); teratogenic (abortifacient)",contra:"Pregnancy; severe renal/hepatic impairment; pleural effusion or ascites (methotrexate pools); active infections",pearl:"LEUCOVORIN (folinic acid) rescue used after high-dose MTX - bypasses DHFR block; also enhances 5-FU effects (leucovorin increases 5-FU binding to thymidylate synthase); MTX toxicity reversed by leucovorin rescue; multiple uses (cancer, autoimmune, ectopic pregnancy); requires monitoring of CBC, LFTs, renal function"},
  {name:"5-fluorouracil",system:"Oncology",moa:"Bioactivated to 5-FdUMP; inhibits thymidylate synthase; depletes dTMP; inhibits DNA synthesis; S-phase specific; leucovorin enhances binding to thymidylate synthase",use:"Colorectal cancer (first-line - FOLFOX, FOLFIRI); pancreatic cancer; basal cell carcinoma (topical - Efudex); actinic keratosis (topical); breast cancer",side:"Myelosuppression; hand-foot syndrome (palmar-plantar erythrodysesthesia - redness, peeling, pain of hands/feet); mucositis; GI toxicity; alopecia; ocular toxicity; cardiotoxicity (coronary vasospasm)",contra:"Dihydropyrimidine dehydrogenase (DPD) deficiency (severe toxicity - fatal); severe bone marrow suppression; pregnancy",pearl:"Hand-foot syndrome is characteristic; DPD enzyme deficiency causes severe/fatal toxicity (genetic testing recommended); leucovorin ENHANCES 5-FU antitumor effect (standard combination); capecitabine (Xeloda) is oral prodrug of 5-FU"},
  {name:"cytarabine",system:"Oncology",moa:"Pyrimidine analog; bioactivated to ara-CTP; inhibits DNA polymerase; causes DNA chain termination; S-phase specific",use:"AML (acute myeloid leukemia - backbone of treatment); ALL; non-Hodgkin lymphoma; intrathecal for CNS prophylaxis in leukemia",side:"Severe myelosuppression (neutropenia, thrombocytopenia, anemia); cerebellar toxicity (high-dose - ataxia, dysarthria - irreversible); conjunctivitis (steroid eye drops for prophylaxis); nausea/vomiting; GI toxicity",contra:"Severe bone marrow suppression; active CNS infection (for intrathecal use)",pearl:"Backbone of AML treatment; cerebellar toxicity with high-dose (monitor for ataxia - may need to stop); conjunctivitis prophylaxis with steroid eye drops during treatment; ara-C syndrome (fever, malaise, myalgias, arthralgia - treat with corticosteroids)"},
  {name:"6-mercaptopurine",system:"Oncology",moa:"Azathioprine is prodrug of 6-MP; 6-MP is a thiol purine analog; inhibits de novo purine synthesis; incorporated into DNA/RNA; S-phase specific; 6-MP metabolized by TPMT",use:"ALL (maintenance); Crohn's disease; ulcerative colitis; rheumatoid arthritis; organ transplant rejection; SLE; autoimmune hepatitis",side:"Myelosuppression; hepatotoxicity; GI toxicity; pancreatitis; opportunistic infections; secondary malignancy (lymphoma)",contra:"CONCURRENT ALLOPURINOL (inhibits xanthine oxidase which metabolizes 6-MP - causes fatal toxicity; reduce 6-MP dose by 75% if must combine); TPMT deficiency (severe toxicity - test before starting)",pearl:"CRITICAL INTERACTION: Allopurinol + 6-MP/azathioprine = severe/fatal bone marrow suppression (allopurinol inhibits XO which is required for 6-MP metabolism); test TPMT enzyme activity before starting (slow metabolizers accumulate toxic levels); dose reduction required in renal impairment"},
  {name:"hydroxyurea",system:"Oncology",moa:"Inhibits ribonucleotide reductase; depletes deoxynucleoside triphosphates; inhibits DNA synthesis; S-phase specific",use:"CML (chronic myeloid leukemia); polycythemia vera; sickle cell disease (reduces HbF - decreases pain crises); essential thrombocythemia; head and neck cancers",side:"Severe myelosuppression (leukopenia, thrombocytopenia); megaloblastic anemia; GI toxicity; leg ulcers; skin changes; teratogenic",contra:"Pregnancy; severe bone marrow suppression",pearl:"Used in sickle cell disease to increase fetal hemoglobin (HbF) - reduces sickling and pain crises; oral administration; causes megaloblastic anemia (not due to B12/folate deficiency); also used to reduce platelet count in essential thrombocythemia"},
  {name:"doxorubicin",system:"Antimicrobials",moa:"Multiple mechanisms: generates free radicals causing DNA strand breaks; intercalates into DNA; inhibits topoisomerase II; cell cycle non-specific",use:"Doxorubicin: solid tumors (breast, ovarian, lung, sarcomas); Hodgkin lymphoma; leukemias; Daunorubicin: AML, ALL",side:"Myelosuppression; DILATED CARDIOMYOPATHY (cumulative dose-dependent - irreversible; dexrazoxane prevents); alopecia; severe vesicant (tissue necrosis on extravasation); red/orange urine (harmless); nausea/vomiting; radiation recall",contra:"Prior cumulative dose limits (doxorubicin max ~450-550 mg/m²); severe cardiac dysfunction; recent MI",pearl:"Dilated cardiomyopathy is cumulative dose-dependent and IRREVERSIBLE - DEXRAZOXANE (iron chelator) given to prevent cardiotoxicity; do NOT exceed cumulative dose limits; liposomal doxorubicin (Doxil) reduces cardiotoxicity; VESICANT - severe tissue damage if extravasated; red discoloration of urine (warn patients)"},
  {name:"bleomycin",system:"Antimicrobials",moa:"Induces free radical formation causing DNA strand breaks; primarily G2/M phase specific; minimal myelosuppression (unique)",use:"Testicular cancer (BEP regimen); Hodgkin lymphoma (ABVD regimen); squamous cell carcinomas",side:"PULMONARY FIBROSIS (dose-limiting, cumulative - most dangerous); skin hyperpigmentation; fever/chills (infusion); Raynaud's phenomenon; minimal myelosuppression (unique - spares bone marrow)",contra:"Cumulative dose limits (generally <400 units lifetime); prior pulmonary fibrosis; high FiO2 (increases pulmonary toxicity - warn anesthesiologists); renal impairment (dose adjust)",pearl:"Unique: minimal myelosuppression (allows combination with myelosuppressive agents without additive marrow toxicity); pulmonary fibrosis is cumulative and irreversible - monitor with PFTs; HIGH FiO2 during surgery INCREASES pulmonary toxicity - alert anesthesiologist/surgeons in bleomycin-treated patients; used in BEP and ABVD regimens"},
  {name:"paclitaxel",system:"Oncology",moa:"Bind to beta-tubulin and hyperstabilize polymerized microtubules; prevent mitotic spindle breakdown; cell cannot complete mitosis; M-phase specific",use:"Ovarian cancer; breast cancer (docetaxel preferred); non-small cell lung cancer; prostate cancer (docetaxel); Kaposi's sarcoma (paclitaxel)",side:"Myelosuppression (neutropenia - dose-limiting); peripheral neuropathy (dose-dependent); hypersensitivity reactions (paclitaxel vehicle Cremophor EL - premedicate with dexamethasone, diphenhydramine, H2-blocker); alopecia; fluid retention (docetaxel - premedicate with dexamethasone)",contra:"Baseline peripheral neuropathy (relative); severe hepatic impairment; hypersensitivity to Cremophor EL vehicle (paclitaxel)",pearl:"Premedicate before paclitaxel (Cremophor EL causes hypersensitivity - use diphenhydramine + dexamethasone + ranitidine); nab-paclitaxel (Abraxane) is albumin-bound formulation (fewer infusion reactions, no Cremophor); docetaxel causes fluid retention (dexamethasone pretreatment reduces); hyperstabilize microtubules (opposite of vinca alkaloids which inhibit polymerization)"},
  {name:"vincristine",system:"Reproductive",moa:"Bind beta-tubulin and inhibit polymerization of tubulin into microtubules; prevent mitotic spindle formation; M-phase specific (opposite of taxanes)",use:"Vincristine: ALL, Hodgkin/non-Hodgkin lymphoma (CHOP regimen), Wilms tumor; Vinblastine: Hodgkin lymphoma (ABVD), testicular cancer, Kaposi's sarcoma",side:"Vincristine: NEUROTOXICITY (peripheral neuropathy, constipation, ileus - dose-limiting; NO significant myelosuppression - unique); Vinblastine: myelosuppression (dose-limiting), less neurotoxicity than vincristine",contra:"NEVER intrathecal (vincristine intrathecal = FATAL); demyelinating neuropathy (relative); ileus (vincristine)",pearl:"Vincristine - NEUROTOXICITY is dose-limiting (NOT bone marrow); constipation/ileus major problem (vincristine = 'viscous'-constipation); FATAL if given intrathecally; vinblastine - myelosuppression is dose-limiting; both prevent spindle formation (INHIBIT polymerization - opposite of taxanes)"},
  {name:"irinotecan",system:"Oncology",moa:"Camptothecin analogs; inhibit topoisomerase I; prevent re-ligation of DNA strand breaks; cause DNA double-strand breaks; cell cycle arrest in S and G2 phases",use:"Irinotecan: colorectal cancer (FOLFIRI); Topotecan: small cell lung cancer, ovarian cancer, cervical cancer",side:"Severe myelosuppression; diarrhea (irinotecan - two types: early cholinergic diarrhea [treat with atropine]; late osmotic diarrhea [treat with loperamide - dose-limiting]); nausea/vomiting; alopecia",contra:"Severe bone marrow suppression; bowel obstruction; prior pelvic radiation (increased toxicity)",pearl:"Irinotecan has DUAL diarrhea mechanism: early (cholinergic within 24hrs - treat with atropine) and late (secretory >24hrs - treat with loperamide; dose-limiting); topotecan requires dose adjustment for renal impairment; UGT1A1 polymorphism increases irinotecan toxicity"},
  {name:"etoposide",system:"Reproductive",moa:"Inhibits topoisomerase II; prevents re-ligation of DNA strand breaks; causes DNA double-strand breaks; G2-phase specific",use:"Testicular cancer (BEP regimen); small cell lung cancer; Hodgkin/non-Hodgkin lymphoma; AML",side:"Myelosuppression (dose-limiting); alopecia; nausea/vomiting; hypotension (infuse slowly); secondary AML/MDS (long-term)",contra:"Severe bone marrow suppression; hypersensitivity to cremophor (IV formulation); severe renal/hepatic impairment",pearl:"Secondary leukemia (AML/MDS) is a long-term complication (characteristic of topoisomerase II inhibitors); infuse slowly to prevent hypotension; oral bioavailability variable; key component of BEP regimen for testicular cancer"},
  {name:"rituximab",system:"Oncology",moa:"Chimeric monoclonal antibody targeting CD20 antigen on B-lymphocytes; depletes B-cells via ADCC, CDC, and direct apoptosis; CD20 expressed on normal and malignant B-cells",use:"Non-Hodgkin B-cell lymphoma; CLL; rheumatoid arthritis; ITP; TTP; multiple sclerosis; ANCA vasculitis; pemphigus vulgaris",side:"Infusion reactions (common - premedicate with acetaminophen, diphenhydramine, methylprednisolone); serious infections; progressive multifocal leukoencephalopathy (PML - JC virus reactivation); hepatitis B reactivation (screen before); tumor lysis syndrome; cardiac arrhythmias",contra:"Active severe infections; hepatitis B without prophylaxis (risk of reactivation); live vaccines",pearl:"Must screen for hepatitis B before use (can cause fatal HBV reactivation - give prophylaxis); PML (JC virus reactivation) is rare but fatal; infusion reactions most common with first infusion - premedicate; 'MABS' (monoclonal antibodies) end in '-mab'; chimeric = '-ximab'; humanized = '-zumab'; fully human = '-umab'"},
  {name:"trastuzumab",system:"Oncology",moa:"Humanized monoclonal antibody targeting HER2 (ErbB2) receptor; inhibits HER2-mediated cell signaling; promotes ADCC; prevents HER2 cleavage",use:"HER2-positive breast cancer; HER2-positive gastric/gastroesophageal junction adenocarcinoma",side:"DILATED CARDIOMYOPATHY (cardiac dysfunction - distinct from anthracyclines: usually reversible); infusion reactions; pulmonary toxicity; diarrhea",contra:"HER2-negative tumors (ineffective); concurrent anthracyclines (additive cardiotoxicity - avoid simultaneous use); pregnancy",pearl:"Only for HER2-positive tumors (requires HER2 testing before use); cardiac toxicity is usually REVERSIBLE (unlike anthracyclines); do NOT give simultaneously with anthracyclines (sequential use); monitor cardiac function (LVEF) regularly; HER2 amplification/overexpression test (FISH or IHC) required"},
  {name:"bevacizumab",system:"Renal",moa:"Humanized monoclonal antibody against VEGF-A; prevents VEGF binding to receptors; inhibits tumor angiogenesis (prevents new blood vessel formation to tumors)",use:"Colorectal cancer; renal cell carcinoma; non-small cell lung cancer; glioblastoma; cervical cancer; angioproliferative retinopathy (ophthalmologic use)",side:"Hemorrhage (significant - all types including GI, intracranial); arterial/venous thromboembolism; impaired wound healing (hold perioperatively); hypertension; proteinuria; GI perforation; reversible posterior leukoencephalopathy syndrome (RPLS)",contra:"Recent surgery (hold 4-6 weeks before/after surgery - impairs wound healing); active hemorrhage; pregnancy",pearl:"Anti-angiogenic agent (not cytotoxic); must hold before/after surgery (wound healing impairment); hemorrhage is serious risk; hypertension management often needed during therapy; GI perforation risk (especially prior abdominal radiation)"},
  {name:"pembrolizumab",system:"Renal",moa:"Humanized monoclonal antibodies targeting PD-1 (programmed death-1) receptor on T-cells; block PD-1/PD-L1 interaction; restore T-cell anti-tumor immune activity",use:"Melanoma; non-small cell lung cancer; renal cell carcinoma; bladder/urothelial carcinoma; head and neck cancer; MSI-high tumors; Hodgkin lymphoma; many others (broad approval)",side:"Immune-related adverse events (irAEs): dermatitis, colitis/diarrhea, hepatitis, pneumonitis, endocrinopathies (hypothyroidism, hypophysitis, adrenal insufficiency), nephritis; rare but severe: myocarditis, neurological toxicity",contra:"Active autoimmune disease (relative); immunosuppressant therapy (reduces efficacy); pregnancy",pearl:"Immune-related adverse events (irAEs) treated with corticosteroids; all organ systems can be affected; endocrinopathies may be permanent (hypothyroidism often requires lifelong levothyroxine); superior outcomes in tumors with high PD-L1 expression or high tumor mutational burden; can be effective years after treatment"},
  {name:"ipilimumab",system:"Oncology",moa:"Fully human monoclonal antibody against CTLA-4 (cytotoxic T-lymphocyte antigen-4); blocks CTLA-4 inhibitory signal; enhances T-cell activation and proliferation; first immune checkpoint inhibitor approved",use:"Melanoma (first FDA-approved immune checkpoint inhibitor); combined with nivolumab for melanoma, RCC, NSCLC, others",side:"High rate of immune-related adverse events (colitis/diarrhea most common; hepatitis; dermatitis; hypophysitis; adrenal insufficiency); more severe irAEs than PD-1 inhibitors; enterocolitis can be severe/fatal",contra:"Active autoimmune disease; systemic corticosteroids at treatment start (reduces efficacy)",pearl:"First immune checkpoint inhibitor approved (2011); higher rate of irAEs than anti-PD-1 agents; colitis is most common serious side effect; combination with nivolumab more effective but significantly more toxicity; high-dose steroids required for severe irAEs"},
  {name:"imatinib",system:"Renal",moa:"Competitive inhibitor of BCR-ABL tyrosine kinase (the product of Philadelphia chromosome t(9;22) translocation); also inhibits c-KIT and PDGFR tyrosine kinases; prevents downstream signaling for proliferation",use:"Chronic myeloid leukemia (CML - Philadelphia chromosome positive - revolutionary treatment); GIST (gastrointestinal stromal tumors - c-KIT mutations); ALL (Ph+)",side:"GI upset (nausea, diarrhea - take with food); edema/fluid retention; myelosuppression; hepatotoxicity; muscle cramps; rash; prolonged QT",contra:"Pregnancy; severe hepatic impairment; concurrent CYP3A4 inducers (decrease imatinib levels)",pearl:"REVOLUTIONARY - changed CML from fatal disease to chronic manageable condition; targets specific molecular defect (BCR-ABL) - first targeted cancer therapy; take with food and large glass of water; GI absorption decreased by antacids (take separately); resistance via BCR-ABL mutations (dasatinib, nilotinib for resistance)"},
  {name:"dexrazoxane",system:"Oncology",moa:"Iron chelator; enters cardiac cells and chelates free iron; prevents anthracycline-iron complex from generating free radicals; prevents anthracycline-induced cardiomyopathy",use:"Prevention of anthracycline-induced cardiomyopathy (doxorubicin/daunorubicin); treatment of extravasation from anthracyclines",side:"Myelosuppression (additive with chemotherapy); hepatotoxicity; secondary malignancies (theoretical concern)",contra:"Not for use at start of doxorubicin therapy (delays until cumulative dose risk); not for non-anthracycline cardiotoxicity",pearl:"Given before anthracycline infusion to protect heart; iron chelator mechanism; also indicated for anthracycline extravasation treatment; does not reduce antitumor efficacy of anthracyclines at recommended doses"},
  {name:"mesna",system:"Reproductive",moa:"Sulfhydryl compound; inactivates acrolein (toxic metabolite of cyclophosphamide and ifosfamide) in the bladder; prevents hemorrhagic cystitis",use:"Prevention of hemorrhagic cystitis from cyclophosphamide and ifosfamide; given with every dose",side:"GI upset; headache; fatigue; bad taste; rare hypersensitivity",contra:"Hypersensitivity to mesna or thiol compounds",pearl:"MUST be given with ifosfamide and high-dose cyclophosphamide; binds acrolein specifically in the bladder (does not interfere with antitumor effect); mesna stands for sodium 2-mercaptoethane sulfonate; inadequate hydration is NOT a substitute for mesna"},
  {name:"leucovorin",system:"GI",moa:"Reduced form of folic acid (5-formyl-THF); bypasses DHFR inhibition by methotrexate; restores THF pools; also enhances 5-FU by stabilizing 5-FdUMP-TS complex",use:"Methotrexate rescue (given after high-dose MTX to limit myelosuppression/mucositis); enhances 5-FU efficacy; folate deficiency",side:"Generally well tolerated; rare allergic reactions; paradoxically can reverse methotrexate antitumor effects if given too early",contra:"Do not give before or simultaneously with methotrexate (reduces efficacy); pernicious anemia (treats folate deficiency but not B12)",pearl:"Given AFTER methotrexate (not before - reduces efficacy); timing is critical; leucovorin rescue must be given within 24-42 hours of high-dose MTX; increases 5-FU efficacy (FOLFOX includes leucovorin); NOT folic acid (different form)"},
  {name:"filgrastim",system:"Reproductive",moa:"Recombinant granulocyte (colony stimulating factor; stimulates neutrophil production, maturation, and function from bone marrow progenitors; reduces duration and severity of neutropenia",use:"Chemotherapy-induced neutropenia (febrile neutropenia prevention and treatment); stem cell mobilization for transplantation; congenital neutropenia; bone marrow transplant",side:"Bone pain (most common); splenomegaly (rare splenic rupture); leukocytosis; injection site reactions; Sweet syndrome",contra:"Not for use in myeloid malignancies receiving chemotherapy (may stimulate tumor cells); 24 hours before or after chemotherapy (reduces efficacy of G-CSF and increases bone marrow toxicity)",pearl:"Must NOT be given within 24 hours of chemotherapy; significantly reduces febrile neutropenia and hospitalizations; bone pain is very common (treat with acetaminophen/NSAID); pegfilgrastim (Neulasta) long-acting form (once per cycle vs daily); risk of splenomegaly with prolonged use"},
  {name:"epoetin alfa",system:"Antivirals",moa:"Recombinant erythropoietin; binds EPO receptor on erythroid progenitors; stimulates red blood cell production; reduces need for transfusions",use:"Chemotherapy-induced anemia; anemia of chronic kidney disease (dialysis and non-dialysis); anemia from MDS, HIV treatment",side:"Thrombotic events (DVT, PE, stroke - BOXED WARNING); hypertension; pure red cell aplasia (rare, with neutralizing antibodies); tumor progression (if used when Hgb >12)",contra:"Uncontrolled hypertension; use only when Hgb <10 g/dL; do not use when cure is likely (may worsen outcomes); malignancy without chemotherapy use",pearl:"Boxed warning: increased thrombotic risk and possible tumor progression; do NOT use when Hgb >12 g/dL; only indicated for chemo-induced anemia (not anemia from malignancy itself); darbepoetin has longer half-life (once weekly or every 2-3 weeks vs 3x/week for epoetin)"},
  {name:"cyclosporine",system:"Renal",moa:"Binds cyclophilin; complex inhibits calcineurin phosphatase; prevents NFAT dephosphorylation and nuclear translocation; blocks IL-2 gene transcription; inhibits T-cell activation",use:"Organ transplant rejection prevention (kidney, heart, liver); psoriasis; rheumatoid arthritis; ulcerative colitis; atopic dermatitis; uveitis",side:"Nephrotoxicity (dose-dependent, major); hypertension; neurotoxicity (tremor, headache, seizures); hirsutism; gingival hyperplasia; hepatotoxicity; hyperlipidemia; hyperkalemia; hypomagnesemia; drug interactions (CYP3A4 substrate)",contra:"Uncontrolled hypertension; renal impairment (relative - monitor carefully); PSORIASIS (avoid with nephrotoxic drugs); concurrent nephrotoxins",pearl:"Narrow therapeutic index - blood level monitoring essential; nephrotoxicity is most significant concern (monitor SCr, BP); gingival hyperplasia (good dental hygiene); hirsutism (hair growth); strong CYP3A4 substrate AND inhibitor; MANY drug interactions; Sandimmune vs Neoral/Gengraf (different formulations - NOT bioequivalent)"},
  {name:"tacrolimus",system:"Renal",moa:"Binds FKBP-12 (FK binding protein); complex inhibits calcineurin; blocks IL-2 gene transcription; inhibits T-cell activation; same end effect as cyclosporine but different binding",use:"Organ transplant rejection (kidney, liver, heart - preferred over cyclosporine); prevention and treatment of acute rejection; atopic dermatitis (topical Protopic); severe rheumatoid arthritis",side:"Nephrotoxicity (similar to cyclosporine); neurotoxicity (tremor, headache - more than cyclosporine); NEW ONSET DIABETES (higher than cyclosporine); hypertension; hyperkalemia; GI toxicity; infections; lymphoma (especially with excessive immunosuppression)",contra:"Concurrent use with cyclosporine (avoid - synergistic nephrotoxicity); hypersensitivity to polyoxyl 60 hydrogenated castor oil (IV formulation); pregnancy",pearl:"Preferred calcineurin inhibitor for most transplant types; HIGHER risk of new-onset diabetes than cyclosporine; less hirsutism and gingival hyperplasia than cyclosporine; narrow therapeutic index - monitor blood levels; topical form for atopic dermatitis (boxed warning for malignancy - use for minimum time)"},
  {name:"sirolimus",system:"Cardiovascular",moa:"Binds FKBP-12; complex inhibits mTOR (mammalian target of rapamycin); blocks cell cycle progression (G1 to S phase); inhibits IL-2-mediated T-cell proliferation (downstream of IL-2 signaling, unlike calcineurin inhibitors)",use:"Renal transplant rejection prevention (combination with calcineurin inhibitors or corticosteroids); lymphangioleiomyomatosis; cardiac stent coating (anti-restenosis)",side:"Hyperlipidemia (triglycerides, cholesterol); impaired wound healing (avoid in early post-transplant period - wound complications); myelosuppression; proteinuria; mouth sores; interstitial pneumonitis; NO nephrotoxicity (significant advantage)",contra:"Concurrent strong CYP3A4 inhibitors (increase sirolimus levels dramatically); immediately post-transplant surgery (impairs wound healing); hypersensitivity",pearl:"NOT a calcineurin inhibitor (different MOA - mTOR inhibition); NO nephrotoxicity (major advantage over cyclosporine/tacrolimus); causes significant hyperlipidemia; impairs wound healing (avoid in early post-transplant or use with caution); same drug class as everolimus; coats cardiac stents to prevent restenosis"},
  {name:"mycophenolate mofetil",system:"Renal",moa:"Prodrug converted to mycophenolic acid (MPA); MPA inhibits inosine monophosphate dehydrogenase (IMPDH); depletes guanosine nucleotides; selectively inhibits lymphocyte (T and B cell) proliferation (lymphocytes depend on de novo purine synthesis)",use:"Transplant rejection prevention (kidney, heart, liver - with calcineurin inhibitor and steroids); lupus nephritis; IgA nephropathy; vasculitis",side:"GI toxicity (diarrhea, nausea, abdominal pain - most common); myelosuppression (leukopenia, anemia); infections; teratogenic (BOXED WARNING - avoid in pregnancy); lymphoma risk",contra:"Pregnancy (teratogenic - effective contraception required); hypersensitivity; breastfeeding",pearl:"Selective lymphocyte suppression (lymphocytes lack salvage pathway for purines, unlike other cells); GI side effects common but may be managed with EC-MPS (enteric-coated formulation); teratogenic - mandatory negative pregnancy test and contraception; check CBC regularly for myelosuppression"},
  {name:"corticosteroids",system:"Pulmonary",moa:"Bind glucocorticoid receptor (cytosolic); receptor-drug complex translocates to nucleus; alters gene transcription; decreases cytokine production (IL-1, IL-2, IL-6, TNF-alpha); reduces inflammation and immune response; broad lymphotoxic effects",use:"Transplant rejection prevention and treatment; autoimmune diseases (RA, SLE, IBD, vasculitis, MS); asthma; COPD exacerbations; anaphylaxis; adrenal insufficiency; cerebral edema; anti-inflammatory; immunosuppression",side:"Hyperglycemia; hypertension; osteoporosis; immunosuppression (infections); Cushing syndrome (moon face, buffalo hump, striae); weight gain; fluid retention; peptic ulcers; cataracts; avascular necrosis; adrenal suppression; psychosis; growth suppression (children)",contra:"Active untreated infections (relative); live vaccines; systemic fungal infections",pearl:"Mainstay of many immunosuppressive regimens; taper slowly after prolonged use (adrenal suppression - avoid abrupt withdrawal); prophylactic PPIs for GI protection; calcium + vitamin D supplementation for bone protection; monitor glucose, BP; steroid burst for acute rejection episodes"},
  {name:"muromonab-cd3",system:"Renal",moa:"Murine monoclonal antibody against CD3 antigen on T-lymphocytes; blocks T-cell receptor signaling; causes T-cell depletion; primarily used for acute rejection",use:"Acute organ transplant rejection (salvage therapy when steroids fail); historically important (first therapeutic monoclonal antibody approved)",side:"Cytokine release syndrome (severe - fever, chills, hypotension, bronchospasm - initial doses); cerebral edema; pulmonary edema; opportunistic infections; lymphoma (EBV-associated)",contra:"Uncompensated fluid overload; fever (relative - wait until controlled); murine protein allergy; pregnancy",pearl:"First FDA-approved therapeutic monoclonal antibody (1986); causes cytokine storm on first doses (premedicate); largely replaced by better-tolerated agents; murine antibody - significant immunogenicity; historical importance"},
  {name:"rho",system:"Immunology",moa:"Passive antibody against Rh(D) antigen on fetal red blood cells; administered to Rh-negative mothers; prevents maternal sensitization to Rh(D) positive fetal blood cells; prevents hemolytic disease of the newborn in future pregnancies",use:"Prevention of Rh(D) isoimmunization in Rh-negative mothers with Rh-positive baby or pregnancy; immune thrombocytopenic purpura (ITP) in Rh-positive patients",side:"Local injection site reactions; mild fever; headache; rare hemolytic anemia (ITP use - hemolysis of Rh-positive RBCs); intravascular hemolysis (rare, serious)",contra:"Rh(D)-positive individuals; IgA deficiency (hypersensitivity risk); hemolytic anemia",pearl:"Given at 28 weeks gestation and within 72 hours of delivery to Rh-negative mothers; prevents erythroblastosis fetalis in subsequent pregnancies; must confirm Rh status before administration; also used for ITP (IV RhIG causes mild hemolysis which occupies Fc receptors on macrophages - sparing platelets)"},
  {name:"infliximab",system:"Musculoskeletal",moa:"Monoclonal antibodies against tumor necrosis factor-alpha (TNF-α); neutralize soluble and membrane-bound TNF; block TNF binding to receptors; reduce inflammation",use:"Rheumatoid arthritis; Crohn's disease; ulcerative colitis; ankylosing spondylitis; psoriatic arthritis; plaque psoriasis; uveitis",side:"Serious infections (reactivation of latent TB - BOXED WARNING - screen with PPD/IGRA before starting); hepatitis B reactivation; fungal infections; infusion reactions (infliximab); injection site reactions (adalimumab); lupus-like syndrome; demyelinating disorders; lymphoma",contra:"Active TB or untreated latent TB (must treat LTBI before starting); active serious infections; heart failure (relative - avoid in moderate-severe CHF); demyelinating disease",pearl:"MUST screen for latent TB (PPD or IGRA) and hepatitis B before starting; treat LTBI for 1+ month before anti-TNF; infliximab is chimeric (IV infusion); adalimumab is fully human (subcutaneous); yearly TB testing recommended; monitor for infections; do not give live vaccines during therapy"},
  {name:"etanercept",system:"Musculoskeletal",moa:"Fusion protein containing soluble TNF receptor p75 linked to Fc portion of IgG1; binds and neutralizes soluble and membrane-bound TNF-alpha and TNF-beta (lymphotoxin); decoy receptor",use:"Rheumatoid arthritis; psoriatic arthritis; ankylosing spondylitis; plaque psoriasis; juvenile idiopathic arthritis",side:"Injection site reactions; serious infections; latent TB reactivation (less risk than infliximab); lymphoma; demyelinating disorders",contra:"Active infections; active TB or untreated LTBI; heart failure (relative); demyelinating disease",pearl:"Lower TB reactivation risk than anti-TNF antibodies (does not bind lymphotoxin as effectively); NOT effective for inflammatory bowel disease (infliximab preferred for IBD); subcutaneous injection; weekly or twice-weekly dosing"},
  {name:"iron",system:"Hematology",moa:"Provides elemental iron for hemoglobin synthesis; iron is incorporated into heme of hemoglobin; restores iron stores in deficient patients",use:"Iron deficiency anemia; prevention of iron deficiency in pregnancy; restless leg syndrome; iron deficiency without anemia",side:"GI upset (nausea, constipation, dark stools); GI irritation (take with food but less absorption); IV iron: anaphylaxis/hypersensitivity reactions (low-molecular-weight iron dextran has highest risk); iron overload",contra:"Non-iron deficiency anemia; hemochromatosis; hemolytic anemia; concurrent tetracyclines or fluoroquinolones (chelation - reduced absorption of both)",pearl:"Oral absorption enhanced by vitamin C (acidic environment); avoid with tetracyclines, fluoroquinolones, antacids (chelation reduces absorption); dark/black stools (harmless - warn patients); IV iron for patients who cannot tolerate oral or malabsorption; reticulocytosis occurs within 1-2 weeks of therapy; most common cause of iron deficiency is blood loss (find the source)"},
  {name:"folic acid",system:"Reproductive",moa:"Converted to tetrahydrofolate (THF); essential cofactor for DNA synthesis (thymidylate synthesis); required for normal red blood cell maturation and neural tube development",use:"Folate deficiency anemia (megaloblastic); pregnancy prophylaxis (neural tube defect prevention); methotrexate supplementation; hemolytic anemia prophylaxis (high turnover)",side:"Generally well tolerated at therapeutic doses; high doses may mask vitamin B12 deficiency (treats anemia but not neurological damage from B12 deficiency)",contra:"Must first rule out B12 deficiency before treating megaloblastic anemia with folate alone (may worsen neurological effects of B12 deficiency by correcting anemia while subacute combined degeneration progresses)",pearl:"All women of childbearing age should take folic acid 400-800 mcg daily (neural tube defect prevention); distinguish folate deficiency anemia from B12 deficiency (both cause megaloblastic anemia but B12 deficiency also causes neurological damage); giving folate to B12-deficient patient treats anemia but worsens neuropathy"},
  {name:"cyanocobalamin",system:"Reproductive",moa:"Essential cofactor for DNA synthesis (with folate) and myelin formation; required for conversion of methylmalonyl-CoA to succinyl-CoA and homocysteine to methionine; absorbed via intrinsic factor in terminal ileum",use:"Vitamin B12 deficiency anemia (pernicious anemia - requires IM/SC due to intrinsic factor deficiency); megaloblastic anemia; subacute combined degeneration of spinal cord; strict veganism",side:"Hypersensitivity reactions (rare; IM form - contains cobalt); polycythemia (rapid cell production on correction); hypokalemia (rapid cell division consumes K+)",contra:"Leber's hereditary optic neuropathy (cyanocobalamin can worsen vision loss); cobalt allergy",pearl:"Pernicious anemia requires IM/SC injection (lack of intrinsic factor prevents oral absorption); subacute combined degeneration (SCD) of spinal cord - neurological symptoms; correct B12 FIRST before correcting folate deficiency; watch for hypokalemia during treatment (rapid cell division); hydroxocobalamin preferred in UK (less frequent dosing)"},
