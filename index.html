  {name:"hydroxyurea",system:"Oncology",moa:"Inhibits ribonucleotide reductase; increases fetal hemoglobin (HbF) production; HbF inhibits sickling of HbS; also reduces WBC and platelet count (decreases blood viscosity and vaso-occlusion)",use:"Sickle cell disease (reduces pain crises, acute chest syndrome, hospitalizations); CML; polycythemia vera; essential thrombocythemia",side:"Myelosuppression; megaloblastic anemia; GI toxicity; leg ulcers; skin/nail changes; teratogenic",contra:"Pregnancy; severe bone marrow suppression; hypersensitivity",pearl:"FDA-approved for sickle cell disease; reduces frequency of painful crises by 50%; increases HbF (prevents polymerization of HbS); monitor CBC regularly (dose adjust to maintain mild myelosuppression); takes weeks-months for full effect"},
  {name:"erythropoietin",system:"Antivirals",moa:"Recombinant human erythropoietin; binds EPO receptor on erythroid progenitors in bone marrow; stimulates proliferation, differentiation, and maturation of red blood cell precursors",use:"Anemia of chronic kidney disease (CKD); chemotherapy-induced anemia; anemia from HIV (zidovudine therapy); anemia from MDS",side:"Hypertension (most common - manage aggressively); thrombosis (DVT, stroke - BOXED WARNING); pure red cell aplasia (rare - neutralizing antibodies); tumor progression (BOXED WARNING); headache; injection site reactions",contra:"Uncontrolled hypertension; use only if Hgb <10 g/dL; active malignancy without chemotherapy (increases mortality); history of pure red cell aplasia",pearl:"Boxed warnings: increased thrombotic risk and possible tumor progression; do NOT target Hgb >12 g/dL; must have adequate iron stores for response (check iron levels - supplement if needed); darbepoetin has longer half-life (less frequent dosing)"},
  {name:"desmopressin",system:"Endocrine",moa:"Synthetic analog of vasopressin (ADH); stimulates release of stored von Willebrand factor (vWF) and Factor VIII from endothelial cells; increases platelet adhesion and primary hemostasis",use:"Mild hemophilia A (raises Factor VIII levels); von Willebrand disease (type 1); platelet dysfunction; central diabetes insipidus; nocturnal enuresis; mild uremic bleeding",side:"Hyponatremia (water retention - serious especially in children with enuresis); flushing; headache; tachycardia; hypotension; nausea",contra:"Type 2B von Willebrand disease (stimulates platelet aggregation - may worsen thrombocytopenia); severe renal impairment; hyponatremia; cardiovascular disease (relative)",pearl:"Non-blood product option for mild hemophilia A and type 1 vWD; stimulates RELEASE of existing Factor VIII and vWF (does not synthesize new); tachyphylaxis occurs with repeated doses (factor stores become depleted); monitor sodium carefully (hyponatremia risk especially in children); intranasal form for enuresis and DI"},
  {name:"heparin",system:"Cardiovascular",moa:"Binds and activates antithrombin III (ATIII); AT-III:heparin complex inhibits thrombin (IIa) and factor Xa (and other factors); prevents fibrin clot formation; does NOT dissolve existing clots",use:"DVT/PE treatment and prophylaxis; ACS (NSTEMI, STEMI); atrial fibrillation; arterial embolism; bridging therapy; hemodialysis anticoagulation",side:"Hemorrhage (most common/serious); Heparin-Induced Thrombocytopenia (HIT - Type I: mild, benign; Type II: immune-mediated, paradoxical thrombosis, life-threatening); osteoporosis (long-term); hypoaldosteronism (hyperkalemia)",contra:"Active bleeding; HIT history; severe thrombocytopenia; recent CNS surgery; hypersensitivity",pearl:"Antidote: PROTAMINE SULFATE (1mg protamine per 100 units heparin); HIT Type II is paradoxical - thrombocytopenia + thrombosis (not bleeding) - STOP heparin immediately; use direct thrombin inhibitor (argatroban, bivalirudin) for HIT; monitor aPTT or anti-Xa levels; NOT orally absorbed (IV/SC only)"},
  {name:"low molecular weight heparins",system:"Cardiovascular",moa:"Derived from unfractionated heparin; activates antithrombin III; primarily inhibits Factor Xa (anti-Xa:anti-IIa ratio ~3-4:1); more predictable pharmacokinetics than unfractionated heparin",use:"DVT/PE prevention and treatment; ACS treatment; bridging therapy during warfarin initiation; pregnancy anticoagulation (preferred over warfarin)",side:"Bleeding; HIT (lower incidence than UFH - but still possible); injection site hematoma; osteoporosis (less than UFH); elevated transaminases",contra:"HIT history (cross-reactivity with UFH antibodies - avoid); active major bleeding; severe renal impairment (accumulates - enoxaparin); recent spinal/epidural anesthesia (spinal hematoma risk)",pearl:"Advantages over UFH: predictable dosing (weight-based, no routine monitoring needed), once or twice daily SC injection, lower HIT incidence; anti-Xa levels used to monitor in renal failure/extreme obesity/pregnancy; partial reversal with protamine (reverses ~60-80% of anti-Xa activity); PREFERRED in pregnancy over warfarin (does not cross placenta)"},
  {name:"fondaparinux",system:"Cardiovascular",moa:"Synthetic pentasaccharide; selectively binds antithrombin III; specifically inhibits Factor Xa ONLY (no anti-IIa activity); cannot cause HIT (does not bind PF4)",use:"DVT/PE prevention and treatment; ACS; HIT (alternative agent - does not cause HIT)",side:"Bleeding; thrombocytopenia (rare but does not cause HIT); injection site reactions; renal accumulation",contra:"Severe renal impairment (CrCl <30 mL/min - significant accumulation); body weight <50 kg (increased bleeding risk); active major bleeding",pearl:"Does NOT cause HIT (different binding to PF4 than heparin); once-daily subcutaneous injection; NO antidote (protamine does NOT reverse fondaparinux - consider rFVIIa or activated charcoal if massive hemorrhage); renal dose restriction; useful in patients with history of HIT"},
  {name:"warfarin",system:"Cardiovascular",moa:"Inhibits vitamin K epoxide reductase (VKOR); prevents regeneration of active vitamin K; depletes Factors II, VII, IX, X (vitamin K-dependent); also depletes Proteins C and S (anticoagulants); takes days for effect (must deplete existing factors)",use:"Atrial fibrillation (stroke prevention); DVT/PE treatment; mechanical heart valve anticoagulation; venous thromboembolism prevention",side:"Hemorrhage (most serious); warfarin-induced skin necrosis (Protein C deficiency at initiation); 'purple toe syndrome'; teratogenic (Category X - especially 1st trimester - fetal warfarin syndrome)",contra:"Pregnancy (fetal warfarin syndrome, fetal hemorrhage - Category X); active bleeding; recent CNS surgery; hypersensitivity; non-compliant patients",pearl:"Monitor INR; therapeutic range usually 2-3 (2.5-3.5 for mechanical valves); MANY drug interactions (FAB-4: Fluconazole, Amiodarone, Bactrim, Flagyl - all increase INR); vitamin K reverses effect (hours); antidote: Vitamin K + FFP/4-factor PCC for urgent reversal; andexanet alfa for factor Xa; overlapping with heparin at initiation (first 5 days - Protein C drops first causing hypercoagulable state)"},
  {name:"rivaroxaban",system:"Cardiovascular",moa:"Directly inhibit Factor Xa without requiring antithrombin III; prevent conversion of prothrombin to thrombin; prevent clot formation",use:"DVT/PE prevention and treatment; atrial fibrillation (stroke prevention); post-orthopedic surgery prophylaxis",side:"Bleeding (major concern); GI upset (rivaroxaban, edoxaban); no HIT risk; no routine monitoring needed",contra:"Severe renal impairment (CrCl <15-30 mL/min depending on agent); severe hepatic impairment; mechanical heart valves (NOT effective); active bleeding; pregnancy",pearl:"Advantages over warfarin: no routine INR monitoring, fewer drug/food interactions, predictable dosing; Antidote: Andexanet alfa (Andexxa) - recombinant factor Xa decoy; rivaroxaban taken with FOOD (increases absorption); apixaban has least renal dependence; NOT for mechanical heart valves; all are oral"},
  {name:"dabigatran",system:"Cardiovascular",moa:"Direct, reversible inhibitor of thrombin (Factor IIa); inhibits both free thrombin and fibrin-bound thrombin; no antithrombin III required",use:"Atrial fibrillation (stroke prevention); DVT/PE treatment and prevention; post-orthopedic surgery prophylaxis",side:"Bleeding; GI side effects (dyspepsia, GI bleeding - common - higher than warfarin); no HIT risk; must store in original bottle (moisture sensitive)",contra:"Severe renal impairment (CrCl <15 mL/min - major renal excretion); mechanical heart valves; active bleeding; severe hepatic impairment",pearl:"ONLY oral direct thrombin inhibitor; specific antidote: IDARUCIZUMAB (Praxbind) - monoclonal antibody fragment; unique GI side effects (dyspepsia - take with food); highly renally excreted (80%) - dose reduce in renal impairment; must take twice daily; cannot crush capsules; moisture sensitive (keep in original bottle)"},
  {name:"argatroban",system:"Cardiovascular",moa:"Directly and reversibly inhibit thrombin (Factor IIa); inhibit free and clot-bound thrombin; do not require antithrombin III; do not cross-react with HIT antibodies",use:"Heparin-Induced Thrombocytopenia (HIT) - drug of choice; percutaneous coronary intervention (bivalirudin); ACS",side:"Bleeding; elevated LFTs (argatroban - hepatic metabolism, affects INR calculation when transitioning to warfarin); thrombocytopenia (rare)",contra:"Active major bleeding; severe hepatic impairment (argatroban); severe renal impairment (bivalirudin)",pearl:"DRUG OF CHOICE for HIT treatment (do not use heparin or LMWH in HIT); argatroban hepatically metabolized (dose adjust in liver failure, safe in renal failure); bivalirudin renally metabolized (preferred in liver failure); argatroban increases INR (complicates warfarin transition); no antidote (half-lives are short)"},
  {name:"alteplase",system:"Cardiovascular",moa:"Recombinant tissue plasminogen activator; converts plasminogen to plasmin; plasmin degrades fibrin in existing clots; dissolves thrombus; does NOT prevent new clot formation",use:"Ischemic stroke (within 4.5 hours of symptom onset); massive PE with hemodynamic compromise; STEMI (when cath lab unavailable); catheter-directed thrombolysis for DVT",side:"Hemorrhage (intracranial hemorrhage - most feared); reperfusion injury; hypotension (streptokinase); allergic reactions (streptokinase)",contra:"Recent surgery/trauma; active internal bleeding; intracranial hemorrhage; bleeding disorders; uncontrolled hypertension; previous stroke; GI bleeding within 3 months",pearl:"Breaks down EXISTING clots (unlike heparin/warfarin which prevent new clot formation); intracranial hemorrhage is the most serious complication (~6% in stroke); strict contraindication criteria must be checked; tenecteplase is single-bolus (simpler administration); alteplase for ischemic stroke has 4.5 hour time window from symptom onset"},
  {name:"aspirin",system:"Cardiovascular",moa:"Irreversibly acetylates and inhibits COX-1 in platelets; prevents thromboxane A2 (TXA2) synthesis; TXA2 causes platelet aggregation and vasoconstriction; antiplatelet effect lasts 7-10 days (platelet lifetime)",use:"Secondary prevention of MI and stroke; primary prevention (high-risk patients); ACS; post-PCI (with P2Y12 inhibitor - DAPT); atrial fibrillation; Kawasaki disease (anti-inflammatory dose + antiplatelet)",side:"GI ulceration/bleeding; hemorrhage; Reye syndrome (children with viral illness - avoid); tinnitus/salicylism (high doses); aspirin-exacerbated respiratory disease",contra:"Children <16 with viral illness; active GI bleeding; allergy; aspirin-exacerbated respiratory disease; concurrent use with other NSAIDs (reduces antiplatelet effect if timed incorrectly with ibuprofen)",pearl:"Low-dose (81mg) for antiplatelet; irreversible inhibition means effect lasts platelet lifetime (~10 days); ibuprofen can competitively block aspirin's irreversible COX-1 inhibition if taken before aspirin (dose timing matters); give aspirin 2 hours before ibuprofen to prevent interference; loading dose 162-325mg for ACS"},
  {name:"clopidogrel",system:"Cardiovascular",moa:"Prodrug; bioactivated by CYP2C19 to active thiol metabolite; irreversibly inhibits P2Y12 ADP receptor on platelets; prevents ADP-mediated platelet aggregation; antiplatelet effect lasts 7-10 days",use:"ACS (NSTEMI, STEMI) with aspirin (DAPT); post-PCI/stent; peripheral arterial disease; stroke/TIA prevention; alternative when aspirin contraindicated",side:"Bleeding; GI upset; thrombotic thrombocytopenic purpura (TTP - rare but serious); rash",contra:"Active pathological bleeding; hypersensitivity; CYP2C19 poor metabolizers (reduced efficacy - genetic testing recommended); concurrent strong CYP2C19 inhibitors (omeprazole, esomeprazole reduce activation)",pearl:"PRODRUG requiring CYP2C19 activation - up to 30% of patients are poor metabolizers (reduced efficacy); use pantoprazole or famotidine (not omeprazole) for GI protection (less CYP2C19 inhibition); hold 5-7 days before surgery; DAPT (aspirin + clopidogrel) standard after coronary stenting; prasugrel and ticagrelor more potent alternatives"},
  {name:"prasugrel",system:"Cardiovascular",moa:"Prodrug; more efficiently bioactivated than clopidogrel (CYP-dependent but more complete); irreversibly inhibits P2Y12 ADP receptor on platelets; faster onset and more potent than clopidogrel",use:"ACS managed with PCI (with aspirin - DAPT); superior to clopidogrel in ACS with stenting",side:"Bleeding (HIGHER than clopidogrel - BOXED WARNING); TTP (rare); hypersensitivity",contra:"Prior stroke or TIA (BOXED WARNING - net harm; increased intracranial hemorrhage); age ≥75 (generally not recommended - increased bleeding risk); weight <60kg (relative); active bleeding",pearl:"CONTRAINDICATED in patients with prior stroke/TIA (increased intracranial hemorrhage risk); more potent than clopidogrel (better outcomes in ACS-PCI, but more bleeding); does not require CYP2C19 activation (unlike clopidogrel - works in poor metabolizers); hold 7 days before surgery; avoid in elderly (≥75) unless high-risk diabetes/prior MI"},
  {name:"ticagrelor",system:"Cardiovascular",moa:"REVERSIBLE, direct-acting (not prodrug) inhibitor of P2Y12 ADP receptor; does NOT require hepatic bioactivation; faster onset and more potent than clopidogrel",use:"ACS (NSTEMI, STEMI) with aspirin (preferred over clopidogrel for ACS); prevention of cardiovascular events in high-risk patients with CAD",side:"Bleeding (more than clopidogrel); dyspnea (adenosine-mediated - common, not due to pulmonary disease); bradycardia; ventricular pauses (Holter monitoring reveals); headache",contra:"Intracranial hemorrhage history; active pathological bleeding; severe hepatic impairment; concurrent strong CYP3A4 inhibitors or inducers; HIGH-DOSE aspirin (>100mg - reduces ticagrelor efficacy; use LOW-DOSE aspirin only)",pearl:"Reversible P2Y12 inhibitor (unlike clopidogrel/prasugrel); NOT a prodrug (active directly - works regardless of CYP2C19 status); REVERSIBLE = shorter hold time before surgery (5 days); dyspnea is unique side effect (adenosine-related, usually resolves); LOW-dose aspirin ONLY when combined (high-dose aspirin reduces ticagrelor efficacy - unique interaction); twice daily dosing"},
  {name:"abciximab",system:"Cardiovascular",moa:"Block GPIIb/IIIa receptor (fibrinogen receptor) on platelets; prevent fibrinogen binding; block final common pathway of platelet aggregation regardless of stimulus (most potent platelet inhibitors)",use:"ACS (NSTEMI, unstable angina) with PCI; prevention of thrombotic complications during PCI; high-risk coronary intervention",side:"Bleeding (major concern); thrombocytopenia (abciximab - immune-mediated within 24 hours); hypersensitivity",contra:"Active bleeding; recent stroke; severe hypertension; recent surgery; platelet count <100,000; concurrent thrombolytics",pearl:"Most potent antiplatelet agents; IV only (perioperative use); abciximab is monoclonal antibody (irreversible binding, longer effect); eptifibatide and tirofiban are small molecules (reversible, shorter effect - preferred if surgery anticipated); thrombocytopenia can be severe with abciximab (check platelet count within 2-4 hours of first dose); largely replaced by potent oral P2Y12 inhibitors for ACS"},
  {name:"dipyridamole",system:"Cardiovascular",moa:"Inhibits phosphodiesterase (increases cAMP); inhibits adenosine reuptake (increases adenosine); elevated cAMP and adenosine inhibit platelet activation; also coronary vasodilation",use:"Stroke/TIA prevention (combined with aspirin - Aggrenox); cardiac stress testing (pharmacological vasodilation); prosthetic heart valve anticoagulation adjunct",side:"Vasodilation (headache, flushing, dizziness); exacerbation of angina (coronary steal - use with caution in CAD); GI upset; palpitations",contra:"Hypotension; CAD (can cause coronary steal during stress testing); recent MI",pearl:"Aggrenox = aspirin 25mg + extended-release dipyridamole 200mg (twice daily for stroke prevention); used as vasodilatory stress agent for cardiac stress testing (increases coronary blood flow); theophylline/caffeine reverse dipyridamole's vasodilatory effect (used to stop dipyridamole stress test); antidote to pharmacological stress testing: aminophylline"},
  {name:"cilostazol",system:"Cardiovascular",moa:"Phosphodiesterase-3 (PDE-3) inhibitor; increases cAMP in platelets AND vascular smooth muscle; inhibits platelet aggregation and causes vasodilation; improves walking distance in PAD",use:"Peripheral arterial disease (claudication - reduces symptoms); prevention of stroke/TIA",side:"Headache (most common); palpitations; tachycardia; diarrhea; dizziness",contra:"Heart failure (CONTRAINDICATED - PDE inhibitors increase mortality in HF); severe hepatic impairment; active bleeding",pearl:"CONTRAINDICATED in heart failure (all PDE inhibitors increase mortality in CHF - similar to milrinone); significantly improves walking distance in claudication; vasodilatory effects beneficial in PAD; avoid grapefruit (CYP3A4 inhibition increases levels); take on empty stomach (increases absorption)"},
  {name:"succinylcholine",system:"Musculoskeletal",moa:"Nicotinic acetylcholine receptor agonist at neuromuscular junction; causes depolarization (fasciculations); does not detach rapidly = sustained depolarization = paralysis (Phase I block); unique: cannot be reversed pharmacologically",use:"Rapid sequence intubation (RSI) - drug of choice; short procedures requiring neuromuscular blockade",side:"Hyperkalemia (DANGEROUS in burns, crush injury, denervation, prolonged immobility, rhabdomyolysis - can cause fatal cardiac arrest); malignant hyperthermia (trigger); bradycardia (especially pediatric patients); fasciculations; increased ICP, IOP, intragastric pressure; myalgias post-procedure; prolonged paralysis in pseudocholinesterase deficiency",contra:"Burns, crush injury, denervation injuries, prolonged immobilization, neuromuscular disease (hyperkalemia risk); personal or family history of malignant hyperthermia; pseudocholinesterase deficiency; penetrating eye injury (increases IOP); hypersensitivity",pearl:"FASTEST onset of any NMB agent (45-60 sec); SHORTEST duration (8-10 min); drug of choice for RSI when rapid intubation needed; CANNOT be pharmacologically reversed (wait for spontaneous recovery or use sugammadex for specific reversal); malignant hyperthermia trigger (treat with dantrolene); dibucaine number tests for pseudocholinesterase deficiency; contraindicated in most ICU patients >24 hours (upregulation of nAChR = hyperkalemia risk)"},
  {name:"rocuronium",system:"Musculoskeletal",moa:"Competitive antagonists at nicotinic acetylcholine receptors at neuromuscular junction; block ACh binding; prevent depolarization; can be reversed pharmacologically",use:"Endotracheal intubation; surgical muscle relaxation; mechanical ventilation; RSI (rocuronium high-dose as alternative to succinylcholine)",side:"Prolonged paralysis; histamine release (rocuronium - less than pancuronium); tachycardia (rocuronium); no significant cardiovascular effects (vecuronium)",contra:"Hypersensitivity; use with caution in myasthenia gravis, Lambert-Eaton syndrome (increased sensitivity); concurrent aminoglycosides (enhanced blockade)",pearl:"Reversed by SUGAMMADEX (Bridion) - encapsulates rocuronium/vecuronium - rapid complete reversal; or neostigmine (acetylcholinesterase inhibitor - must pair with anticholinergic to prevent muscarinic effects); high-dose rocuronium (1.2mg/kg) can replace succinylcholine for RSI (slower onset but no hyperkalemia risk); vecuronium has no cardiovascular effects"},
  {name:"sugammadex",system:"Musculoskeletal",moa:"Modified gamma-cyclodextrin; encapsulates rocuronium and vecuronium molecules; forms tight inclusion complex; rapidly removes NMB agents from neuromuscular junction; allows complete reversal even from deep block",use:"Reversal of rocuronium and vecuronium-induced neuromuscular blockade; emergency reversal (can reverse even very deep block within 3 minutes with high dose)",side:"Hypersensitivity reactions; bradycardia; may reduce efficacy of hormonal contraceptives (use additional non-hormonal contraception for 7 days)",contra:"Hypersensitivity to sugammadex; use with caution in severe renal impairment (complex accumulates); not effective for succinylcholine reversal",pearl:"Game-changer for NMB reversal - faster and more complete than neostigmine; specifically reverses rocuronium and vecuronium (NOT succinylcholine or cisatracurium); advise patients on hormonal contraceptives to use backup method for 7 days; high dose for emergency reversal (16mg/kg); recurrence of NMB possible if sugammadex effect wears off before rocuronium"},
  {name:"neostigmine",system:"Reproductive",moa:"Inhibit acetylcholinesterase enzyme; prevent breakdown of ACh at neuromuscular junction; increase ACh concentration; competitive antagonist at neuromuscular junction is outcompeted; ALSO increases muscarinic effects (bradycardia, salivation, bronchoconstriction)",use:"Reversal of non-depolarizing NMB (neostigmine); myasthenia gravis treatment (pyridostigmine - long-term); postoperative ileus/urinary retention (neostigmine)",side:"Muscarinic side effects: bradycardia, hypotension, increased secretions, bronchospasm, GI cramping, urinary urgency, miosis (SLUDGE: Salivation, Lacrimation, Urination, Defecation, GI distress, Emesis)",contra:"Concurrent with depolarizing NMBs (enhances succinylcholine - prolongs block); intestinal/urinary obstruction (promotes motility/contraction)",pearl:"ALWAYS give with anticholinergic (atropine or glycopyrrolate) to prevent muscarinic side effects when used for NMB reversal; glycopyrrolate preferred (does not cross BBB - fewer CNS effects); pyridostigmine is drug of choice for myasthenia gravis (longer-acting than neostigmine); neostigmine cannot fully reverse deep NMB (use sugammadex for deep block)"},
  {name:"baclofen",system:"Reproductive",moa:"Agonist at GABA-B receptors in spinal cord; inhibits release of excitatory neurotransmitters; reduces muscle tone and spasm; also inhibits mono- and polysynaptic spinal reflexes",use:"Spasticity (multiple sclerosis, spinal cord injury, cerebral palsy); alcohol use disorder (off-label - reduces craving); intrathecal pump for severe spasticity",side:"Sedation; muscle weakness; dizziness; GI upset; urinary retention; SEVERE WITHDRAWAL if abruptly stopped (hallucinations, seizures, hyperthermia, rhabdomyolysis - potentially fatal)",contra:"Abrupt discontinuation (taper ALWAYS); epilepsy (can lower seizure threshold); stroke (may worsen neurological recovery)",pearl:"Drug of choice for spasticity from spinal cord lesions (MS, SCI); NEVER abruptly stop (severe withdrawal = hallucinations, seizures, hyperthermia - can be fatal); taper slowly; intrathecal baclofen pump for severe refractory spasticity (delivers drug directly to CSF); GABA-B agonist (not same mechanism as benzodiazepines)"},
  {name:"cyclobenzaprine",system:"Musculoskeletal",moa:"Structurally similar to TCAs; acts primarily in brainstem (not at spinal cord or NMJ); reduces tonic somatic motor activity; mechanism not fully understood; anticholinergic properties",use:"Acute muscle spasm (short-term treatment, 2-3 weeks); adjunct to rest and physical therapy for musculoskeletal conditions",side:"Sedation (very common); anticholinergic effects (dry mouth, urinary retention, constipation, blurred vision - TCA-like); dizziness; QT prolongation (TCA-like cardiac effects); tachycardia",contra:"MAOIs (serotonin syndrome - TCA-like interaction); recent MI; arrhythmias; hyperthyroidism; QT prolongation; narrow-angle glaucoma; BPH",pearl:"Similar structure to TCAs (avoid MAOIs; similar anticholinergic profile and cardiac risks); only effective for acute spasm (2-3 weeks max); significant sedation (caution with driving); NOT for spasticity from CNS disorders (MS, SCI - use baclofen instead); avoid in elderly (Beers criteria - anticholinergic side effects)"},
  {name:"tizanidine",system:"Reproductive",moa:"Alpha-2 adrenergic receptor agonist (similar to clonidine); acts in spinal cord and supraspinal sites; reduces excitatory neurotransmitter release; decreases muscle tone",use:"Spasticity (MS, spinal cord injury, stroke); acute muscle spasm",side:"Sedation; hypotension; dry mouth; dizziness; hepatotoxicity (monitor LFTs); QT prolongation",contra:"Concurrent fluvoxamine or ciprofloxacin (strong CYP1A2 inhibitors - dramatically increase tizanidine levels → severe hypotension); hepatic impairment",pearl:"Same MOA as clonidine (alpha-2 agonist) but acts peripherally in spinal cord; CRITICAL: fluvoxamine and ciprofloxacin CONTRAINDICATED (CYP1A2 inhibitors increase levels by 10-30x); hepatotoxicity - monitor LFTs; short duration of action (take when muscle spasm most problematic); sedation + hypotension prominent"},
  {name:"dantrolene",system:"Reproductive",moa:"Inhibits ryanodine receptor (RyR1) in skeletal muscle sarcoplasmic reticulum; prevents calcium release; reduces excitation-contraction coupling; directly relaxes skeletal muscle (NOT central)",use:"Malignant hyperthermia (treatment and prevention - ANTIDOTE); neuroleptic malignant syndrome (NMS); serotonin syndrome (refractory); spasticity (cerebral palsy, MS, SCI - chronic oral use)",side:"Hepatotoxicity (BOXED WARNING for oral long-term use); weakness (intended); sedation; diarrhea; nausea; photosensitivity",contra:"Active hepatic disease (oral long-term use); patients requiring muscle tone to maintain upright posture/function (extreme weakness); hypersensitivity",pearl:"ANTIDOTE for malignant hyperthermia (must stop triggering agent - volatile anesthetics or succinylcholine and give dantrolene IMMEDIATELY; IV formulation available for MH); also for NMS; hepatotoxicity is major concern with chronic oral use (monitor LFTs); direct-acting (acts on muscle directly - not CNS); give IV for acute MH (2.5mg/kg, repeat as needed)"},
  {name:"methotrexate",system:"Musculoskeletal",moa:"Inhibits DHFR; decreases folate-dependent synthesis of purines and pyrimidines; reduces pro-inflammatory mediators; anti-inflammatory at low doses by increasing adenosine release",use:"Rheumatoid arthritis (first-line DMARD); psoriatic arthritis; ankylosing spondylitis; psoriasis; JIA; SLE; vasculitis; IBD (off-label)",side:"GI upset (nausea, stomatitis); hepatotoxicity (cumulative - fibrosis, cirrhosis with long-term use); pulmonary toxicity (fibrosis, hypersensitivity pneumonitis); myelosuppression; teratogenic; alopecia",contra:"Pregnancy (TERATOGENIC - requires effective contraception); severe renal or hepatic impairment; active infection; alcohol use (hepatotoxicity); immunodeficiency",pearl:"FOLIC ACID supplementation (1mg daily) reduces GI side effects and stomatitis without reducing efficacy; monitor LFTs, CBC, creatinine; limit alcohol; teratogenic - use two forms of contraception; risk of drug interactions (NSAIDs increase MTX levels - avoid high-dose NSAIDs); anchor DMARD for RA"},
  {name:"hydroxychloroquine",system:"Musculoskeletal",moa:"Accumulates in lysosomes; alkalinizes lysosomal pH; inhibits lysosomal enzymes and antigen processing; inhibits TLR signaling; reduces inflammatory cytokines; mild immunosuppressive",use:"SLE (mainstay - reduces flares, reduces organ damage); rheumatoid arthritis (mild, as add-on DMARD); Sjögren's syndrome; malaria prophylaxis",side:"Retinopathy (most serious - irreversible macular damage; screen annually with ophthalmologist); GI upset; skin hyperpigmentation; rash; QT prolongation (less common); myopathy/cardiomyopathy (rare, long-term)",contra:"Pre-existing retinal disease; G6PD deficiency (antimalarial-induced hemolysis); hypersensitivity",pearl:"SAFEST DMARD (no myelosuppression, no hepatotoxicity); RETINAL TOXICITY is dose-dependent and cumulative - annual ophthalmology exam required (10-5-1 rule: >10 year use, >5mg/kg/day, +1 risk factor increases retinopathy risk); drug of choice in SLE pregnancy (safe in pregnancy - reduces lupus flares); QT prolongation (COVID-19 controversy - not effective)"},
  {name:"sulfasalazine",system:"Antimicrobials",moa:"Cleaved by colonic bacteria to sulfapyridine (antibacterial) and 5-aminosalicylic acid (5-ASA - anti-inflammatory); inhibits folate metabolism and prostaglandin synthesis; reduces B-cell function",use:"Rheumatoid arthritis; psoriatic arthritis; ankylosing spondylitis; IBD (ulcerative colitis and Crohn's disease)",side:"GI upset; rash (sulfonamide allergy); myelosuppression; hepatotoxicity; oligospermia (reversible); headache; pulmonary toxicity; orange discoloration of urine/skin (harmless)",contra:"Sulfonamide allergy; salicylate allergy; severe renal/hepatic impairment; G6PD deficiency; porphyria",pearl:"Orange/yellow urine discoloration (harmless); reversible oligospermia (counsel male patients wanting fertility); supplement folate; sulfonamide component = sulfa allergy concern; used in both rheumatic and GI diseases; generally first-line DMARD alongside MTX for RA"},
  {name:"leflunomide",system:"Musculoskeletal",moa:"Prodrug converted to teriflunomide; inhibits dihydroorotate dehydrogenase (DHODH) - enzyme in de novo pyrimidine synthesis; inhibits lymphocyte proliferation; anti-inflammatory",use:"Rheumatoid arthritis (alternative to MTX); psoriatic arthritis",side:"Hepatotoxicity (BOXED WARNING); teratogenic (BOXED WARNING - VERY long half-life); diarrhea; rash; alopecia; hypertension; peripheral neuropathy; myelosuppression",contra:"Pregnancy (highly teratogenic - Category X); hepatic impairment; immunodeficiency; breastfeeding",pearl:"VERY LONG HALF-LIFE (1-4 weeks) - CHOLESTYRAMINE washout required if rapid elimination needed (pregnancy or toxicity); highly teratogenic - mandatory washout with cholestyramine before conception; check plasma levels before pregnancy; liver monitoring required; similar efficacy to MTX for RA"},
  {name:"abatacept",system:"Reproductive",moa:"Fusion protein of CTLA-4 extracellular domain with IgG1 Fc; binds CD80/CD86 on antigen-presenting cells; blocks B7-CD28 costimulatory signal; prevents T-cell activation without the full T-cell signal",use:"Rheumatoid arthritis (moderate-severe, inadequate response to MTX); JIA; psoriatic arthritis",side:"Increased infection risk; COPD exacerbations; infusion reactions; hypersensitivity; headache; nausea",contra:"Active severe infections; concurrent TNF inhibitors (increased infection risk with combination); COPD (use with caution)",pearl:"T-cell costimulation blocker (unique MOA); lower infection risk than TNF inhibitors; do NOT combine with TNF inhibitors (excessive immunosuppression); avoid live vaccines; available IV and SC forms; generally preferred over rituximab for RA (fewer serious side effects)"},
  {name:"tocilizumab",system:"Oncology",moa:"Humanized monoclonal antibody against IL-6 receptor (both soluble and membrane-bound); blocks IL-6 signaling; reduces systemic inflammation, CRP, ESR, and joint inflammation",use:"Rheumatoid arthritis (moderate-severe); JIA (systemic and polyarticular); giant cell arteritis; cytokine release syndrome (from CAR-T therapy or immune checkpoint inhibitors); COVID-19 (severe)",side:"Infections (serious); elevated LFTs; hyperlipidemia; neutropenia; GI perforation; elevated creatinine; infusion reactions; mask fever (blocks IL-6 mediated fever - may hide infections)",contra:"Active infections; neutropenia; thrombocytopenia; severe hepatic impairment",pearl:"IL-6 inhibition masks fever (IL-6 is a key pyrogenic cytokine) - infections may present without fever; elevates LFTs and lipids (monitor); GI perforation risk (especially concurrent NSAIDs/corticosteroids); approved for cytokine release syndrome (CAR-T associated); drug of choice for giant cell arteritis; do not start if neutrophil count <2000"},
  {name:"ustekinumab",system:"Musculoskeletal",moa:"Fully human monoclonal antibody against p40 subunit shared by IL-12 and IL-23; blocks both cytokines; inhibits Th1 and Th17 pathway activation",use:"Plaque psoriasis; psoriatic arthritis; Crohn's disease; ulcerative colitis",side:"Infections (nasopharyngitis most common); injection site reactions; headache; fatigue; rare serious infections",contra:"Active serious infections; hypersensitivity",pearl:"Less infection risk than TNF inhibitors (more selective mechanism); targets IL-12 and IL-23 (upstream of Th1/Th17 differentiation); every 12-week maintenance dosing for psoriasis (convenience); effective for IBD (unlike TNF inhibitors which are variable for Crohn's)"},
  {name:"tofacitinib",system:"Musculoskeletal",moa:"Inhibit Janus kinase (JAK) enzymes (JAK1/JAK3 for tofacitinib; JAK1/JAK2 for baricitinib); block cytokine signaling pathways (IL-2, IL-4, IL-6, IL-12, IL-23, IFN-gamma - many cytokines use JAK pathway); oral targeted therapy",use:"Rheumatoid arthritis; psoriatic arthritis; ulcerative colitis; ankylosing spondylitis (baricitinib); atopic dermatitis (baricitinib, upadacitinib); COVID-19 (baricitinib)",side:"Infections (serious bacterial, fungal, viral); increased cardiovascular risk (MACE - BOXED WARNING - especially vs TNF inhibitors); VTE/pulmonary embolism (BOXED WARNING); malignancy risk; dyslipidemia; elevated liver enzymes; neutropenia; herpes zoster reactivation",contra:"Active serious infections; pregnancy; BOXED WARNING: for patients >50 with at least one CV risk factor (prefer TNF inhibitor first)",pearl:"ORAL targeted synthetic DMARDs (not true biologics); boxed warnings for serious infections, CV events, PE/DVT, and malignancy; high rate of herpes zoster reactivation (vaccinate before starting if possible); JAK inhibitors have broad mechanism (affect many cytokine pathways); regulatory agencies require specific boxed warnings comparing to TNF inhibitors"},
  {name:"tretinoin",system:"Oncology",moa:"Binds retinoic acid receptors (RAR); modulates gene transcription; normalizes follicular keratinization; reduces microcomedone formation; promotes epidermal cell turnover; also anti-aging effects (increases collagen synthesis)",use:"Acne vulgaris (comedonal and inflammatory); photoaging; hyperpigmentation; keratosis pilaris; molluscum contagiosum; acute promyelocytic leukemia (oral ATRA form)",side:"Skin irritation (erythema, peeling, dryness - 'retinoid dermatitis'); photosensitivity (increased sun sensitivity); initial acne flare ('purging' - first 2-6 weeks); teratogenic (avoid in pregnancy)",contra:"Pregnancy (teratogenic); active eczema; concurrent photosensitizing drugs (relative)",pearl:"Apply at night (photosensitivity); start with lowest concentration and increase gradually; expect initial 'purging' (acne worsens before improving); sunscreen mandatory; takes 8-12 weeks for full effect; avoid mucous membranes/eyes; gel formulation stronger than cream; adapalene is similar but less irritating"},
  {name:"isotretinoin",system:"Antimicrobials",moa:"13-cis retinoic acid; binds RAR and RXR receptors; causes sebaceous gland atrophy and decreased sebum production (main MOA); normalizes follicular keratinization; anti-inflammatory; reduces Propionibacterium acnes",use:"Severe nodular/cystic acne (only FDA-approved indication); acne unresponsive to antibiotics; certain skin cancers (off-label)",side:"SEVERE TERATOGENICITY (Category X - multiple major malformations - IPLEDGE PROGRAM required); cheilitis (dry, cracked lips - most common); xerosis; elevated triglycerides and LDL; hepatotoxicity; depression/suicidality (debated association); pseudotumor cerebri (avoid tetracyclines concurrently); photosensitivity; night blindness",contra:"Pregnancy (ABSOLUTE CONTRAINDICATION - Category X - catastrophic teratogen); concurrent tetracyclines (pseudotumor cerebri risk); vitamin A supplementation; hypersensitivity",pearl:"iPLEDGE REMS program required (two negative pregnancy tests before each month's prescription; two forms of contraception; monthly monitoring); most effective acne treatment available (often cures acne); monitor lipids and LFTs monthly; depression/suicide monitoring; take with fatty food (fat-soluble - increases absorption); cheilitis nearly universal (use lip balm); Vitamin A toxicity symptoms"},
  {name:"benzoyl peroxide",system:"Antimicrobials",moa:"Releases free radical oxygen in skin; kills Cutibacterium acnes (formerly P. acnes); keratolytic activity (loosens keratin); reduces comedone formation; does NOT cause bacterial resistance",use:"Acne vulgaris (mild-moderate); often combined with topical antibiotics to prevent resistance",side:"Local irritation; dryness; peeling; bleaching of clothing/hair (oxidative effects); allergic contact dermatitis (rare)",contra:"Hypersensitivity; avoid eyes, mouth, mucous membranes",pearl:"Does NOT cause antibiotic resistance (free radical mechanism); prevents resistance when combined with topical antibiotics (combine with clindamycin for synergy and to prevent resistance); bleaches fabric and hair; start with lower concentrations (2.5-5%) to reduce irritation; OTC available"},
  {name:"topical clindamycin",system:"Antimicrobials",moa:"Inhibit bacterial protein synthesis (50S ribosome); reduce C. acnes population; reduce inflammatory mediators from bacteria; bacteriostatic",use:"Inflammatory acne vulgaris (papules, pustules); combined with benzoyl peroxide to prevent resistance",side:"Local irritation; dryness; contact dermatitis; systemic absorption minimal; rare C. difficile (theoretical with topical clindamycin)",contra:"History of regional enteritis/ulcerative colitis (topical clindamycin); hypersensitivity",pearl:"ALWAYS combine with benzoyl peroxide to prevent resistance development; topical clindamycin preferred over topical erythromycin (less resistance); monotherapy leads to antibiotic resistance; Epiduo = adapalene + benzoyl peroxide; Duac = clindamycin + benzoyl peroxide"},
  {name:"salicylic acid",system:"Dermatology",moa:"Keratolytic; breaks down intercellular lipid lamellae; promotes desquamation of corneocytes; reduces follicular plugging; mild anti-inflammatory; mild antibacterial",use:"Acne (comedonal); warts (plantar, common); seborrheic keratoses; psoriasis (helps penetration of other agents); calluses; dandruff (shampoos)",side:"Local irritation; salicylate toxicity (systemic absorption with extensive application - especially children); contact dermatitis",contra:"Avoid in children (salicylate toxicity risk with extensive use); mucous membranes; inflamed/infected skin; diabetes/peripheral vascular disease (foot warts)",pearl:"Keratolytic mechanism - removes dead skin cells to open pores; available OTC in various concentrations; wart treatment requires consistent daily application for weeks; caution in children (systemic absorption → salicylate toxicity); can be combined with sulfur for acne/seborrheic dermatitis"},
  {name:"minoxidil",system:"Cardiovascular",moa:"Potassium channel opener; causes vasodilation; increases blood flow to hair follicles; prolongs anagen (growth) phase of hair cycle; mechanism not fully understood",use:"Androgenic alopecia (male and female pattern baldness); alopecia areata (off-label)",side:"Local irritation; hypertrichosis (unwanted facial hair in women); initial shedding (hair growth cycle stimulation); systemic absorption (headache, hypotension - rare with topical)",contra:"Hypersensitivity to minoxidil or propylene glycol (vehicle); pregnancy (relative); scalp inflammation or infection",pearl:"Must be used continuously (hair loss returns within months of stopping); applies to scalp directly (not washed off immediately); takes 4-6 months for visible effect; initial shedding is normal (resting follicles entering growth phase); 5% solution more effective than 2%; oral minoxidil now used off-label for refractory alopecia"},
  {name:"permethrin",system:"Dermatology",moa:"Synthetic pyrethroid; blocks sodium channel closing in nerve cell membranes; causes prolonged depolarization; neurotoxic to parasites; paralyzes and kills lice and scabies mites",use:"Scabies (5% cream - drug of choice); head lice (1% cream rinse - first-line); pubic lice",side:"Local burning/stinging/pruritus; skin numbness; low systemic toxicity (minimal absorption)",contra:"Hypersensitivity; avoid eyes and mucous membranes; use with caution in infants <2 months",pearl:"Drug of choice for scabies (5% cream - apply from neck to toes, leave 8-12 hours, wash off); 1% rinse for head lice; treat all close contacts simultaneously; wash all clothing/bedding in hot water (>60°C) or seal in bag for 72 hours; itching persists after successful treatment (hypersensitivity reaction to mite debris - use antihistamines); repeat treatment in 1-2 weeks"},
  {name:"lindane",system:"Dermatology",moa:"Stimulates excessive neuronal activity in parasites; causes seizures and death in lice and mites; CNS stimulant via GABA receptor blockade",use:"Scabies; head lice (second-line - when permethrin fails or intolerant)",side:"NEUROTOXICITY (seizures, neurotoxicity in humans - BOXED WARNING); aplastic anemia (rare); skin irritation",contra:"Premature infants; neonates; children <50 kg (increased risk of seizures due to absorption); pregnancy; seizure disorder; immunocompromised patients; pre-existing skin conditions (increased absorption)",pearl:"SECOND-LINE ONLY (more toxic than permethrin); BOXED WARNING: neurotoxicity and death from inappropriate use; FDA restricts to patients who have failed first-line therapy; use only once (single application); rinse off completely; minimal exposure to skin (do not leave on >8 hours)"},
  {name:"mupirocin",system:"Antimicrobials",moa:"Inhibits bacterial isoleucyl-tRNA synthetase; blocks protein synthesis (unique mechanism - not cross-resistant with other antibiotics); active against S. aureus (including MRSA), Streptococcus",use:"Impetigo; secondarily infected skin lesions (traumatic, eczema); nasal decolonization of S. aureus/MRSA carriers (intranasal formulation)",side:"Local irritation; pruritus; burning; rhinitis (nasal formulation); rare sensitization",contra:"Hypersensitivity; avoid large surfaces (systemic absorption of polyethylene glycol vehicle → renal toxicity)",pearl:"Drug of choice for impetigo (topical); MRSA active; intranasal decolonization of MRSA carriers; unique MOA (no cross-resistance with other topical antibiotics); resistance developing with widespread use; do NOT use on large surface areas"},
  {name:"chloroquine",system:"Musculoskeletal",moa:"Accumulates in acidic vesicles of Plasmodium; alkalinizes lysosomal pH; prevents polymerization of toxic heme into hemozoin; heme accumulates → toxic to parasite; active against erythrocytic (blood) stage",use:"Malaria prophylaxis and treatment (chloroquine-sensitive Plasmodium); P. vivax and P. ovale (with primaquine for liver stages); rheumatoid arthritis and SLE (hydroxychloroquine)",side:"GI upset; retinopathy (long-term - dose-dependent, irreversible - hydroxychloroquine); pruritus (especially in Africans); QT prolongation; hemolysis (G6PD deficiency)",contra:"Chloroquine-resistant malaria areas; G6PD deficiency (relative); retinal disease; QT prolongation; concurrent QT-prolonging drugs",pearl:"Most of the world now has chloroquine-resistant P. falciparum; widespread resistance limits use for P. falciparum; still effective for P. vivax/ovale/malariae in most areas; retinopathy with hydroxychloroquine requires annual ophthalmologic screening; G6PD test before using primaquine (causes hemolysis in G6PD deficiency)"},
  {name:"mefloquine",system:"Antimicrobials",moa:"Mechanism not fully understood; inhibits hemozoin formation in blood stage of Plasmodium; active against erythrocytic stage; long half-life (2-3 weeks)",use:"Malaria prophylaxis (chloroquine-resistant areas); treatment of uncomplicated chloroquine-resistant P. falciparum",side:"NEUROPSYCHIATRIC side effects (vivid dreams, insomnia, anxiety, dizziness, depression, psychosis, seizures - BOXED WARNING); GI upset; QT prolongation",contra:"Psychiatric disorders (depression, anxiety, psychosis - BOXED WARNING); seizure disorder; cardiac conduction abnormalities; hypersensitivity",pearl:"Neuropsychiatric toxicity can occur during or after therapy (and persist); avoid in patients with psychiatric history; weekly dosing (start 2 weeks before, continue 4 weeks after travel); FDA Boxed Warning for neuropsychiatric effects; long half-life; resistance developing in parts of Southeast Asia"},
  {name:"atovaquone-proguanil",system:"Antimicrobials",moa:"Atovaquone: disrupts mitochondrial electron transport in Plasmodium (blocks complex III); Proguanil: inhibits dihydrofolate reductase (antifolate); synergistic combination; active against liver and blood stages",use:"Malaria prophylaxis (chloroquine-resistant areas - preferred for short trips); treatment of uncomplicated P. falciparum",side:"GI upset (nausea, vomiting, abdominal pain - take with food); headache; skin rash; elevated LFTs",contra:"Severe renal impairment (CrCl <30 mL/min - do not use); pregnancy (limited safety data); breastfeeding",pearl:"PREFERRED for short trips (only 7 days post-exposure vs 4 weeks for mefloquine/doxycycline); must take with food or fatty meal (increases atovaquone absorption 3-fold); daily dosing; start 1-2 days before travel; stop 7 days after; fewer neuropsychiatric side effects than mefloquine; more expensive than doxycycline"},
  {name:"primaquine",system:"Antimicrobials",moa:"Active against LIVER stages (hypnozoites) of P. vivax and P. ovale; prevents relapse; also active against gametocytes; metabolized to oxidative metabolites that are toxic to parasite",use:"Radical cure of P. vivax and P. ovale (eliminates liver hypnozoites to prevent relapse); terminal prophylaxis after exposure to P. vivax/ovale areas",side:"Hemolytic anemia in G6PD-deficient patients (MAJOR concern - can be severe/fatal); methemoglobinemia; GI upset; leukopenia",contra:"G6PD deficiency (MUST test G6PD before prescribing - hemolysis risk is fatal); pregnancy; breastfeeding (if infant is G6PD deficient)",pearl:"ONLY drug active against liver hypnozoites (radical cure of P. vivax/ovale); MANDATORY G6PD testing before use; without primaquine, P. vivax and P. ovale can relapse months to years later from dormant liver stages; P. falciparum does NOT have hypnozoites; also eliminates gametocytes (reduces transmission)"},
  {name:"artemisinin derivatives",system:"Antimicrobials",moa:"Activated by intraparasitic iron (heme); generates free radicals; alkylates parasite proteins and heme; disrupts membrane function; rapidly reduces parasitemia; blood stage active; short half-life",use:"Severe P. falciparum malaria (artesunate IV - first-line for severe malaria worldwide); uncomplicated falciparum malaria (artemether-lumefantrine/Coartem - first-line ACT); artemisinins combined with partner drugs to prevent resistance",side:"GI upset; headache; dizziness; neurotoxicity (rare with standard doses); QT prolongation (lumefantrine component); embryotoxic (avoid in 1st trimester)",contra:"First trimester pregnancy (avoid if possible - embryotoxic); hypersensitivity",pearl:"MOST RAPIDLY ACTING ANTIMALARIAL - dramatically reduces parasitemia; ALWAYS given in combination (ACT) to prevent resistance (short half-life means parasites can survive if only one drug given); artesunate IV is drug of choice for severe malaria (replaced quinine in most guidelines); artemether-lumefantrine (Coartem) first-line for uncomplicated falciparum; resistance emerging in Southeast Asia (WHO concern)"},
  {name:"doxycycline",system:"Antimicrobials",moa:"Inhibits apicoplast function in Plasmodium; blocks protein synthesis; effective prophylactic (blood stage); starts working slowly",use:"Malaria prophylaxis (chloroquine-resistant areas including Southeast Asia - covers mefloquine-resistant areas); also treatment of malaria (with quinine)",side:"Photosensitivity (significant - use sunscreen); GI upset/esophageal irritation (take with food, stay upright); vaginal candidiasis; tooth discoloration (children <8 years); teratogenic",contra:"Children <8 years; pregnancy; concurrent antacids/dairy (reduced absorption); concurrent isotretinoin (pseudotumor cerebri)",pearl:"Cheapest prophylaxis option; start 1-2 days before travel, continue 4 weeks after (vs 7 days for Malarone); photosensitivity requires rigorous sun protection; esophageal ulceration risk (take upright with full glass of water, don't lie down 30 min); also useful in areas with mefloquine resistance (Southeast Asia)"},
  {name:"oseltamivir",system:"Antivirals",moa:"Inhibit viral neuraminidase enzyme; prevent release and spread of influenza A and B virions from infected cells; reduce viral replication",use:"Influenza A and B treatment (start within 48 hours of onset); influenza post-exposure prophylaxis; high-risk patients (elderly, immunocompromised, pregnant)",side:"Oseltamivir: nausea, vomiting (take with food); zanamivir: bronchospasm (avoid in asthma/COPD); peramivir: diarrhea; neuropsychiatric events (rare)",contra:"Zanamivir: asthma/COPD (bronchospasm risk); hypersensitivity; renal impairment (oseltamivir/peramivir - dose adjust)",pearl:"Must start within 48 hours for maximum benefit; reduces duration by ~1-2 days; oseltamivir oral preferred; zanamivir inhaled (AVOID in asthma/COPD); peramivir single-dose IV; all active against influenza A and B (unlike amantadine which only covers A)"},
  {name:"baloxavir marboxil",system:"Antivirals",moa:"Inhibits cap-dependent endonuclease (PA subunit of influenza RNA polymerase); prevents viral mRNA synthesis; single-dose oral treatment",use:"Influenza A and B treatment (within 48 hours); active against oseltamivir-resistant strains",side:"Diarrhea; headache; nausea; nasopharyngitis",contra:"Concurrent polyvalent cation-containing products (antacids, laxatives containing Mg/Al/Ca - reduce absorption); avoid live influenza vaccine within 2 weeks (longer window than other antivirals)",pearl:"Novel single-dose treatment; different MOA from neuraminidase inhibitors; longer withholding period before LAIV (live flu vaccine); active against oseltamivir-resistant strains; cannot give LAIV within 17 days of baloxavir (longer than for other antivirals)"},
  {name:"nirsevimab",system:"Oncology",moa:"Monoclonal antibodies targeting RSV F protein; block RSV fusion with host cells; prevent RSV infection; passive immunization (not active vaccination)",use:"RSV prophylaxis in high-risk infants and young children (premature, congenital heart disease, chronic lung disease); nirsevimab is newer long-acting option",side:"Injection site reactions; hypersensitivity; elevated liver enzymes (palivizumab - rare)",contra:"Hypersensitivity to product components",pearl:"Palivizumab: monthly IM injections during RSV season (November-March); nirsevimab: single dose per season (longer-acting); NOT treatment - prophylaxis only; high cost limits use to high-risk infants; RSV does not have a treatment vaccine currently available"},
  {name:"azithromycin",system:"Antimicrobials",moa:"Binds 50S ribosomal subunit; inhibits bacterial protein synthesis; bacteriostatic; excellent atypical organism coverage (Mycoplasma, Chlamydophila, Legionella)",use:"Pertussis (whooping cough) - drug of choice; community-acquired pneumonia (atypical organisms); MAC prophylaxis; Chlamydia; strep throat",side:"GI upset (nausea, diarrhea); QT prolongation (FDA warning); hepatotoxicity (rare); hearing loss (rare, high dose)",contra:"QT prolongation; concurrent QT-prolonging drugs; hypersensitivity",pearl:"Drug of choice for pertussis (5 days); first-choice for outpatient CAP with atypical coverage; Z-pack (5-day course); treat close contacts of pertussis regardless of vaccination status; beta-lactams alone do NOT cover atypical organisms (Mycoplasma, Chlamydophila, Legionella) - must add azithromycin or use respiratory FQ"},
  {name:"albuterol",system:"Pulmonary",moa:"Selective beta-2 receptor agonist; stimulates adenylyl cyclase → increases cAMP → bronchial smooth muscle relaxation; bronchodilation; inhibits mast cell mediator release",use:"Acute asthma/COPD exacerbation (rescue inhaler); exercise-induced bronchospasm (pretreatment); hyperkalemia (shifts K+ intracellularly)",side:"Tremor; tachycardia; palpitations; hypokalemia; anxiety; paradoxical bronchospasm (rare)",contra:"Hypersensitivity; use caution with MAOIs and TCAs; do NOT use alone for asthma maintenance (per 2019 GINA guidelines - must add ICS)",pearl:"RESCUE inhaler (PRN only - not daily maintenance); preferred SABA in pregnancy; levalbuterol (R-enantiomer) has fewer cardiac side effects; 2019 GINA update: SABA-alone treatment no longer recommended - must pair with ICS; Airsupra (albuterol + budesonide) first approved SABA+ICS combo rescue inhaler (2023)"},
  {name:"salmeterol",system:"Pulmonary",moa:"Selective long-acting beta-2 receptor agonists; duration 12-24 hours; formoterol has faster onset than salmeterol; vilanterol once-daily (24 hours)",use:"Asthma maintenance (ALWAYS combined with ICS - NEVER monotherapy in asthma); COPD maintenance (can be used alone or with LAMA); exercise-induced bronchospasm prevention",side:"Tremor; tachycardia; hypokalemia; headache; palpitations",contra:"NEVER use LABA alone in asthma (BOXED WARNING - increased asthma-related death); salmeterol associated with increased asthma mortality when used as monotherapy",pearl:"BOXED WARNING: LABA monotherapy in asthma associated with increased asthma-related deaths; always combine with ICS in asthma; salmeterol is partial agonist (formoterol/indacaterol are full agonists); formoterol preferred as rescue in combination with ICS (faster onset); Symbicort = budesonide + formoterol; Advair = fluticasone + salmeterol"},
  {name:"fluticasone",system:"Pulmonary",moa:"Activate glucocorticoid receptors; reduce airway inflammation; decrease mucus secretion; reduce bronchial hyperresponsiveness; inhibit cytokine production",use:"Asthma maintenance (cornerstone of therapy - ALL patients with persistent asthma); COPD (with LABA if frequent exacerbations); eosinophilic conditions",side:"Oropharyngeal candidiasis (rinse mouth after use); dysphonia (hoarseness); adrenal suppression (high doses); growth suppression (children - minimal with low doses)",contra:"Active pulmonary TB (relative); hypersensitivity; acute bronchospasm (not for rescue)",pearl:"RINSE MOUTH after each use to prevent oral candidiasis; cornerstone of asthma therapy; budesonide preferred ICS in pregnancy; beclomethasone prototype ICS; spacer device reduces oropharyngeal deposition; NOT rescue medication (controller only); ICS does NOT suppress systemic immunity significantly at low-moderate doses"},
  {name:"ipratropium",system:"Pulmonary",moa:"Competitive muscarinic receptor antagonist; blocks acetylcholine-mediated bronchoconstriction; reduces secretions; bronchodilation",use:"COPD exacerbation (rescue); acute severe asthma (combined with albuterol for synergy); rhinorrhea (intranasal); not first-line in asthma",side:"Dry mouth; urinary retention; constipation; blurred vision (if gets in eyes); bitter taste; minimal systemic absorption",contra:"Hypersensitivity to atropine; narrow-angle glaucoma (topical use); BPH (caution)",pearl:"Combined with albuterol (Combivent/DuoNeb) for acute COPD/asthma exacerbations; SHORT-acting (contrast with tiotropium which is long-acting); minimal systemic absorption via inhalation; does not affect mucociliary clearance"},
  {name:"tiotropium",system:"Pulmonary",moa:"Competitive, kinetically selective antagonist of M1 and M3 muscarinic receptors; long-acting bronchodilation (24 hours); reduces mucus secretion; once-daily dosing",use:"COPD maintenance (preferred initial therapy with LABA or alone); asthma (add-on to ICS+LABA if uncontrolled)",side:"Dry mouth (most common); urinary retention; constipation; blurred vision; paradoxical bronchospasm",contra:"Hypersensitivity to tiotropium or atropine; narrow-angle glaucoma; BPH/bladder neck obstruction",pearl:"Gold standard COPD maintenance; once-daily dosing (24-hour duration); LABA+LAMA combination preferred for many COPD patients (complementary mechanisms); use HandiHaler or Respimat inhaler (different formulations); avoid getting in eyes (causes mydriasis/angle-closure glaucoma)"},
  {name:"montelukast",system:"Pulmonary",moa:"Block cysteinyl leukotriene receptors (CysLT1); prevent leukotriene-mediated bronchoconstriction, mucus secretion, and airway inflammation",use:"Asthma maintenance (step 2-3 alternative to ICS); allergic rhinitis; exercise-induced bronchospasm prevention; aspirin-exacerbated respiratory disease",side:"Neuropsychiatric effects: depression, anxiety, suicidal ideation, aggressive behavior (BOXED WARNING - 2020); GI upset; headache; elevated liver enzymes (zafirlukast)",contra:"Hypersensitivity; not for acute bronchospasm; BOXED WARNING for neuropsychiatric effects (especially in children/young adults)",pearl:"BOXED WARNING (2020): serious neuropsychiatric events including suicidal thoughts/behavior; avoid in patients with history of psychiatric disorders; ORAL (not inhaled); alternative to low-dose ICS for mild persistent asthma; useful for allergic rhinitis + asthma comorbidity; less effective than ICS; zafirlukast requires food restriction (take 1 hour before or 2 hours after meals)"},
  {name:"zileuton",system:"Pulmonary",moa:"Inhibits 5-lipoxygenase enzyme; prevents conversion of arachidonic acid to leukotrienes; reduces all leukotrienes (LTB4 and cysteinyl leukotrienes)",use:"Asthma maintenance (alternative add-on therapy); aspirin-exacerbated respiratory disease",side:"Hepatotoxicity (monitor LFTs); GI upset; headache; drug interactions (CYP1A2 inhibitor - interacts with theophylline, warfarin)",contra:"Hepatic disease; concurrent theophylline or warfarin without careful monitoring; hypersensitivity",pearl:"Monitor liver function monthly for first 3 months, then periodically; inhibits ALL leukotrienes (unlike montelukast which only blocks receptors); CYP1A2 inhibitor - interacts with theophylline (doubles levels) and warfarin; less commonly used than montelukast due to monitoring requirements"},
  {name:"theophylline",system:"Pulmonary",moa:"Inhibits phosphodiesterase (increases cAMP); adenosine receptor antagonist; bronchodilation; anti-inflammatory; stimulant; narrow therapeutic index",use:"Asthma (last-line maintenance, largely replaced); COPD (add-on); neonatal apnea (caffeine preferred); acute exacerbations (IV aminophylline)",side:"NARROW THERAPEUTIC INDEX: nausea, vomiting, headache (early); tachyarrhythmias, seizures (toxicity - levels >20 mcg/mL); insomnia; GI upset",contra:"Uncontrolled seizure disorder; hypersensitivity; narrow therapeutic window - must monitor levels; many drug interactions (CYP1A2 substrate)",pearl:"Narrow therapeutic index (5-15 mcg/mL therapeutic; >20 toxic - seizures, arrhythmias); largely replaced by safer agents; many drug interactions (ciprofloxacin, zileuton, fluvoxamine increase levels); aminophylline = theophylline + ethylenediamine (IV form); caffeine is closely related (for neonatal apnea); smoking induces CYP1A2 (decreases theophylline levels)"},
  {name:"omalizumab",system:"Pulmonary",moa:"Humanized monoclonal antibody against free IgE; prevents IgE binding to mast cells and basophils; reduces allergic cascade and bronchoconstriction; reduces free IgE levels",use:"Moderate-severe persistent allergic asthma uncontrolled on ICS+LABA; chronic idiopathic urticaria; allergic rhinitis (severe)",side:"Injection site reactions; anaphylaxis (observe for 2 hours after injection); headache; viral upper respiratory infections",contra:"Non-IgE-mediated asthma; acute bronchospasm; hypersensitivity; anaphylaxis history to omalizumab",pearl:"For allergic (IgE-mediated) asthma only - requires elevated total IgE and allergen sensitization; subcutaneous injection every 2-4 weeks; observe for 2 hours after injection (anaphylaxis risk); does not provide immediate relief; biologic add-on for uncontrolled asthma; very expensive"},
  {name:"roflumilast",system:"Pulmonary",moa:"Selective phosphodiesterase-4 (PDE-4) inhibitor; increases cAMP in lung cells; reduces inflammatory cell activity (neutrophils, macrophages); decreases COPD exacerbations",use:"COPD with chronic bronchitis and history of frequent exacerbations (add-on to bronchodilators); NOT for acute exacerbations",side:"Weight loss (significant); GI upset (nausea, diarrhea, abdominal pain); headache; insomnia; psychiatric effects (depression, suicidal ideation - BOXED WARNING)",contra:"Moderate-severe liver impairment; depression/suicidal ideation (BOXED WARNING); not for acute bronchospasm; not for asthma",pearl:"Oral, once-daily anti-inflammatory for COPD with chronic bronchitis; NOT a bronchodilator; BOXED WARNING for psychiatric side effects; weight loss can be significant (can be beneficial in obese COPD patients); for COPD only (not asthma)"},
  {name:"cromolyn sodium",system:"Pulmonary",moa:"Prevent mast cell degranulation; block calcium channels in mast cells; prevent release of histamine and other mediators; anti-inflammatory without direct bronchodilation",use:"Asthma prophylaxis (exercise-induced bronchospasm - pretreatment); allergic rhinitis; ophthalmic use for allergic conjunctivitis; largely replaced by safer more effective agents",side:"Cough; throat irritation; transient bronchospasm (on inhalation); bad taste (nedocromil); minimal systemic absorption",contra:"Acute bronchospasm (not for rescue); hypersensitivity",pearl:"NOT for acute bronchospasm (controller only); must be used before exposure; excellent safety profile (minimal side effects - safe in pregnancy and children); largely replaced by ICS and LTRAs; prophylactic use before exercise or allergen exposure"},
  {name:"amoxicillin high-dose",system:"Antimicrobials",moa:"Binds penicillin-binding proteins (PBPs); inhibits cell wall synthesis; bactericidal; high-dose overcomes intermediate S. pneumoniae resistance",use:"Acute otitis media (AOM) - first-line (high-dose 80-90 mg/kg/day); sinusitis; strep pharyngitis; CAP (outpatient)",side:"Diarrhea; rash (maculopapular rash in mononucleosis - not true allergy); allergic reactions; GI upset; Clostridioides difficile",contra:"Penicillin allergy (IgE-mediated); mononucleosis (EBV - causes diffuse rash, not true allergy); hypersensitivity",pearl:"HIGH-DOSE required for AOM (80-90 mg/kg/day) to achieve adequate middle ear concentrations; if treatment fails → amoxicillin-clavulanate or ceftriaxone IM; duration 10 days children <2 years, 5-7 days children ≥2 years; mononucleosis rash is NOT a penicillin allergy"},
  {name:"oxymetazoline",system:"Antivirals",moa:"Alpha-1 adrenergic receptor agonists; cause vasoconstriction of nasal mucosa blood vessels; reduce nasal congestion and swelling",use:"Nasal congestion (viral URI, sinusitis, allergic rhinitis); oxymetazoline topical; pseudoephedrine/phenylephrine oral",side:"Oxymetazoline (topical): rhinitis medicamentosa (rebound congestion) with >3 days use; Systemic (pseudoephedrine): hypertension, insomnia, tachycardia, urinary retention",contra:"Oxymetazoline: NOT more than 3 days (rebound congestion); MAOIs (pseudoephedrine - hypertensive crisis); hypertension; BPH (urinary retention); hyperthyroidism",pearl:"Oxymetazoline: 3-DAY MAXIMUM (rhinitis medicamentosa with prolonged use); pseudoephedrine: behind the counter (Combat Methamphetamine Epidemic Act - quantity limits); phenylephrine (oral) less effective than pseudoephedrine; topical agents preferred over systemic for nasal congestion"},
  {name:"intranasal corticosteroids",system:"Endocrine",moa:"Activate glucocorticoid receptors in nasal mucosa; reduce inflammatory mediator production; decrease mucosal edema, rhinorrhea, and nasal congestion; minimal systemic absorption",use:"Allergic rhinitis (seasonal and perennial - most effective treatment); non-allergic rhinitis; nasal polyposis; adjunct in sinusitis",side:"Nasal irritation; epistaxis (nasal bleeding); nasal dryness; septal perforation (rare with improper use); HPA suppression (minimal at recommended doses)",contra:"Nasal septum perforation; recent nasal surgery; active nasal infection (relative); hypersensitivity",pearl:"MOST EFFECTIVE treatment for allergic rhinitis (superior to antihistamines); takes 1-2 weeks for full effect; spray away from nasal septum to prevent bleeding/perforation; minimal systemic absorption at recommended doses; OTC available (fluticasone, triamcinolone, budesonide nasal)"},
  {name:"loratadine",system:"Antivirals",moa:"Selective competitive antagonists at H1 histamine receptors; peripheral > CNS activity; reduce histamine-mediated sneezing, rhinorrhea, pruritus, urticaria; minimal anticholinergic effects",use:"Allergic rhinitis; urticaria (hives); allergic conjunctivitis; pruritus; anaphylaxis adjunct",side:"Minimal sedation (cetirizine mildly sedating); headache; dry mouth (minimal); QT prolongation (astemizole/terfenadine - removed from US market)",contra:"Renal impairment (dose adjust cetirizine/fexofenadine); hypersensitivity; astemizole/terfenadine contraindicated with CYP3A4 inhibitors (withdrawn from US market)",pearl:"Non-sedating (peripheral H1 selectivity - do not cross BBB well); astemizole and terfenadine WITHDRAWN from US market (fatal arrhythmias with CYP3A4 inhibitors - QT prolongation/torsades); OTC availability; once-daily dosing (convenience); cetirizine mildly sedating vs loratadine/fexofenadine"},
  {name:"diphenhydramine",system:"GI",moa:"Competitive antagonists at H1 receptors (peripheral and CNS); cross blood-brain barrier; also block muscarinic, alpha-adrenergic receptors; anticholinergic activity; sedating",use:"Allergic rhinitis; urticaria; motion sickness; insomnia (short-term, OTC); anaphylaxis adjunct; extrapyramidal reactions; dystonia antidote",side:"Sedation (significant - impairs driving); anticholinergic effects (dry mouth, urinary retention, constipation, blurred vision, tachycardia); confusion in elderly",contra:"Elderly (Beers criteria - risk of falls/confusion); BPH; narrow-angle glaucoma; concurrent CNS depressants; asthma (thickens secretions)",pearl:"Crosses BBB → sedation and anticholinergic effects; AVOID in elderly (Beers criteria - delirium, falls, urinary retention); useful for dystonia/EPS (IV diphenhydramine); antidote for phenothiazine-induced dystonia; motion sickness; impairs driving/cognitive performance"},
  {name:"ace inhibitors",system:"Cardiovascular",moa:"Inhibit angiotensin-converting enzyme (ACE); prevent conversion of angiotensin I to angiotensin II; reduce vasoconstriction and aldosterone secretion; increase bradykinin levels (cough, vasodilation)",use:"Hypertension (first-line, especially with diabetes/CKD); heart failure with reduced EF; post-MI cardioprotection; diabetic nephropathy; CKD with proteinuria",side:"Dry cough (bradykinin accumulation - class effect; 10-15%); hyperkalemia; angioedema (rare but life-threatening - Class I); acute kidney injury (bilateral renal artery stenosis); first-dose hypotension; teratogenic (Category D/X)",contra:"Pregnancy (Category D/X - renal agenesis, oligohydramnios); bilateral renal artery stenosis; history of ACEi-induced angioedema; concurrent aliskiren in DM/CKD; hyperkalemia",pearl:"Cough from bradykinin accumulation (switch to ARB if intolerable); angioedema is rare but life-threatening (switch to ARB - lower angioedema risk); renoprotective in diabetic nephropathy (antiproteinuric); first-dose hypotension (start low, warn patient); AVOID in pregnancy; do NOT combine ACEi + ARB (dual RAAS blockade increases adverse effects)"},
  {name:"arbs",system:"Cardiovascular",moa:"Block AT1 receptors for angiotensin II; prevent angiotensin II-mediated vasoconstriction, aldosterone release, and cell growth; do NOT inhibit bradykinin breakdown (no cough)",use:"Hypertension; heart failure (alternative to ACEi or combined); diabetic nephropathy; CKD with proteinuria; post-MI; ACEi cough intolerance",side:"Hyperkalemia; acute kidney injury (bilateral renal artery stenosis); first-dose hypotension; teratogenic (same as ACEi); angioedema (much rarer than ACEi)",contra:"Pregnancy; bilateral renal artery stenosis; concurrent ACEi (dual RAAS blockade); concurrent aliskiren in DM/CKD; hyperkalemia",pearl:"No cough (does not affect bradykinin) - preferred over ACEi for cough-intolerant patients; still can rarely cause angioedema; same renoprotective effects as ACEi in DM nephropathy; losartan also lowers uric acid (beneficial in gout); teratogenic same as ACEi (avoid pregnancy)"},
  {name:"calcium channel blockers",system:"Cardiovascular",moa:"Block voltage-gated L-type calcium channels in vascular smooth muscle (selective over cardiac); prevent calcium entry; cause peripheral vasodilation; reduce peripheral vascular resistance; no significant effect on heart rate",use:"Hypertension (especially Black patients and elderly); Raynaud's phenomenon; angina (vasospastic and stable); pulmonary arterial hypertension (nifedipine); preferred in Black patients (with thiazide)",side:"Peripheral edema (most common - ankle swelling); headache; flushing; reflex tachycardia (especially short-acting nifedipine); gingival hyperplasia (amlodipine); worsening heart failure (avoid short-acting in HF)",contra:"Short-acting nifedipine in ACS (reflex tachycardia); heart failure with reduced EF (negative inotropic effect with non-DHP CCBs); hypersensitivity; hemodynamic instability",pearl:"Peripheral edema is dose-dependent and not from fluid retention (can add ACEi/ARB which counters it); AMLODIPINE preferred (long-acting, once daily, well-tolerated); grapefruit juice inhibits CYP3A4 metabolism of CCBs (increases drug levels); particularly effective in Black patients and the elderly (low renin populations)"},
  {name:"calcium channel blockers",system:"Cardiovascular",moa:"Block L-type calcium channels in both vascular smooth muscle AND cardiac tissue; reduce heart rate, AV conduction, and contractility; cause vasodilation; Class IV antiarrhythmic",use:"Hypertension; rate control in AF/flutter; SVT (paroxysmal); Raynaud's; angina; cluster headache (verapamil); hypertrophic cardiomyopathy",side:"Bradycardia; AV block; constipation (verapamil - most constipating medication); negative inotropy (worsens HF); hypotension; gingival hyperplasia",contra:"Heart failure with reduced EF (negative inotropy); concurrent beta-blockers (severe bradycardia/AV block); WPW with AF (verapamil); sick sinus syndrome without pacemaker; hypotension",pearl:"Non-DHPs have cardiac effects (bradycardia, AV block) unlike DHPs; verapamil is most constipating drug (common board question); AVOID in HFrEF (negative inotropy worsens pump function); AVOID concurrent with beta-blockers (complete heart block risk); diltiazem more tolerated than verapamil; useful for rate control in AF"},
  {name:"thiazide diuretics",system:"Cardiovascular",moa:"Inhibit Na+/Cl- cotransporter in early distal convoluted tubule; increase sodium and water excretion; decrease plasma volume; arteriolar vasodilation with chronic use",use:"Hypertension (first-line, especially in Black patients and elderly); edema; diabetes insipidus (nephrogenic); hypercalciuria/kidney stones (calcium-sparing)",side:"Hypokalemia (up to 40%); hyponatremia (rare but potentially fatal); hyperuricemia (gout exacerbation); hyperglycemia; hypercalcemia; hyperlipidemia; photosensitivity; sexual dysfunction",contra:"Sulfonamide allergy; gout (exacerbates); hypokalemia; anuria; hypersensitivity",pearl:"Chlorthalidone preferred over HCTZ (longer half-life 40-60 hours, better outcomes data); hyponatremia can be FATAL (especially elderly women); RETAIN calcium (use for hypercalciuria); INCREASE uric acid (worsen gout); hyperglycemia (monitor in diabetics); metabolic alkalosis from K+ loss; GFR <30 mL/min: thiazides become ineffective (use loop diuretics instead)"},
  {name:"hydralazine",system:"Cardiovascular",moa:"Direct smooth muscle relaxant; reduces peripheral vascular resistance; selective arteriolar dilation (not venous); compensatory reflex tachycardia and increased renin",use:"Hypertensive emergency/urgency (IV); chronic HTN resistant to other agents; heart failure (combined with isosorbide dinitrate - especially in Black patients); pregnancy-related hypertension",side:"Reflex tachycardia (always combine with beta-blocker); fluid retention (combine with diuretic); lupus-like syndrome (drug-induced lupus - dose-dependent); headache; GI upset",contra:"CAD (reflex tachycardia can worsen ischemia); mitral valve rheumatic disease; aortic dissection; tachycardia",pearl:"Drug-induced lupus (SLE-like syndrome) with long-term use (slow acetylators at higher risk); ALWAYS combine with diuretic + beta-blocker (prevent reflex tachycardia and fluid retention); Bidil = isosorbide dinitrate + hydralazine (specifically approved for heart failure in Black patients); preferred antihypertensive in pregnancy (along with labetalol)"},
  {name:"nitroprusside",system:"Cardiovascular",moa:"Releases nitric oxide (NO); activates guanylyl cyclase; increases cGMP; dilates both arterial AND venous smooth muscle; reduces preload and afterload; ultra-short acting (seconds)",use:"Hypertensive emergency (severe hypertension with end-organ damage); acute decompensated heart failure with severe hypertension; aortic dissection (with beta-blocker); controlled hypotension during surgery",side:"CYANIDE TOXICITY (life-threatening - metabolized to cyanide then thiocyanate); hypotension; reflex tachycardia; headache; palpitations; methemoglobinemia; coronary steal",contra:"Compensatory hypertension (AV shunt/coarctation); prolonged use (cyanide accumulation); severe hepatic/renal failure; Leber's optic neuropathy",pearl:"LIGHT-SENSITIVE (must protect from light - wrap in foil); cyanide toxicity with prolonged use (especially hepatic/renal failure) - treat with hydroxocobalamin or sodium thiosulfate; requires continuous IV infusion and invasive BP monitoring; fastest onset of antihypertensives (seconds); balanced preload AND afterload reduction (unlike NTG which primarily reduces preload)"},
  {name:"methyldopa",system:"Cardiovascular",moa:"Converted to alpha-methylnorepinephrine; stimulates central alpha-2 receptors; reduces sympathetic outflow; decreases peripheral vascular resistance; reduces HR and BP",use:"Hypertension in pregnancy (drug of choice for chronic hypertension in pregnancy); resistant hypertension",side:"Sedation; dry mouth; depression; positive Coombs test (hemolytic anemia - rare); drug-induced lupus; hepatotoxicity; bradycardia; rebound hypertension on abrupt discontinuation",contra:"Active hepatic disease; MAOIs; pheochromocytoma",pearl:"DRUG OF CHOICE for chronic hypertension in pregnancy (extensive safety data); positive Coombs test in 10-20% of patients (rarely leads to actual hemolytic anemia); central alpha-2 agonist (like clonidine but with direct conversion to active metabolite); sedation prominent side effect; rebound hypertension if stopped abruptly"},
  {name:"labetalol",system:"Cardiovascular",moa:"Combined non-selective beta-blocker (beta-1 and beta-2) and selective alpha-1 antagonist; reduces HR, contractility (beta) AND peripheral vascular resistance (alpha-1 blockade); no reflex tachycardia",use:"Hypertensive emergency in pregnancy (IV - drug of choice); hypertensive urgency; hypertension; pheochromocytoma preoperative management (combined alpha + beta)",side:"Bradycardia; orthostatic hypotension; bronchospasm (non-selective beta); fatigue; AV block; edema",contra:"Asthma/COPD (beta-2 blockade); severe bradycardia; AV block; decompensated heart failure; hypersensitivity",pearl:"IV drug of choice for hypertensive emergency in PREGNANCY; combined alpha + beta blockade prevents reflex tachycardia; also for pheochromocytoma (preop management requires ALPHA blocker FIRST then add beta blocker - labetalol does both); carvedilol is similar combined alpha+beta blocker used for heart failure"},
  {name:"aliskiren",system:"Cardiovascular",moa:"Direct inhibitor of renin enzyme; prevents conversion of angiotensinogen to angiotensin I; blocks RAAS at the first step; reduces angiotensin I, II, and aldosterone",use:"Hypertension (second-line); rarely used in current practice",side:"Hyperkalemia; renal impairment; angioedema (rare); diarrhea; dizziness; teratogenic",contra:"Pregnancy; concurrent ACEi or ARB in patients with DM or CKD (increased risk of renal impairment, hyperkalemia, hypotension); hypersensitivity",pearl:"First and only direct renin inhibitor approved; FDA warning against use with ACEi or ARB in diabetic patients (increased adverse outcomes); poor oral bioavailability; not widely used in practice; teratogenic; high-fat meal reduces absorption by 85%"},
  {name:"nitroglycerin",system:"Cardiovascular",moa:"Converted to nitric oxide (NO) by vascular smooth muscle; activates guanylyl cyclase; increases cGMP; primarily dilates VEINS (reduces preload); also dilates coronary arteries and arterioles (at high doses); reduces cardiac oxygen demand",use:"Acute angina (sublingual - drug of choice for acute episodes); ACS (IV NTG for ischemia control); acute heart failure with pulmonary edema; hypertensive emergency with ischemia; prevention (long-acting formulations)",side:"Headache (most common - from vasodilation); hypotension; reflex tachycardia; tolerance (with continuous use); methemoglobinemia (high doses); syncope",contra:"Concurrent PDE-5 inhibitors (sildenafil, tadalafil - fatal hypotension - 24-48 hour interval required); severe hypotension (SBP <90); right ventricular infarction; hypersensitivity",pearl:"PDE-5 inhibitor interaction is ABSOLUTE (sildenafil + NTG = fatal hypotension); sublingual NTG for acute angina (onset 1-3 min); tolerance develops with long-acting formulations (nitrate-free intervals of 8-12 hours required); IV NTG for ADHF and ACS; transdermal patches/ointments need free intervals; keep sublingual tablets in original glass bottle"},
